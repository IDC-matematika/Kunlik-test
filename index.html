<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Majburiy Matematika — Kunlik test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;}
:root{--teal1:#2bacc7;--teal2:#0f7c8f;--ink:#15293c;--ink2:#5d7282;--blue:#0e7cc4;--blue2:#0a6298;--green:#239e69;--green-bg:#e7f4ee;--red:#df544a;--red-bg:#fceae8;--amber:#f4a23b;--ice:#2bacc7;--paper:#fff;--paper2:#eef4f7;--line:#dde7ed;}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;
  background:linear-gradient(165deg,var(--teal1) 0%,var(--teal2) 100%);background-attachment:fixed;}
.disp{font-family:'Montserrat',system-ui,sans-serif;letter-spacing:-.01em;}
.wrap{max-width:680px;margin:0 auto;padding:20px 20px 64px;position:relative;z-index:1;}
.fbg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.fbg span{position:absolute;color:rgba(255,255,255,.10);font-weight:700;font-family:'Montserrat',sans-serif;white-space:nowrap;}
.fade{animation:fade .5s cubic-bezier(.2,.9,.3,1) both;}
@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(14,124,196,0)}50%{box-shadow:0 0 0 4px rgba(14,124,196,.14)}}
@keyframes dotin{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes conf{to{transform:translateY(430px) rotate(720deg);opacity:0}}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.h{color:#fff;font-weight:800;}
.kicker{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:8px;}
.date{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:14px;font-weight:500;margin-top:14px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 34px -22px rgba(8,40,55,.5);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:16px;border:none;cursor:pointer;border-radius:13px;padding:16px 22px;transition:transform .14s,box-shadow .25s,background .2s;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 12px 26px -12px rgba(14,124,196,.8);}
.btn-primary:hover{transform:translateY(-2px);background:var(--blue2);}
.btn-primary:disabled{background:#bcd3e2;color:#eef4f7;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:#c5d4dd;background:var(--paper2);}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:inherit;font-size:16.5px;color:var(--ink);cursor:pointer;transition:.16s;}
.opt:hover{border-color:#a9c9dd;background:var(--paper2);}
.opt.sel{border-color:var(--blue);background:rgba(14,124,196,.07);animation:glow 1.6s ease infinite;}
.opt.sel .badge{background:var(--blue);color:#fff;border-color:var(--blue);}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .badge{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt.wrong .badge{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dis{cursor:default;}.opt.dis:hover{background:var(--paper);}
.badge{flex:0 0 auto;width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--ink2);}
.seg{display:flex;gap:5px;}
.seg i{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.3);transition:.35s;}
.seg i.on{background:#fff;}
.rule{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
.rule:last-child{border-bottom:none;}
.ic{flex:0 0 auto;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(14,124,196,.1);color:var(--blue);}
.dot{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid var(--line);}
.dot.ok{background:var(--green);border-color:var(--green);}
.dot.bad{background:var(--red);border-color:var(--red);}
.sol{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
.reset{background:none;border:none;color:rgba(255,255,255,.7);font-family:inherit;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.reset:hover{color:#fff;}
.chip{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;color:var(--ink);}
.icbtn{width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.16);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icbtn:hover{background:rgba(255,255,255,.26);}
.timer{display:inline-flex;align-items:center;gap:8px;font-family:'Montserrat',monospace;font-weight:800;font-size:17px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-variant-numeric:tabular-nums;color:var(--ink);}
.timer.danger{color:var(--red);border-color:rgba(223,84,74,.4);animation:pulse 1s ease infinite;}
.input{width:100%;background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-family:inherit;font-size:17px;color:var(--ink);outline:none;}
.input:focus{border-color:var(--blue);}
.xpbar{height:10px;border-radius:99px;background:var(--paper2);overflow:hidden;border:1px solid var(--line);}
.xpfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal1),var(--green));border-radius:99px;transition:width .6s;}
.mile{display:flex;gap:12px;align-items:center;border-radius:14px;padding:14px 16px;margin-top:14px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--amber);}
.toggle{display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:11px;padding:4px;gap:4px;}
.toggle button{font-family:inherit;font-weight:700;font-size:14px;border:none;background:none;color:#fff;padding:8px 13px;border-radius:8px;cursor:pointer;}
.toggle button.active{background:#fff;color:var(--blue);}
.loader{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite;}
svg.lic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.srow{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;border:1px solid transparent;}
.srow.me{background:rgba(14,124,196,.08);border-color:rgba(14,124,196,.25);}
.rk{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--paper2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:Montserrat,sans-serif;color:var(--ink);}
</style>

function weekKey(key){var a=key.split("-").map(Number);var dn=Math.floor(Date.UTC(a[0],a[1]-1,a[2])/864e5);return "W"+Math.floor((dn+3)/7);}
function lbPush(entry) {
  if (!fbdb) return;
  try {
    fbdb.ref("lb/daily/" + entry.date + "/" + entry.id).set({ name: entry.name, score: entry.score, elapsed: entry.elapsed, ts: entry.ts });
    var wk = weekKey(entry.date);
    fbdb.ref("lb/weekly/" + wk + "/" + entry.id).update({ name: entry.name, ts: entry.ts, weekScore: firebase.database.ServerValue.increment(entry.score) });
  } catch (e) {}
}
function lbLoadDaily() { if (!fbdb) return Promise.resolve(null); return fbdb.ref("lb/daily/" + today.key).once("value").then(s => { var o = s.val() || {}; return Object.keys(o).map(k => Object.assign({ id: k }, o[k])); }).catch(() => null); }
function lbLoadWeekly() { if (!fbdb) return Promise.resolve(null); var wk = weekKey(today.key); return fbdb.ref("lb/weekly/" + wk).once("value").then(s => { var o = s.val() || {}; return Object.keys(o).map(k => Object.assign({ id: k }, o[k])); }).catch(() => null); }

function todayInfo(){const n=new Date(),y=n.getFullYear(),m=n.getMonth(),d=n.getDate();
  const key=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
  const dn=Math.floor(new Date(y,m,d).getTime()/864e5);
  const setId=((dn%QUESTION_SETS.length)+QUESTION_SETS.length)%QUESTION_SETS.length;
  return{key,setId,label:d+"-"+UZ_MONTHS[m]+", "+y,weekday:UZ_WEEKDAYS[n.getDay()]};}
function shiftKey(key,delta){const a=key.split("-").map(Number);const dt=new Date(a[0],a[1]-1,a[2]+delta);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}
function genId(){return "u"+Math.random().toString(36).slice(2)+Date.now().toString(36);}
function fmt(s){s=Math.max(0,s);return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function levelInfo(xp){let lvl=1,need=100,total=0;while(lvl<999&&xp>=total+need){total+=need;lvl++;need=Math.round(need*1.32);}const into=xp-total;const rank=lvl>=10?"Daho":lvl>=6?"Usta":lvl>=3?"Bilimdon":"Boshlovchi";return{level:lvl,rank,into,need,pct:Math.min(1,into/need)};}

function tone(f,dur,g,delay){g=g||0.05;delay=delay||0;const c=ac();if(!c)return;const t=c.currentTime+delay,o=c.createOscillator(),ga=c.createGain();o.type="sine";o.frequency.value=f;o.connect(ga);ga.connect(c.destination);ga.gain.setValueAtTime(0.0001,t);ga.gain.linearRampToValueAtTime(g,t+0.012);ga.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.03);}

/* holat */
const today=todayInfo();
let timerInt=null, countDownInt=null;
const state={phase:"loading",profile:null,result:null,history:[],selections:Array(10).fill(null),current:0,startedAt:0,setId:today.setId,muted:false,justSubmitted:false,onlyMistakes:false,counted:false,confetti:false};

function questions(){return QUESTION_SETS[state.result?state.result.setId:state.setId];}
function scoreMsg(s){return s>=9?{t:"Ajoyib natija!",e:"🎉",c:"var(--green)"}:s>=7?{t:"Yaxshi ish!",e:"👏",c:"var(--blue)"}:s>=5?{t:"O'rtacha — mashq qiling.",e:"💪",c:"var(--blue)"}:{t:"Harakatni oshiramiz.",e:"📚",c:"var(--red)"};}

/* fon formulalari */
(function(){const fbg=document.getElementById("fbg");FORMULAS.forEach((f,i)=>{const s=document.createElement("span");s.textContent=f;s.style.top=((i*37+6)%94)+"%";s.style.left=((i*53+4)%90)+"%";s.style.transform="rotate("+(((i*47)%60)-30)+"deg)";s.style.fontSize=(13+(i%4)*5)+"px";s.className="disp";fbg.appendChild(s);});})();

function wordmark(scale){scale=scale||1;return '<div style="display:flex;align-items:center;gap:12px"><img src="'+LOGO+'" alt="IDC" style="height:'+(58*scale)+'px;width:auto;display:block"><div style="line-height:1.02"><div class="disp" style="font-weight:800;font-size:'+(21*scale)+'px;color:var(--ink)">MAJBURIY</div><div class="disp" style="font-weight:800;font-size:'+(21*scale)+'px;color:var(--blue)">MATEMATIKA</div></div></div>';}
const mute=()=>'<button class="icbtn" data-act="mute">'+(state.muted?I.mute:I.vol)+'</button>';

/* boshqaruv */
function init(){
  try{var params=new URLSearchParams(location.search);if(ADMIN_KEY&&params.get("admin")===ADMIN_KEY){state.phase="admin";state.adminTab="daily";render();return;}}catch(e){}
  state.profile=LS.get(K.profile);
  const res=LS.get(K.result),att=LS.get(K.attempt);
  state.history=LS.get(K.history)||[];
  if(res&&res.date===today.key){state.result=res;state.selections=res.selections;state.justSubmitted=false;state.counted=true;state.phase="result";render();return;}
  if(att&&att.date===today.key){state.startedAt=att.startedAt;state.selections=att.selections||Array(10).fill(null);state.current=att.current||0;state.phase="quiz";render();return;}
  state.phase=state.profile&&state.profile.name?"intro":"name";render();
}
function persistAttempt(){LS.set(K.attempt,{date:today.key,startedAt:state.startedAt,selections:state.selections,current:state.current});}
function startQuiz(){ac();state.justSubmitted=false;state.counted=false;state.confetti=false;state.startedAt=Date.now();state.selections=Array(10).fill(null);state.current=0;state.setId=today.setId;persistAttempt();if(!state.muted)sStart();state.phase="quiz";render();}
function choose(i){if(!state.muted)sBlip();else ac();state.selections[state.current]=i;persistAttempt();render();}
function nav(d){state.current+=d;persistAttempt();render();}
function saveName(){const v=(document.getElementById("nameI").value||"").trim();const p={id:genId(),name:v||"Mehmon",streak:0,bestStreak:0,lastDate:null,totalXP:0,freezes:1};state.profile=p;LS.set(K.profile,p);state.phase="intro";render();}

function submitQuiz(){
  if(state.justSubmitted)return; state.justSubmitted=true; if(timerInt)clearInterval(timerInt);
  const set=QUESTION_SETS[state.setId];
  const score=state.selections.reduce((a,s,i)=>a+(s===set[i].correct?1:0),0);
  const elapsed=state.startedAt?Math.min(TEST,Math.floor((Date.now()-state.startedAt)/1000)):0;
  const p=state.profile||{};
  const yest=shiftKey(today.key,-1),two=shiftKey(today.key,-2);
  let streak=1,freezeUsed=false,freezes=(p.freezes==null?1:p.freezes);
  if(p.lastDate===yest)streak=(p.streak||0)+1;
  else if(p.lastDate===today.key)streak=p.streak||1;
  else if(p.lastDate===two&&freezes>0){streak=(p.streak||0)+1;freezes--;freezeUsed=true;}
  const best=Math.max(p.bestStreak||0,streak);
  if(streak%7===0)freezes++;
  const xpEarned=score*10;
  const totalXP=(p.totalXP||0)+xpEarned;
  const milestone=[3,7,14,30,50,100].indexOf(streak)>=0?streak:null;
  const newProf=Object.assign({},p,{id:p.id||genId(),name:p.name||"Mehmon",lastDate:today.key,streak:streak,bestStreak:best,totalXP:totalXP,freezes:freezes});
  const data={date:today.key,setId:state.setId,selections:state.selections.slice(),score:score,elapsed:elapsed,streak:streak,xpEarned:xpEarned,freezeUsed:freezeUsed,milestone:milestone};
  state.profile=newProf;state.result=data;state.counted=false;state.confetti=(score>=9||!!milestone);
  let hist=LS.get(K.history)||[];hist=hist.filter(h=>h.date!==today.key);hist.push({date:today.key,score:score,xp:xpEarned,elapsed:elapsed});hist=hist.slice(-30);state.history=hist;
  LS.set(K.result,data);LS.set(K.profile,newProf);LS.set(K.history,hist);LS.del(K.attempt);
  lbPush({id:newProf.id,name:newProf.name,score:score,elapsed:elapsed,date:today.key,ts:Date.now()});
  if(!state.muted)sFinish();
  state.phase="result";render();
}
function resetDemo(){LS.del(K.result);LS.del(K.attempt);state.result=null;state.selections=Array(10).fill(null);state.current=0;state.justSubmitted=false;state.onlyMistakes=false;state.startedAt=0;state.counted=false;state.confetti=false;state.phase="intro";render();}

/* render */
const app=document.getElementById("app");
function render(){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  if(countDownInt){clearInterval(countDownInt);countDownInt=null;}
  let html="";
  if(state.phase==="loading")html='<div class="fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;gap:16px"><div class="loader"></div><p style="color:rgba(255,255,255,.85)">Yuklanmoqda…</p></div>';
  else if(state.phase==="name")html=viewName();
  else if(state.phase==="intro")html=viewIntro();
  else if(state.phase==="quiz")html=viewQuiz();
  else if(state.phase==="result")html=viewResult();
  else if(state.phase==="admin")html=viewAdmin();
  app.innerHTML=html;
  if(state.phase==="quiz")startTimer();
  if(state.phase==="result")afterResult();
  if(state.phase==="admin")fillAdmin();
  if(state.phase==="name"){const el=document.getElementById("nameI");if(el)el.focus();}
}
function viewName(){return '<div class="fade" style="min-height:440px;display:flex;flex-direction:column;justify-content:center">'
  +'<div style="text-align:center;margin-bottom:22px"><div style="display:inline-flex">'+wordmark(1.1)+'</div></div>'
  +'<div class="card" style="padding:22px"><h1 class="disp" style="font-size:24px;font-weight:800;margin:0 0 6px">Ismingiz nima?</h1>'
  +'<p style="color:var(--ink2);font-size:14.5px;margin-bottom:18px">Bu ism natija ekranida ko\'rinadi.</p>'

  +'<button class="btn btn-primary" data-act="saveName" style="width:100%;margin-top:18px">Davom etish '+I.right+'</button></div></div>';}

  +'<h1 class="disp h" style="font-size:clamp(26px,7vw,38px);line-height:1.05;margin:14px 0 0">Salom, '+esc(p.name||"")+'! 👋</h1>'
  +'<div class="date">'+I.cal+' '+today.weekday+', '+today.label+'</div>'

  +'<button class="btn btn-primary" data-act="start" style="width:100%;margin-top:18px">Testni boshlash '+I.right+'</button></div>';}

function viewQuiz(){const Q=questions()[state.current];const sel=state.selections[state.current];const last=state.current===9;
  let opts=Q.options.map((o,i)=>'<button class="opt'+(sel===i?' sel':'')+'" data-act="choose" data-val="'+i+'"><span class="badge">'+LETTERS[i]+'</span>'+esc(o)+'</button>').join("");
  let segs="";for(let i=0;i<10;i++)segs+='<i class="'+(i<=state.current?'on':'')+'"></i>';
  let nav='';if(state.current>0)nav+='<button class="btn btn-ghost" data-act="prev">'+I.left+' Orqaga</button>';
  nav+=last?'<button class="btn btn-primary" data-act="submit" style="flex:1"'+(state.selections.some(s=>s===null)?' disabled':'')+'>Yakunlash '+I.check+'</button>':'<button class="btn btn-primary" data-act="next" style="flex:1"'+(sel===null?' disabled':'')+'>Keyingi '+I.right+'</button>';
  const cnt=state.selections.filter(s=>s!==null).length;
  return '<div><div class="top"><span class="timer" id="tmrbox">'+I.timer+' <span id="tmr">'+fmt(TEST-Math.floor((Date.now()-state.startedAt)/1000))+'</span></span>'+mute()+'</div>'
  +'<div style="display:flex;justify-content:space-between;align-items:baseline;margin:14px 0 10px"><span class="disp" style="font-weight:800;font-size:17px;color:#fff">'+String(state.current+1).padStart(2,"0")+'<span style="opacity:.75"> / 10</span></span><span style="font-size:13.5px;color:rgba(255,255,255,.85)">'+cnt+' ta belgilandi</span></div>'
  +'<div class="seg">'+segs+'</div>'
  +'<div class="fade" style="margin-top:18px"><div class="card" style="padding:20px"><h2 class="disp" style="font-size:clamp(21px,5.4vw,27px);line-height:1.25;font-weight:700;margin:0">'+esc(Q.q)+'</h2></div>'
  +'<div style="display:flex;flex-direction:column;gap:11px;margin-top:14px">'+opts+'</div></div>'
  +'<div style="display:flex;gap:12px;margin-top:22px">'+nav+'</div></div>';}

function viewResult(){const qs=questions();const res=state.result;const msg=scoreMsg(res.score);
  const lv=levelInfo(state.profile?state.profile.totalXP||0:0);
  const wrong=qs.filter((Q,i)=>res.selections[i]!==Q.correct).length;
  let dots="";qs.forEach((Q,i)=>{dots+='<div class="dot '+(res.selections[i]===Q.correct?'ok':'bad')+'" style="animation:dotin .35s both;animation-delay:'+(0.15+i*0.06)+'s"></div>';});
  let mile="";
  if(state.justSubmitted&&res.milestone)mile+='<div class="mile"><span style="font-size:26px">🏆</span><div><div class="disp" style="font-weight:800;font-size:17px">'+res.milestone+' kunlik streak bosqichi!</div><div style="color:var(--ink2);font-size:14px">Ajoyib izchillik!</div></div></div>';
  if(state.justSubmitted&&res.freezeUsed)mile+='<div class="mile" style="border-left-color:var(--ice)">'+I.snow+'<div><div class="disp" style="font-weight:800;font-size:16px">Streak muzlatildi ❄️</div><div style="color:var(--ink2);font-size:14px">Bir kun o\'tkazsangiz ham streak saqlandi.</div></div></div>';
  let chart="";
  if(state.history.length){let bars="";state.history.slice(-14).forEach((h,i)=>{const c=BRAND[i%BRAND.length];const hp=Math.max(6,(h.score/10)*100);bars+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end"><span style="font-size:11px;font-weight:800;color:'+c+';font-family:Montserrat,sans-serif">'+h.score+'</span><div style="width:100%;max-width:26px;height:'+hp+'%;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,'+c+','+c+'aa);box-shadow:0 4px 12px -3px '+c+'88"></div><span style="font-size:10px;color:var(--ink2)">'+h.date.slice(8)+'</span></div>';});
    chart='<h3 class="disp h" style="font-size:22px;margin:26px 0 12px;display:flex;align-items:center;gap:8px">'+I.bars+' Taraqqiyot</h3><div class="card" style="padding:18px 14px 12px"><div style="display:flex;align-items:flex-end;gap:6px;height:150px">'+bars+'</div><div style="text-align:center;font-size:12px;color:var(--ink2);margin-top:8px">Oxirgi '+Math.min(14,state.history.length)+' kun</div></div>';}
  let analysis="";qs.forEach((Q,qi)=>{const us=res.selections[qi];const ok=us===Q.correct;if(state.onlyMistakes&&ok)return;
    let o=Q.options.map((opt,oi)=>{let cls="opt dis";if(oi===Q.correct)cls+=" correct";else if(oi===us)cls+=" wrong";let tag="";if(oi===Q.correct)tag='<span style="font-size:12px;font-weight:800;color:var(--green)">TO\'G\'RI</span>';else if(oi===us)tag='<span style="font-size:12px;font-weight:800;color:var(--red)">SIZNING JAVOBINGIZ</span>';return '<div class="'+cls+'" style="font-size:15.5px;padding:11px 13px"><span class="badge" style="width:28px;height:28px;font-size:13.5px">'+LETTERS[oi]+'</span><span style="flex:1">'+esc(opt)+'</span>'+tag+'</div>';}).join("");

  if(state.onlyMistakes&&wrong===0)analysis='<div class="card" style="padding:18px;text-align:center;color:var(--green);font-weight:700">Birorta ham xato yo\'q — barakalla! 🎉</div>';

  +'<div style="display:flex;justify-content:space-between;align-items:center;margin:26px 0 12px;gap:10px;flex-wrap:wrap"><h3 class="disp h" style="font-size:22px;margin:0">Savollar tahlili</h3><div class="toggle"><button class="'+(!state.onlyMistakes?'active':'')+'" data-act="all">Hammasi</button><button class="'+(state.onlyMistakes?'active':'')+'" data-act="miss">'+I.filter+' Xatolar'+(wrong?' ('+wrong+')':'')+'</button></div></div>'
  +'<div style="display:flex;flex-direction:column;gap:16px">'+analysis+'</div>'
  +'</div>';}

function startTimer(){if(timerInt)clearInterval(timerInt);timerInt=setInterval(function(){const rem=TEST-Math.floor((Date.now()-state.startedAt)/1000);const el=document.getElementById("tmr");const box=document.getElementById("tmrbox");if(el)el.textContent=fmt(rem);if(box)box.classList.toggle("danger",rem<=60);if(rem<=0){clearInterval(timerInt);timerInt=null;submitQuiz();}},1000);}
function startCountdown(){if(countDownInt)clearInterval(countDownInt);const upd=function(){const el=document.getElementById("cd");if(!el)return;let s=Math.max(0,Math.floor(msToMidnight()/1000));el.textContent=String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");};upd();countDownInt=setInterval(upd,1000);}
function viewAdmin(){
  var when=state.adminTab==="weekly"?"Joriy hafta":today.weekday+", "+today.label;
  return '<div class="fade"><div class="top"><span class="kicker">'+I.trophy+' Ustoz paneli</span><button class="icbtn" data-act="refresh">'+I.redo+'</button></div>'
  +'<div class="card" style="padding:18px;text-align:center;margin-top:12px"><div style="display:inline-flex">'+wordmark(0.9)+'</div></div>'
  +'<div style="display:flex;justify-content:center;margin:18px 0 10px"><div class="toggle"><button class="'+(state.adminTab==="daily"?"active":"")+'" data-act="tabDaily">Kunlik</button><button class="'+(state.adminTab==="weekly"?"active":"")+'" data-act="tabWeekly">Haftalik</button></div></div>'
  +'<div style="color:rgba(255,255,255,.85);font-size:13px;text-align:center;margin-bottom:10px">'+when+'</div>'
  +'<div class="card" id="adminlb" style="padding:8px"></div></div>';
}
function fillAdmin(){
  var card=document.getElementById("adminlb");if(!card)return;
  if(!fbdb){card.innerHTML='<div style="padding:16px;color:var(--ink2);font-size:14px;line-height:1.5">Firebase sozlanmagan. O\'quvchilar natijasi sizga kelishi uchun faylga Firebase sozlamasini qo\'shing.</div>';return;}
  card.innerHTML='<div style="padding:16px;color:var(--ink2);font-size:14px">Yuklanmoqda…</div>';
  var p=state.adminTab==="weekly"?lbLoadWeekly():lbLoadDaily();
  p.then(function(list){
    if(!list){card.innerHTML='<div style="padding:16px;color:var(--ink2)">Yuklab bo\'lmadi.</div>';return;}
    if(!list.length){card.innerHTML='<div style="padding:16px;color:var(--ink2)">Hozircha natija yo\'q.</div>';return;}
    if(state.adminTab==="weekly")list.sort(function(a,b){return (b.weekScore||0)-(a.weekScore||0);});
    else list.sort(function(a,b){return (b.score-a.score)||(a.elapsed-b.elapsed);});
    var rows=list.map(function(e,i){var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);var val=state.adminTab==="weekly"?(e.weekScore||0):e.score;var sub=state.adminTab==="weekly"?'':'<span style="color:var(--ink2);font-size:13px;margin-right:10px">'+fmt(e.elapsed||0)+'</span>';return '<div class="srow"><span class="rk">'+medal+'</span><span style="flex:1;font-weight:600;font-size:15.5px">'+esc(e.name||"—")+'</span>'+sub+'<span class="disp" style="font-weight:800;color:var(--ink)">'+val+'</span></div>';}).join("");
    card.innerHTML=rows;
  });
}
function afterResult(){
  startCountdown();
  if(state.justSubmitted&&!state.counted){state.counted=true;
    const target=state.result.score;const el=document.getElementById("bigscore");if(el)el.textContent="0";
    if(target>0){let n=0;const si=setInterval(function(){n++;const e=document.getElementById("bigscore");if(e)e.textContent=n;if(n>=target)clearInterval(si);},110);}
    if(state.confetti){const sc=document.getElementById("scorecard");if(sc){for(let i=0;i<70;i++){const s=document.createElement("span");const col=BRAND[i%BRAND.length];const sz=6+Math.random()*8;s.style.cssText="position:absolute;top:-24px;left:"+(Math.random()*100)+"%;width:"+sz+"px;height:"+(sz*0.6)+"px;background:"+col+";border-radius:2px;transform:rotate("+(Math.random()*360)+"deg);animation:conf "+(1.8+Math.random()*1.6)+"s "+(Math.random()*0.5)+"s ease-in forwards";sc.appendChild(s);}}}
  }
}

/* event delegatsiya */
app.addEventListener("click",function(e){
  const t=e.target.closest("[data-act]");if(!t)return;
  const a=t.dataset.act;
  if(a==="mute"){ac();state.muted=!state.muted;render();}
  else if(a==="saveName")saveName();
  else if(a==="start")startQuiz();
  else if(a==="choose")choose(parseInt(t.dataset.val,10));
  else if(a==="next")nav(1);
  else if(a==="prev")nav(-1);
  else if(a==="submit")submitQuiz();
  else if(a==="all"){state.onlyMistakes=false;render();}
  else if(a==="miss"){state.onlyMistakes=true;render();}
  else if(a==="reset")resetDemo();
  else if(a==="refresh")fillAdmin();
  else if(a==="tabDaily"){state.adminTab="daily";render();}
  else if(a==="tabWeekly"){state.adminTab="weekly";render();}
});
app.addEventListener("keydown",function(e){if(e.key==="Enter"&&state.phase==="name"){saveName();}});

init();
</script>
</body>
