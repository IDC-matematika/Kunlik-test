) = 3."},332:{q:"Решите уравнение: (x + 3) : 2 = 5",s:"x + 3 = 5 · 2 = 10.\nx = 10 − 3 = 7."},13:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + 2y = 16</span><span>x − y = 2</span></span></span>",s:"Из второго уравнения: x = y+2.\nПодставляем в первое: 3(y+2)+2y=16.\n3y+6+2y=16. 5y=10. y=2.\nx = 2+2 = 4.\nРешение: (4, 2).\nПроверка: 3·4+2·2=16 ✓; 4−2=2 ✓"},21:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 3x − 1</span><span>y = x + 5</span></span></span>",s:"Способ приравнивания: 3x−1 = x+5.\n2x = 6, x = 3.\ny = 3·3−1 = 8.\nРешение: (3, 8).\nПроверка: y=3+5=8 ✓; y=9−1=8 ✓"},84:{q:"Из системы уравнений найдите значение x·y:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x = y − 1</span><span>x + 2y = 2</span></span></span>",s:"x=y−1 во второе: (y−1)+2y=2 → 3y=3 → y=1.\nx=1−1=0.\nx·y = 0×1 = 0."},225:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 10</span><span>x − y = 4</span></span></span>",s:"Складываем два уравнения: 2x = 14 → x = 7.\ny = 10 − 7 = 3.\nРешение: (7, 3)."},226:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x − y = 7</span><span>x + y = 5</span></span></span>",s:"Складываем: 4x = 12 → x = 3.\ny = 5 − 3 = 2.\nРешение: (3, 2)."},227:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 2x</span><span>x + y = 9</span></span></span>",s:"y = 2x во второе: x + 2x = 9 → 3x = 9 → x = 3.\ny = 2·3 = 6.\nРешение: (3, 6)."},333:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 7</span><span>x − y = 3</span></span></span>",s:"Складываем: 2x = 10 → x = 5.\ny = 7 − 5 = 2.\nРешение: (5, 2)."},334:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 10</span><span>x − y = 2</span></span></span>",s:"Складываем: 2x = 12 → x = 6.\ny = 10 − 6 = 4.\nРешение: (6, 4)."},335:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 2x</span><span>x + y = 12</span></span></span>",s:"y = 2x во второе: x + 2x = 12 → 3x = 12 → x = 4.\ny = 2·4 = 8.\nРешение: (4, 8)."},336:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 8</span><span>y = x + 2</span></span></span>",s:"y = x+2 подставляем: x + (x+2) = 8 → 2x = 6 → x = 3.\ny = 3 + 2 = 5.\nРешение: (3, 5)."},337:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + y = 11</span><span>y = 3</span></span></span>",s:"y = 3 подставляем: 2x + 3 = 11 → 2x = 8 → x = 4.\nРешение: (4, 3)."},338:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x − y = 2</span><span>2x + y = 13</span></span></span>",s:"Складываем: 3x = 15 → x = 5.\ny = x − 2 = 3.\nРешение: (5, 3)."},339:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + 2y = 12</span><span>x = 2</span></span></span>",s:"x = 2 подставляем: 6 + 2y = 12 → 2y = 6 → y = 3.\nРешение: (2, 3)."},340:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + 2y = 11</span><span>x = 3</span></span></span>",s:"x = 3 подставляем: 3 + 2y = 11 → 2y = 8 → y = 4.\nРешение: (3, 4)."},341:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 6</span><span>2x − y = 6</span></span></span>",s:"Складываем: 3x = 12 → x = 4.\ny = 6 − 4 = 2.\nРешение: (4, 2)."},342:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = x + 1</span><span>x + y = 9</span></span></span>",s:"y = x+1 подставляем: x + (x+1) = 9 → 2x = 8 → x = 4.\ny = 5.\nРешение: (4, 5)."},343:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + 3y = 12</span><span>y = 2</span></span></span>",s:"y = 2 подставляем: 2x + 6 = 12 → 2x = 6 → x = 3.\nРешение: (3, 2)."},344:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 5</span><span>x − y = −3</span></span></span>",s:"Складываем: 2x = 2 → x = 1.\ny = 5 − 1 = 4.\nРешение: (1, 4)."},345:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>4x − y = 10</span><span>x + y = 5</span></span></span>",s:"Складываем: 5x = 15 → x = 3.\ny = 5 − 3 = 2.\nРешение: (3, 2)."},346:{q:"Сумма двух чисел равна 15, разность — 3. Найдите большее число.",s:"x + y = 15, x − y = 3.\nСкладываем: 2x = 18 → x = 9 (большее).\n(y = 6.)"}});
Object.assign(QRU,{10:{q:"Приведите (−3a²b)³ к стандартному виду.",s:"Правило: (ab)ⁿ = aⁿ·bⁿ и (aᵐ)ⁿ = aᵐ·ⁿ.\n(−3a²b)³ = (−3)³·(a²)³·b³.\n(−3)³ = −27.\n(a²)³ = a^(2·3) = a⁶.\nРезультат: −27a⁶b³."},11:{q:"Перемножьте и упростите (x + 5)(x − 3).",s:"(x+5)(x−3) = x·x + x·(−3) + 5·x + 5·(−3)\n= x² − 3x + 5x − 15\n= x² + 2x − 15.\nПравило: (x+a)(x+b) = x² + (a+b)x + a·b.\nЗдесь a=5, b=−3: 5+(−3)=2, 5·(−3)=−15. ✓"},23:{q:"Упростите выражение 5a²b − 3ab² + 2a²b и найдите его значение при a=2, b=1.",s:"5a²b + 2a²b − 3ab² = 7a²b − 3ab².\nПри a=2, b=1: 7·(2²)·1 − 3·2·(1²) = 7·4 − 6 = 28 − 6 = 22.\nОтвет: 22."},28:{q:"Чему равны коэффициент и степень одночлена −4x³y²z?",s:"В стандартном виде −4x³y²z:\nКоэффициент = −4 (числовая часть).\nСтепень = сумма показателей = 3+2+1 = 6.\nПримечание: z = z¹, степень 1.",o:["коэф.: −4, степень: 6","коэф.: −4, степень: 5","коэф.: 4, степень: 6","коэф.: −4, степень: 7"]},36:{q:"Найдите значение выражения a²−b² при a=3,25 и b=1,25.",s:"a²−b² = (a−b)(a+b).\na−b = 3,25 − 1,25 = 2.\na+b = 3,25 + 1,25 = 4,5.\nРезультат = 2 × 4,5 = 9.\nПроверка: (3,25)² − (1,25)² = 10,5625 − 1,5625 = 9 ✓"},38:{q:"Упростите выражение: −(a−b) + 6 − (b−a+3)",s:"−(a−b) + 6 − (b−a+3)\n= −a+b + 6 − b+a−3\n= (−a+a) + (b−b) + (6−3)\n= 0 + 0 + 3 = 3."},43:{q:"Разложите на множители: 51b + 57a",s:"51b + 57a = 3(17b + 19a) = 3(19a + 17b).\nПроверка: 3×19a=57a ✓; 3×17b=51b ✓."},50:{q:"Упростите выражение: 3a − 6a³ : 3a²",s:"6a³ : 3a² = 2a.\n3a − 2a = a."},61:{q:"Упростите: −3 − (−2 + a − b) − (b − a) − 1",s:"−3 − (−2 + a − b) − (b − a) − 1\n= −3 + 2 − a + b − b + a − 1\n= (−3 + 2 − 1) + (−a + a) + (b − b)\n= −2 + 0 + 0 = −2."},63:{q:"Найдите значение выражения (2a²−b/3)·2 при a=5, b=15.",s:"2a² = 2×25 = 50.\nb/3 = 15/3 = 5.\n(50−5)×2 = 45×2 = 90."},100:{q:"Упростите: 4(x+1) + 2(2−x)",s:"4x+4+4−2x = 2x+8."},103:{q:"Упростите выражение 8 + b + a − (a + 4 − b).",s:"8 + b + a − a − 4 + b\n= (8−4) + (b+b) + (a−a)\n= 4 + 2b."},116:{q:"Вычислите значение a²−b² при a=4,25 и b=2,25.",s:"a²−b² = (a−b)(a+b).\na−b = 4,25−2,25 = 2.\na+b = 4,25+2,25 = 6,5.\nРезультат = 2 × 6,5 = 13."},133:{q:"Разложите на множители: 6ab²c − 18abc",s:"Общий множитель: 6abc.\n6ab²c − 18abc = 6abc(b − 3).\nПроверка: 6abc·b = 6ab²c ✓; 6abc·3 = 18abc ✓"},135:{q:"Упростите: (2a²−6a³)·2a",s:"(2a²−6a³)·2a = 2a²·2a − 6a³·2a = 4a³ − 12a⁴."},136:{q:"Упростите: (2a²+6a):2a",s:"(2a²+6a):2a = 2a²/2a + 6a/2a = a + 3."},141:{q:"Упростите: (x+2)·(x²−2x+4) − 4",s:"(x+2)(x²−2x+4) = x³ + 8 (формула суммы кубов: a³+b³).\nx³ + 8 − 4 = x³ + 4."},142:{q:"Упростите: a(b−c) − b(c−a) − c(a−b)",s:"a(b−c) = ab−ac.\n−b(c−a) = −bc+ab.\n−c(a−b) = −ac+bc.\nСумма: ab−ac−bc+ab−ac+bc = 2ab−2ac."},145:{q:"Вычислите значение x²−y² при x=8,25 и y=−2,25.",s:"x²−y² = (x−y)(x+y).\nx−y = 8,25−(−2,25) = 10,5.\nx+y = 8,25+(−2,25) = 6.\nРезультат = 10,5 × 6 = 63."},146:{q:"Вычислите значение x²y + y²x при xy=2 и x+y=3.",s:"x²y + y²x = xy(x+y) = 2 × 3 = 6."},174:{q:"Найдите значение a³−b³−3ab(a−b) при a=8,5 и b=2,5.",s:"a³−b³−3ab(a−b) = (a−b)³ (формула куба разности).\n(8,5−2,5)³ = 6³ = 216."},221:{q:"Найдите произведение −5x²y · 2xy³.",s:"Коэффициенты: −5 · 2 = −10.\nx²·x = x³, y·y³ = y⁴.\nРезультат: −10x³y⁴."},222:{q:"Упростите 6a⁴b³ : 2a²b.",s:"6:2 = 3, a⁴:a² = a², b³:b = b².\nРезультат: 3a²b²."},223:{q:"Приведите одночлен (2x³)² к стандартному виду.",s:"(2x³)² = 2²·(x³)² = 4·x⁶ = 4x⁶."},224:{q:"Сложите подобные одночлены −3a²bc и 4a²bc.",s:"При сложении подобных одночленов складываются коэффициенты:\n−3 + 4 = 1 → a²bc."},309:{q:"Найдите произведение 3x · 4x.",s:"Коэффициенты: 3·4 = 12.\nБуквы: x·x = x².\nРезультат: 12x²."},310:{q:"Найдите произведение −2a · 5a.",s:"Коэффициенты: −2·5 = −10.\na·a = a².\nРезультат: −10a²."},311:{q:"Упростите x² · x³.",s:"Основания одинаковые → показатели складываются: x^(2+3) = x⁵."},312:{q:"Упростите 6x⁵ : 2x².",s:"Коэффициенты: 6:2 = 3.\nx⁵:x² = x³.\nРезультат: 3x³."},313:{q:"Упростите (3x²)².",s:"(3x²)² = 3²·(x²)² = 9·x⁴ = 9x⁴."},314:{q:"Найдите произведение −4ab · 2a.",s:"Коэффициенты: −4·2 = −8.\na·a = a², b остаётся.\nРезультат: −8a²b."},315:{q:"Найдите степень одночлена 7x³y.",s:"Степень = сумма показателей букв.\nx³ → 3, y → 1.\n3 + 1 = 4."},316:{q:"Найдите коэффициент одночлена −5x²y³.",s:"Коэффициент — числовая часть одночлена: −5."},317:{q:"Упростите 2x · 3y · x.",s:"Коэффициенты: 2·3 = 6.\nx·x = x², y остаётся.\nРезультат: 6x²y."},318:{q:"Упростите 12a³b² : 4ab.",s:"12:4 = 3.\na³:a = a², b²:b = b.\nРезультат: 3a²b."},319:{q:"Упростите (−2x)³.",s:"(−2x)³ = (−2)³·x³ = −8·x³ = −8x³.\nНечётная степень → отрицательное."},320:{q:"Сложите подобные одночлены 5x² + 3x².",s:"У подобных одночленов складываются коэффициенты, буквенная часть не меняется.\n(5+3)x² = 8x²."},321:{q:"Приведите одночлен 3·x·2·y·x к стандартному виду.",s:"Перемножаем числа: 3·2 = 6.\nБуквы: x·x·y = x²y.\nРезультат: 6x²y."},322:{q:"Найдите степень одночлена-произведения x³y · xy².",s:"x³y · xy² = x⁴y³.\nСтепень = 4 + 3 = 7."},366:{q:"Перемножьте (x + 4)(x − 4).",s:"Формула разности квадратов: (a+b)(a−b) = a²−b².\n(x+4)(x−4) = x² − 16."}});
Object.assign(QRU,{9:{q:"3 м³ 500 дм³ = ? литров",s:"1 м³ = 1000 дм³ = 1000 литров.\n3 м³ = 3000 дм³ = 3000 литров.\n3 м³ 500 дм³ = 3000 + 500 = 3500 дм³ = 3500 литров.\nПримечание: 1 дм³ = 1 литр."},14:{q:"Велосипедист за 4 часа проехал 96 км. На обратном пути он ехал на 4 км/ч медленнее. Сколько часов заняла обратная дорога?",s:"Скорость туда: v₁ = 96/4 = 24 км/ч.\nСкорость обратно: v₂ = 24 − 4 = 20 км/ч.\nВремя обратно: t = 96/20 = 4,8 часа.",o:["4,5 часа","5 часов","4,8 часа","6 часов"]},45:{q:"Автомобиль за 42 минуты проехал 7 км. Определите его скорость (км/ч).",s:"42 минуты = 42/60 = 0,7 часа.\nСкорость = 7 / 0,7 = 10 км/ч."},58:{q:"Машина едет со скоростью 60 км/ч, велосипед — 20 км/ч в противоположных направлениях. Через сколько часов расстояние между ними станет 240 км?",s:"Скорость удаления = 60+20 = 80 км/ч.\nt = 240/80 = 3 часа."},73:{q:"Скольким м² равны 18 соток?",s:"1 сотка = 1 ар = 100 м².\n18 соток = 18×100 = 1800 м².",o:["1800 м²","18 м²","180 м²","0,18 м²"]},96:{q:"Верёвку длиной 12 метров разрезали на 15 равных частей. Сколько см каждая часть?",s:"12 м = 1200 см.\n1200 / 15 = 80 см.",o:["8 см","80 см","120 см","100 см"]},109:{q:"От дома Бекзода до школы 2,5 км. Пройдя половину пути, сколько метров ему осталось до цели?",s:"2,5 км = 2500 м.\nПрошёл половину = 1250 м.\nОсталось = 2500 − 1250 = 1250 м.",o:["1250 м","750 м","2500 м","500 м"]},113:{q:"Сколькими литрами воды можно наполнить сосуд объёмом 1 м³?",s:"1 м = 10 дм → 1 м³ = 10³ дм³ = 1000 дм³.\n1 дм³ = 1 литр → 1 м³ = 1000 литров.",o:["100 литров","10 литров","1000 литров","10 000 литров"]},122:{q:"Черепаха проходит 2 метра за 1 минуту. За сколько часов она пройдёт 150 метров?",s:"Время на 150 метров: 150 ÷ 2 = 75 минут.\n75 минут = 75/60 = 1,25 часа.",o:["1 час","1,25 часа","1,5 часа","2 часа"]},123:{q:"Улитка проходит 0,5 метра за 1 минуту. За сколько времени она пройдёт 20 метров? (минут)",s:"20 ÷ 0,5 = 40 минут."},159:{q:"Скольким км/с равны 10 м/с?",s:"1 км = 1000 м.\n10 м = 10/1000 = 0,01 км.\n10 м/с = 0,01 км/с."},176:{q:"Сколько минут составляет 1/6 от 2,4 часа?",s:"2,4 часа = 144 минуты.\n144 × 1/6 = 24 минуты."},177:{q:"1/8 (половина четверти) груза в 7,2 тонны оказалась некачественной. Сколько груза некачественно?",s:"7,2 тонны = 7200 кг.\nПоловина четверти = 1/8.\n7200 × 1/8 = 900 кг.",o:["9 тонн","0,9 кг","90 кг","900 кг"]},179:{q:"Выразите 3200 кг в тоннах.",s:"1 тонна = 1000 кг.\n3200 кг = 3200/1000 = 3,2 тонны.",o:["3,3 т","3,5 т","3,6 т","3,2 т"]},184:{q:"Через сколько минут после 7:45 будет 9:15?",s:"От 7:45 до 9:15: 1 час 30 минут = 90 минут."},193:{q:"Выразите 40700 м² в гектарах и арах.",s:"1 га = 10000 м², 1 ар = 100 м².\n40700 м² = 40000 + 700 = 4 га + 7 ар.",o:["4 га 7 ар","40 га 7 ар","407 ар","4 га 700 ар"]},362:{q:"Скольким минутам равны 2,5 часа?",s:"1 час = 60 минут.\n2,5 · 60 = 150 минут."},363:{q:"Скольким граммам равны 3 кг 200 г?",s:"1 кг = 1000 г.\n3 кг = 3000 г.\n3000 + 200 = 3 200 г.",o:["320 г","3 200 г","3 020 г","32 000 г"]},364:{q:"Скольким метрам равны 1 км 250 м?",s:"1 км = 1000 м.\n1000 + 250 = 1 250 м.",o:["1 025 м","125 м","12 500 м","1 250 м"]},365:{q:"Машина едет со скоростью 60 км/ч. Какой путь она пройдёт за 2,5 часа?",s:"Путь = скорость × время = 60 · 2,5 = 150 км.",o:["120 км","150 км","30 км","240 км"]}});
Object.assign(QRU,{8:{q:"Найдите число вершин, рёбер и граней пятиугольной пирамиды.",s:"Формулы n-угольной пирамиды:\nВершины = n+1 = 5+1 = 6.\nРёбра = 2n = 2·5 = 10.\nГрани = n+1 = 5+1 = 6.\nАналогично треугольная (n=3): 4 вершины, 6 рёбер, 4 грани.",o:["6 верш., 10 рёбер, 6 граней","5 верш., 10 рёбер, 6 граней","6 верш., 8 рёбер, 5 граней","6 верш., 10 рёбер, 7 граней"]},24:{q:"Если ребро куба увеличить в 3 раза, во сколько раз увеличится площадь поверхности?",s:"Правило: при увеличении размеров в k раз площадь увеличивается в k² раз.\nРебро увеличено в 3 раза (a → 3a):\nНовая поверхность = 6·(3a)² = 6·9a² = 54a².\nУвеличение: 54a² / 6a² = в 9 раз.",o:["в 3 раза","в 6 раз","в 9 раз","в 27 раз"]},29:{q:"Измерения параллелепипеда 4 см, 5 см, 6 см. Чему равны площадь полной поверхности и объём?",s:"Площадь полной поверхности: S = 2(ab+bc+ac) = 2(4·5+5·6+4·6) = 2(20+30+24) = 2·74 = 148 см².\nОбъём: V = 4·5·6 = 120 см³.",o:["S=148 см², V=120 см³","S=120 см², V=148 см³","S=148 см², V=100 см³","S=108 см², V=120 см³"]},33:{q:"Измерения прямоугольного параллелепипеда: 6 см, 5 см, 5 см. Найдите его объём (см³).",s:"Объём = длина × ширина × высота = 6 × 5 × 5 = 150 см³.\nФормула: V = a × b × c.",o:["150 см³","25 см³","30 см³","120 см³"]},51:{q:"Полная поверхность куба равна 24 см². Найдите площадь его основания (см²).",s:"Полная поверхность = 6a² = 24 → a² = 4.\nПлощадь основания = a² = 4 см²."},66:{q:"Найдите объём стены длиной 8 м, шириной 0,5 м и высотой 2 м (м³).",s:"V = 8 × 0,5 × 2 = 8 м³."},81:{q:"Объём куба равен 27 м³. Найдите площадь его полной поверхности (м²).",s:"V = a³ = 27 → a = 3 м.\nПолная поверхность = 6a² = 6×9 = 54 м².",o:["3 м²","12 м²","18 м²","54 м²"]},86:{q:"Пиццу разделили на 8 равных частей. Объём одной части 800 см³. Найдите объём всей пиццы (см³).",s:"Всего = 8 × 800 = 6400 см³."},88:{q:"На покраску 3 м² уходит 1 литр краски. Сколько литров краски нужно, чтобы покрасить поверхность куба с ребром 1 м?",s:"Полная поверхность куба = 6a² = 6×1 = 6 м².\nКраска: 6/3 = 2 литра.",o:["3 литра","1 литр","2 литра","6 литров"]},98:{q:"У какого из тел больше всего граней? A) треугольная призма B) пятиугольная призма C) четырёхугольная пирамида D) куб",s:"Треугольная призма: n+2=5 граней.\nПятиугольная призма: n+2=7 граней.\nЧетырёхугольная пирамида: n+1=5 граней.\nКуб: 6 граней.\nБольше всего: пятиугольная призма — 7 граней.",o:["треугольная призма","пятиугольная призма","четырёхугольная пирамида","куб"]},106:{q:"Ребро куба равно 2. Найдите его объём.",s:"V = a³ = 2³ = 8.\nОбъём куба = ребро³."},107:{q:"Ребро куба равно 2. Найдите площадь полной поверхности.",s:"Полная поверхность = 6a² = 6 × 4 = 24.\nУ куба 6 равных граней, каждая = a² = 4."},108:{q:"Ребро куба равно 2. Найдите площадь боковой поверхности.",s:"Боковая поверхность = 4a² = 4 × 4 = 16.\n4 боковые грани (без основания и крышки)."},118:{q:"Площадь основания параллелепипеда 32 см², высота 8 см. Найдите объём.",s:"V = S_осн × h = 32 × 8 = 256 см³.",o:["256 см³","40 см³","128 см³","64 см³"]},119:{q:"Объём параллелепипеда 60 см³, площадь основания 12 см². Найдите высоту.",s:"h = V / S_осн = 60 / 12 = 5 см.",o:["5 см","6 см","4 см","8 см"]},139:{q:"Объём куба равен 8 м³. На покраску 1 м² уходит 250 мл краски. Сколько литров нужно, чтобы покрасить полную поверхность куба?",s:"V = a³ = 8 → a = 2 м.\nПолная поверхность = 6a² = 6×4 = 24 м².\nКраска: 24 × 250 мл = 6000 мл = 6 литров."},153:{q:"Полная поверхность куба равна 468 м². Найдите площадь одной грани куба.",s:"Полная поверхность = 6a² = 468 → a² = 78.\nПлощадь одной грани = a² = 78 м².",o:["72 м²","74 м²","76 м²","78 м²"]},158:{q:"Площадь основания куба равна 64. Найдите площадь полной поверхности куба.",s:"Площадь основания = a² = 64.\nПолная поверхность = 6a² = 6×64 = 384."},208:{q:"Из одной вершины параллелепипеда выходят рёбра 10 см, 10 см, 6 см. От него отрезали куб с ребром 6 см. Найдите объём оставшейся части.",s:"Весь параллелепипед: 10×10×6 = 600.\nОтрезанный куб: 6×6×6 = 216.\nОсталось: 600 − 216 = 384 см³."},361:{q:"Ребро куба равно 5 см. Найдите сумму длин всех рёбер куба.",s:"У куба 12 равных рёбер.\n12 · 5 = 60 см.",o:["60 см","30 см","125 см","20 см"]}});
Object.assign(QRU,{7:{q:"Катеты прямоугольного треугольника 6 см и 8 см. Чему равны гипотенуза и периметр?",s:"Теорема Пифагора: c = √(6²+8²) = √(36+64) = √100 = 10 см.\nПериметр: P = 6 + 8 + 10 = 24 см.\nЭто известный треугольник 6−8−10 (удвоенный 3−4−5).\nПлощадь: S = (6·8)/2 = 24 см².",o:["c=10 см, P=24 см","c=10 см, P=26 см","c=12 см, P=26 см","c=10 см, P=22 см"]},19:{q:"Периметр квадрата 36 см. Найдите его площадь.",s:"Периметр = 4a = 36 → a = 9 см.\nПлощадь = a² = 9² = 81 см².\nПримечание: у квадрата все стороны равны.",o:["81 см²","72 см²","64 см²","49 см²"]},26:{q:"Радиус круга 7 см. Чему равны площадь круга и длина окружности? (π ≈ 3,14)",s:"S = πr² = π·49 = 49π см².\nC = 2πr = 2π·7 = 14π см.\nЧисленно: 49·3,14=153,86 см², 14·3,14=43,96 см.\nПлощадь 49π см², длина 14π см.",o:["S=153,86 см², C=43,96 см","S=43,96 см², C=153,86 см","S=49π см², C=14π см","S=49π см², C=7π см"]},31:{q:"Площадь прямоугольника ABCD равна 18 см², сторона BC = 6 см. Найдите периметр квадрата DCEF.",s:"Площадь ABCD = AB×BC = AB×6 = 18 → AB = 3 см.\nDC = AB = 3 см (в прямоугольнике противоположные стороны равны).\nСторона квадрата DCEF = DC = 3 см.\nПериметр = 4×3 = 12 см.",o:["16 см","12 см","8 см","10 см"]},54:{q:"Площадь квадрата ABCD равна 9 см², периметр прямоугольника ABEF — 16 см. Найдите площадь прямоугольника CDFE (см²).",s:"Квадрат ABCD: S = 9 → сторона a = 3 см.\nПериметр ABEF: 2(AB + BE) = 2(3 + BE) = 16 → BE = 5 см.\nCDFE: CD = 3 см, EF = BE − BC = 5 − 3 = 2 см.\nS(CDFE) = CD × EF = 3 × 2 = 6 см².",o:["4 см²","6 см²","2 см²","8 см²"]},62:{q:"Периметр треугольника 27 см, его стороны 6, 12 и (2x+1). Найдите x.",s:"6 + 12 + (2x+1) = 27.\n19 + 2x = 27.\n2x = 8.\nx = 4."},67:{q:"Стороны прямоугольника 12 см и 3 см. Найдите периметр равновеликого ему квадрата.",s:"Площадь прямоугольника = 12×3 = 36 см².\nРавновеликий квадрат: a² = 36 → a = 6 см.\nПериметр = 4×6 = 24 см.",o:["36 см","12 см","6 см","24 см"]},72:{q:"Площадь прямоугольного треугольника 30 см², один катет 5 см. Найдите второй катет.",s:"S = (a×b)/2 = 30 → a×b = 60.\na = 5 → b = 60/5 = 12 см.",o:["6 см","15 см","10 см","12 см"]},83:{q:"Высота треугольника 12 см, основание 10 см. Найдите его площадь (см²).",s:"S = (основание × высота) / 2 = (10 × 12) / 2 = 60 см².",o:["120 см²","60 см²","180 см²","30 см²"]},91:{q:"Периметр прямоугольника 36 см, ширина 6 см. Найдите его площадь (см²).",s:"P = 2(a+b) = 36 → a+b = 18.\nb = 6 → a = 12 см.\nПлощадь = 12×6 = 72 см².",o:["12 см²","72 см²","24 см²","36 см²"]},110:{q:"Площадь квадрата равна 16 см². Найдите периметр правильного шестиугольника со стороной, равной стороне квадрата.",s:"Площадь квадрата: a² = 16 → a = 4 см.\nСторона шестиугольника = стороне квадрата = 4 см.\nУ правильного шестиугольника 6 равных сторон: P = 6 × 4 = 24 см.",o:["16 см","20 см","24 см","12 см"]},120:{q:"Периметр правильного треугольника 12 см, площадь прямоугольника 24 см². У них одна общая равная сторона. Найдите периметр прямоугольника.",s:"Сторона правильного треугольника = 12/3 = 4 см.\nЭто одна сторона прямоугольника = 4 см.\n4 × b = 24 → b = 6 см.\nПериметр = 2(4+6) = 20 см.",o:["20 см","24 см","22 см","18 см"]},154:{q:"Одна сторона треугольника равна 30, две другие — в отношении 8:7. Периметр равен 60. Найдите меньшую сторону.",s:"Сумма двух других сторон: 60 − 30 = 30.\nОтношение 8:7 → 15 частей = 30 → 1 часть = 2.\nМеньшая сторона = 7×2 = 14."},156:{q:"Радиус круга равен 6. Найдите площадь круга.",s:"S = πr² = π × 6² = 36π."},165:{q:"Радиус окружности 3 см. Найдите её длину (см).",s:"C = 2πr = 2π×3 = 6π."},186:{q:"Сторона ромба равна 8. Найдите периметр ромба.",s:"У ромба 4 равные стороны.\nПериметр = 4 × 8 = 32."},188:{q:"Найдите площадь треугольника со сторонами 7, 8 и 9.",s:"Формула Герона: p = (7+8+9)/2 = 12.\nS = √(p(p−a)(p−b)(p−c)) = √(12·5·4·3) = √720 = 12√5."},195:{q:"На рисунке правильный треугольник и квадрат. Площадь квадрата равна 36. Найдите периметр треугольника.",s:"Площадь квадрата = a² = 36 → a = 6.\nСторона правильного треугольника = стороне квадрата = 6.\nПериметр = 3 × 6 = 18."},196:{q:"На рисунке правильный треугольник и квадрат. Площадь квадрата равна 4. Найдите периметр треугольника.",s:"Площадь квадрата = a² = 4 → a = 2.\nСторона треугольника = 2.\nПериметр = 3 × 2 = 6."},202:{q:"Найдите периметр данной ступенчатой фигуры (размеры: 6, 5, 8, 3).",s:"Верхняя горизонталь: 6, вертикаль: 5, горизонталь: 8, вертикаль: 3.\nНижняя горизонталь = 6+8 = 14, левая вертикаль = 5+3 = 8.\nПериметр = 6+5+8+3+14+8 = 44."},203:{q:"Площадь закрашенного прямоугольного треугольника 30 см², высота 6 см. Найдите основание x (см).",s:"Площадь прямоугольного треугольника: S = (основание × высота)/2.\n30 = (x × 6)/2 = 3x.\nx = 10 см."},204:{q:"Прямоугольник разделён диагоналями на 4 части. Сколько процентов составляет закрашенная часть (2 противоположных треугольника)?",s:"Диагонали делят прямоугольник на 4 равных треугольника.\nЗакрашены верхний и нижний = 2/4 = 50%."},206:{q:"По данным рисунка найдите площадь треугольника ABC. (Высота BD=4 м, AD=5 м, DC=2 м)",s:"Основание AC = AD + DC = 5 + 2 = 7 м.\nВысота = 4 м.\nS = (7 × 4)/2 = 14 м².",o:["14 м²","15 м²","16 м²","28 м²"]}});
Object.assign(QRU,{6:{q:"Товар продали за 18 000 сум, предприниматель получил 20% прибыли. Какова себестоимость товара?",s:"Пусть себестоимость = x.\nЦена продажи = x·(1 + 20/100) = 1,2x = 18 000.\nx = 18 000 / 1,2 = 15 000 сум.\nПроверка: 15 000·1,2 = 18 000 ✓",o:["14 400 сум","15 000 сум","22 000 сум","16 000 сум"]},30:{q:"Ленту разрезали на две части в отношении 7:9. Если бóльшая часть равна 144 см, найдите первоначальную длину ленты (см).",s:"Отношение 7:9, бóльшая часть = 9 частей = 144 см.\n1 часть = 144/9 = 16 см.\nМеньшая часть = 7×16 = 112 см.\nВся длина = 112 + 144 = 256 см.",o:["112 см","284 см","256 см","258 см"]},35:{q:"Асилбек прочитал 33 страницы книги, и это составляет 6% всей книги. Сколько страниц в книге?",s:"33 страницы = 6%, значит 1% = 33/6 = 5,5 стр.\nВся книга = 100% = 5,5 × 100 = 550 стр.",o:["198 стр","330 стр","550 стр","500 стр"]},49:{q:"Ткань разделили в отношении 2:3. Сколько процентов от всей ткани составляет меньшая часть?",s:"Всего частей = 2+3 = 5.\nМеньшая часть = 2/5 = 2/5 × 100% = 40%."},52:{q:"Умножьте 50% от числа 50 на 2.",s:"50% от 50 = 50 × 0,5 = 25.\n25 × 2 = 50.\nОтвет: 50."},56:{q:"8% какого числа равны 24?",s:"x × 8/100 = 24.\nx = 24 × 100/8 = 2400/8 = 300."},60:{q:"3/5 массы сплава составляет медь. Сколько килограммов меди в 60 кг сплава?",s:"Медь = 60 × 3/5 = 60 × 0,6 = 36 кг."},69:{q:"Число 400 увеличили на 30%. Найдите 30% от получившегося числа.",s:"30% от 400 = 120. Новое число = 400+120 = 520.\n30% от 520 = 520×0,3 = 156."},76:{q:"В классе 40 учеников. Если 55% из них мальчики, найдите число девочек.",s:"Мальчики = 40×55/100 = 22.\nДевочки = 40−22 = 18."},80:{q:"Рано потратила 60% своих денег на книгу, и у неё осталось 12 000 сум. Сколько денег было у Рано вначале?",s:"Потратила: 60%. Осталось: 40% = 12 000 сум.\n1% = 300 сум.\nВсего = 100% = 30 000 сум."},87:{q:"Азиз прочитал 36 страниц книги, и это 18% всей книги. Сколько страниц в книге?",s:"x × 18/100 = 36 → x = 36×100/18 = 200 стр."},92:{q:"Верёвку разделили в отношении 2:3. Если бóльшая часть равна 9 м, найдите длину верёвки.",s:"Отношение 2:3. Бóльшая = 3 части = 9 м → 1 часть = 3 м.\nВсего = (2+3)×3 = 15 м.",o:["6 м","3 м","12 м","15 м"]},93:{q:"В магазине на брюки скидка 40%, на рубашку — 50%. Брюки стоят 250 000 сум, рубашка — 120 000 сум. Какова общая оплата после скидок?",s:"Брюки: 250 000×0,6 = 150 000 сум.\nРубашка: 120 000×0,5 = 60 000 сум.\nВсего: 150 000+60 000 = 210 000 сум."},97:{q:"Найдите неизвестный член пропорции: 1:5 = 20:x",s:"1/5 = 20/x.\nx = 20×5 = 100.\nИли: 1·x = 5·20 → x = 100."},114:{q:"Вычислите 45% от 600.",s:"600 × 45/100 = 600 × 0,45 = 270.\nИли: 600×40%=240; 600×5%=30. Итого: 270."},117:{q:"Мастер сделал 9 деталей. Это 12,5% от того, сколько он делал раньше за 1 день. Сколько деталей он делал раньше?",s:"x × 12,5% = 9 → x = 9/0,125 = 72.",o:["72","108","90","36"]},124:{q:"36% числа a равны 24% от 108. Найдите число a.",s:"a × 0,36 = 108 × 0,24.\na × 0,36 = 25,92.\na = 25,92 / 0,36 = 72."},129:{q:"Сумма двух чисел равна 220. Их отношение 10:1. Найдите положительную разность этих чисел.",s:"Части: 10+1 = 11. 1 часть = 220/11 = 20.\nЧисла: 200 и 20.\nРазность: 200 − 20 = 180."},132:{q:"Цена товара была 55 000 сум. Если её снизили до 44 000 сум, какова скидка в процентах?",s:"Скидка = 55 000 − 44 000 = 11 000 сум.\nПроцент = 11 000/55 000 × 100% = 20%."},148:{q:"На фабрике на пошив рубашек уходит 12% ткани. Если на рубашки ушло 300 метров, сколько всего метров ткани было на фабрике?",s:"x × 12/100 = 300 → x = 300 × 100/12 = 2500 метров."},169:{q:"Фирма выпустила 1200 изделий, 92% из них высшего сорта. Найдите число изделий высшего сорта.",s:"1200 × 92/100 = 1200 × 0,92 = 1104 изделия."},173:{q:"При помоле пшеницы получаются мука и отруби. Если отрубей выходит 19%, сколько тонн пшеницы нужно, чтобы получить 24,3 т муки?",s:"Доля муки: 100% − 19% = 81%.\nx × 0,81 = 24,3 → x = 24,3/0,81 = 30 тонн."},181:{q:"Масштаб карты 1:2000. Расстояние между двумя точками на карте 3 см. Каково реальное расстояние?",s:"Реальное = 3 × 2000 = 6000 см = 60 метров.",o:["80 метров","30 метров","60 метров","62 метра"]},187:{q:"Из молока получают 12% сливок. Сколько сливок получится из 15 кг молока?",s:"15 × 12/100 = 15 × 0,12 = 1,8 кг.",o:["1,8 г","1,8 кг","18 кг","180 кг"]},191:{q:"Покрашено 15% стены. Какая часть стены не покрашена?",s:"Не покрашено = 100% − 15% = 85% = 85/100 = 17/20."},192:{q:"При помоле пшеницы выходит 81% муки. Сколько тонн пшеницы нужно, чтобы получить 24,3 т муки?",s:"x × 0,81 = 24,3 → x = 24,3/0,81 = 30 тонн."},194:{q:"Сколько процентов от 600 гектаров составляют 150 гектаров?",s:"150/600 × 100% = 25%."}});
Object.assign(QRU,{5:{q:"Упростите (2³·4²)/(2⁵).",s:"4² = (2²)² = 2⁴.\nВычисление: 2³·2⁴ / 2⁵ = 2^(3+4) / 2⁵ = 2⁷ / 2⁵ = 2^(7−5) = 2² = 4.\nСвойства степени: aᵐ·aⁿ = aᵐ⁺ⁿ и aᵐ:aⁿ = aᵐ⁻ⁿ."},37:{q:"Вычислите: (√49 + √81) / √16",s:"√49 = 7, √81 = 9, √16 = 4.\n(7 + 9) / 4 = 16 / 4 = 4."},40:{q:"Вычислите: |−6| + |−7| − |−12| · |−1|",s:"|−6|=6, |−7|=7, |−12|=12, |−1|=1.\n6 + 7 − 12×1 = 13 − 12 = 1."},64:{q:"Вычислите: (−2)+(−2)+(−2)+...+(−2) (10 раз) + 22",s:"10 раз по (−2) = −20.\n−20 + 22 = 2."},71:{q:"Вычислите: 1:3·4 − 1:3",s:"Порядок действий слева направо (деление и умножение равноправны):\n1:3·4 = (1/3)·4 = 4/3.\nЗатем: 4/3 − 1:3 = 4/3 − 1/3 = 3/3 = 1."},79:{q:"Сколько целых чисел от −7 до 9?",s:"−7, −6, ..., 0, ..., 9: количество = 9−(−7)+1 = 9+7+1 = 17.",o:["16","14","15","17"]},82:{q:"Вычислите: (−5)·(−3) + (−2)·4",s:"(−5)×(−3) = 15.\n(−2)×4 = −8.\n15 + (−8) = 7."},105:{q:"Вычислите 5 + (−3) − (−2)⁴.",s:"(−2)⁴ = +16 (чётный показатель → положительное).\n5 + (−3) − 16 = 5 − 3 − 16 = −14."},137:{q:"Найдите число, противоположное 3 − √7.",s:"Противоположное число: −(3−√7) = −3+√7.\nПроверка: (3−√7) + (−3+√7) = 0 ✓"},183:{q:"Вычислите: |−10| + |−20| − |−10|·3",s:"|−10|=10, |−20|=20, |−10|=10.\n10 + 20 − 10×3 = 30 − 30 = 0."},189:{q:"Вычислите: −((−120−80) − (120+(−20)))",s:"(−120−80) = −200.\n(120+(−20)) = 100.\n−200 − 100 = −300.\n−(−300) = 300."},218:{q:"Вычислите 2⁵ · 2³ : 2⁶.",s:"Свойства степени: 2^(5+3−6) = 2² = 4."},219:{q:"Вычислите (3²)³.",s:"(aᵐ)ⁿ = aᵐⁿ → 3^(2·3) = 3⁶ = 729."},220:{q:"Вычислите 5⁰ + 3¹ − 2².",s:"5⁰ = 1, 3¹ = 3, 2² = 4.\n1 + 3 − 4 = 0."},283:{q:"Вычислите −5 + 8.",s:"Знаки разные → вычитаем модули, остаётся знак большего модуля.\n8 − 5 = 3 (положительное)."},284:{q:"Вычислите −3 − 7.",s:"−3 − 7 = −3 + (−7) = −10.\n(Оба числа складываются в отрицательную сторону.)"},285:{q:"Вычислите −6 · (−4).",s:"Минус × минус = плюс.\n6 · 4 = 24."},286:{q:"Вычислите −20 : 5.",s:"Минус : плюс = минус.\n20 ÷ 5 = 4 → −4."},287:{q:"Вычислите |−9| + |4|.",s:"|−9| = 9, |4| = 4.\n9 + 4 = 13."},288:{q:"Найдите число, противоположное −7.",s:"Противоположное число отличается знаком: −(−7) = 7.\n(−7) + 7 = 0."},289:{q:"Какое из чисел больше: −12 или −8?",s:"У отрицательных чисел больше то, что ближе к 0.\n−8 > −12.",o:["−12","−8","Равны","−20"]},290:{q:"Вычислите (−2)³.",s:"(−2)³ = (−2)·(−2)·(−2) = 4·(−2) = −8.\nНечётная степень → результат отрицательный."},291:{q:"Вычислите −15 + 15.",s:"Сумма противоположных чисел равна 0.\n−15 + 15 = 0."},292:{q:"Термометр показывал −4°. Температура поднялась на 9°. Сколько градусов сейчас?",s:"−4 + 9 = 5°."},293:{q:"Найдите расстояние между точками A(−3) и B(5) на числовой прямой.",s:"Расстояние = из большей координаты вычитаем меньшую: 5 − (−3) = 8 единиц."},294:{q:"Вычислите −1 − (−6).",s:"−1 − (−6) = −1 + 6 = 5."},295:{q:"Вычислите 2⁴.",s:"2⁴ = 2·2·2·2 = 16."},296:{q:"Вычислите 3³.",s:"3³ = 3·3·3 = 27."},297:{q:"Вычислите 2³ · 2².",s:"Основания одинаковые → показатели складываются: 2³·2² = 2⁵ = 32."},298:{q:"Вычислите 7⁵ : 7³.",s:"Основания одинаковые → показатели вычитаются: 7⁵:7³ = 7² = 49."},299:{q:"Вычислите (2³)².",s:"При возведении степени в степень показатели перемножаются: 2^(3·2) = 2⁶ = 64."},300:{q:"Вычислите 10⁰.",s:"Нулевая степень любого числа, отличного от нуля, равна 1.\n10⁰ = 1."},301:{q:"Вычислите (−3)².",s:"(−3)² = (−3)·(−3) = 9.\nЧётная степень → результат положительный."},302:{q:"Найдите значение √64.",s:"Квадрат какого числа равен 64? 8² = 64.\n√64 = 8."},303:{q:"Вычислите √81 + √9.",s:"√81 = 9, √9 = 3.\n9 + 3 = 12."},304:{q:"Вычислите 5³.",s:"5³ = 5·5·5 = 125."},305:{q:"Вычислите (1/2)³.",s:"(1/2)³ = 1³/2³ = 1/8."},306:{q:"Вычислите √100 − √36.",s:"√100 = 10, √36 = 6.\n10 − 6 = 4."},307:{q:"Вычислите 3² + 4².",s:"3² = 9, 4² = 16.\n9 + 16 = 25."},308:{q:"Вычислите √49 · 2.",s:"√49 = 7.\n7 · 2 = 14."}});
Object.assign(QRU,{2:{q:"Вычислите 2¾ + 1⅙ − ⅔.",s:"2¾ = 11/4, 1⅙ = 7/6, ⅔ = 2/3.\nОбщий знаменатель: НОК(4,6,3) = 12.\n11/4 = 33/12; 7/6 = 14/12; 2/3 = 8/12.\n33/12 + 14/12 − 8/12 = 39/12 = 13/4 = 3¼."},3:{q:"Запишите дробь 0,1(6) в виде обыкновенной дроби.",s:"Смешанная периодическая дробь: до запятой 1 цифра (1), в периоде 1 цифра (6).\nФормула: числитель = 16−1 = 15, знаменатель = 90.\n0,1(6) = 15/90 = 1/6.\nПроверка: 1÷6 = 0,16666... = 0,1(6) ✓"},39:{q:"Найдите значение выражения 4,4 − 1,4 − (1⅔ + 3⅓).",s:"1⅔ + 3⅓ = 5/3 + 10/3 = 15/3 = 5.\n4,4 − 1,4 = 3.\n3 − 5 = −2.\nОтвет: −2."},101:{q:"Найдите значение дроби: 2 1/15 + 1⅔",s:"2 1/15 = 31/15. 1⅔ = 5/3 = 25/15.\n31/15 + 25/15 = 56/15 = 3 11/15."},149:{q:"Вычислите: 6,42 + 9/8 − 1,045",s:"9/8 = 1,125.\n6,42 + 1,125 − 1,045 = 7,545 − 1,045 = 6,5."},150:{q:"Вычислите: (−2,4):(−0,8) + 7",s:"(−2,4)/(−0,8) = 3.\n3 + 7 = 10."},157:{q:"Вычислите: (5/6):(15/24) + (1/2):(1/4)",s:"(5/6):(15/24) = (5/6)×(24/15) = 120/90 = 4/3.\n(1/2):(1/4) = (1/2)×4 = 2.\n4/3 + 2 = 4/3 + 6/3 = 10/3."},213:{q:"Вычислите 1/2 + 1/3 + 1/6.",s:"Общий знаменатель 6: 3/6 + 2/6 + 1/6 = 6/6 = 1."},214:{q:"Из 3/4 вычтите 1/4, затем умножьте на 1/2.",s:"3/4 − 1/4 = 2/4 = 1/2.\n1/2 × 1/2 = 1/4."},215:{q:"Запишите сумму 0,25 + 0,4 в виде обыкновенной дроби.",s:"0,25 + 0,4 = 0,65 = 65/100 = 13/20."},216:{q:"Вычислите 2,5 × 0,4.",s:"2,5 × 0,4 = 1,00 = 1.\n(25 × 4 = 100, два знака после запятой → 1,00.)"},217:{q:"Переведите 1,2 в обыкновенную дробь (сокращённую).",s:"1,2 = 12/10 = 6/5 (сократили на 2)."},255:{q:"Вычислите 3/8 + 1/8.",s:"Знаменатели одинаковые: складываем числители.\n3/8 + 1/8 = 4/8 = 1/2."},256:{q:"Вычислите 5/6 − 1/3.",s:"Общий знаменатель 6: 1/3 = 2/6.\n5/6 − 2/6 = 3/6 = 1/2."},257:{q:"Какая из дробей больше: 2/3 или 3/4?",s:"Общий знаменатель 12: 2/3 = 8/12, 3/4 = 9/12.\n9/12 > 8/12, значит 3/4 больше.",o:["2/3","3/4","Равны","Нельзя сравнить"]},258:{q:"Найдите 5/9 от числа 36.",s:"Сначала 1/9: 36 ÷ 9 = 4.\n5/9: 4 × 5 = 20."},259:{q:"3/7 некоторого числа равны 12. Найдите это число.",s:"Если 3/7 равны 12, то 1/7: 12 ÷ 3 = 4.\nВсё число (7/7): 4 × 7 = 28."},260:{q:"Вычислите 1 2/5 + 2 3/5.",s:"Целые: 1 + 2 = 3.\nДроби: 2/5 + 3/5 = 5/5 = 1.\n3 + 1 = 4."},261:{q:"Сократите дробь 18/24.",s:"Числитель и знаменатель делим на НОД(18,24)=6.\n18÷6 / 24÷6 = 3/4."},262:{q:"Пиццу разделили на 8 равных кусков. Азиз съел 3 куска, Вали — 2. Какая часть пиццы осталась?",s:"Съедено: 3 + 2 = 5 кусков.\nОсталось: 8 − 5 = 3 куска = 3/8."},263:{q:"Вычислите 1 − 3/7.",s:"1 = 7/7.\n7/7 − 3/7 = 4/7."},264:{q:"Найдите 2/5 от 10 (2/5 · 10).",s:"2/5 · 10 = (2·10)/5 = 20/5 = 4."},265:{q:"Скольким минутам равна 1/4 часа?",s:"1 час = 60 минут.\n1/4: 60 ÷ 4 = 15 минут.",o:["15 минут","20 минут","25 минут","30 минут"]},266:{q:"В стакане было 3/4 воды, долили ещё 1/2 стакана. Сколько стало воды (в стаканах)?",s:"3/4 + 1/2 = 3/4 + 2/4 = 5/4 = 1 1/4 стакана.",o:["1 1/2 стакана","1 стакан","1 1/4 стакана","5/6 стакана"]},267:{q:"Какая из дробей больше 1?",s:"Если числитель больше знаменателя, дробь больше 1.\nВ 7/5: 7 > 5, значит 7/5 > 1."},268:{q:"Отрезок разделён на 6 равных частей, 4 из них закрашены. Какой (сокращённой) дроби равна закрашенная часть?",s:"Закрашено: 4/6.\nСокращаем на НОД(4,6)=2: 4/6 = 2/3."},269:{q:"Вычислите 0,7 + 0,25.",s:"Уравниваем запятые: 0,70 + 0,25 = 0,95."},270:{q:"Вычислите 3,5 − 1,8.",s:"3,5 − 1,8 = 1,7.\n(35 − 18 = 17, один знак после запятой → 1,7.)"},271:{q:"Вычислите 0,6 · 5.",s:"6 · 5 = 30, один знак после запятой → 3,0 = 3."},272:{q:"Вычислите 4,8 : 4.",s:"4,8 ÷ 4 = 1,2.\n(48 ÷ 4 = 12, один знак после запятой → 1,2.)"},273:{q:"Вычислите 0,2 · 0,3.",s:"2 · 3 = 6. Два знака после запятой (0,2 и 0,3) → в результате 2 знака: 0,06."},274:{q:"Переведите 1,25 в обыкновенную дробь (сокращённую).",s:"1,25 = 125/100.\nСокращаем на НОД(125,100)=25: 5/4."},275:{q:"Расположите числа в порядке возрастания: 0,45; 0,5; 0,405; 0,54.",s:"Сравниваем по разрядам:\n0,405 < 0,45 < 0,5 < 0,54."},276:{q:"Округлите число 7,382 до сотых (до двух знаков после запятой).",s:"Разряд тысячных равен 2 (< 5), поэтому отбрасываем.\n7,382 ≈ 7,38."},277:{q:"Умножьте 0,001 на 1000.",s:"При умножении на 1000 запятая сдвигается на 3 знака вправо.\n0,001 · 1000 = 1."},278:{q:"1 кг яблок стоит 8 500 сум. Сколько стоят 2,5 кг яблок?",s:"8 500 · 2,5 = 8 500·2 + 8 500·0,5 = 17 000 + 4 250 = 21 250 сум.",o:["21 250 сум","17 000 сум","21 000 сум","25 500 сум"]},279:{q:"Скольким сантиметрам равны 3,2 метра?",s:"1 м = 100 см.\n3,2 · 100 = 320 см.",o:["32 см","320 см","3 200 см","0,32 см"]},280:{q:"Одна тетрадь стоит 4 200 сум. Азиз купил 3 тетради и дал 20 000 сум. Сколько сдачи он получит?",s:"3 тетради: 3 · 4 200 = 12 600 сум.\nСдача: 20 000 − 12 600 = 7 400 сум.",o:["8 400 сум","6 800 сум","7 400 сум","12 600 сум"]},281:{q:"Переведите 0,75 в проценты.",s:"Чтобы перевести в проценты, умножаем на 100.\n0,75 · 100 = 75%."},282:{q:"Какое число больше: 0,8 или 0,75?",s:"0,8 = 0,80.\n0,80 > 0,75, значит 0,8 больше.",o:["0,75","0,8","Равны","Нельзя определить"]}});
Object.assign(QRU,{1:{q:"Чему равны НОД и НОК чисел 72 и 120? НОД · НОК = ?",s:"72 = 2³·3², 120 = 2³·3·5.\nНОД = 2³·3 = 24.\nНОК = 2³·3²·5 = 360.\nПроверка: 24·360 = 8640 = 72·120 ✓\nПравило: НОД(a,b)·НОК(a,b) = a·b."},20:{q:"Найдите НОД(36; 48) и НОК(36; 48).",s:"36 = 2²·3², 48 = 2⁴·3.\nНОД = 2²·3 = 12.\nНОК = 2⁴·3² = 144.\nПроверка: 12·144 = 1728 = 36·48 ✓",o:["НОД=12, НОК=144","НОД=6, НОК=288","НОД=12, НОК=72","НОД=4, НОК=432"]},68:{q:"Найдите верное утверждение: 1) наименьшее натуральное число 0; 2) наименьшее целое число 0; 3) наименьшее простое число 1; 4) нулевая степень любого натурального числа равна 1",s:"1) Неверно — наименьшее натуральное число 1.\n2) Неверно — наименьшего целого числа не существует.\n3) Неверно — наименьшее простое число 2.\n4) Верно — для любого a≠0 a⁰=1.\nВерно только 4-е утверждение.",o:["1 и 2","только 4","1 и 4","2 и 4"]},70:{q:"Сколько двузначных натуральных чисел делится на 10 без остатка?",s:"Числа, делящиеся на 10: 10, 20, 30, 40, 50, 60, 70, 80, 90.\nВсего: 9."},74:{q:"Шаг Сарвиноз 45 см, её сестры Феруза — 30 см. На каком наименьшем расстоянии их следы совпадут? (см)",s:"НОК(45, 30) = ?\n45 = 3²×5, 30 = 2×3×5.\nНОК = 2×3²×5 = 90 см.",o:["180 см","100 см","15 см","90 см"]},77:{q:"Сколько чисел, кратных 3, между 5 и 32?",s:"6, 9, 12, 15, 18, 21, 24, 27, 30 — всего 9.\n(больше 5, меньше 32, кратные 3.)",o:["9","10","8","11"]},78:{q:"Сколько двузначных чисел делятся на 17?",s:"17, 34, 51, 68, 85 — двузначные, делящиеся на 17: 5 штук.\n(17×6=102 — уже трёхзначное.)"},99:{q:"НОД(48; 120) = ?",s:"48 = 2⁴×3, 120 = 2³×3×5.\nНОД = 2³×3 = 24."},125:{q:"Сколько двузначных чисел являются делителями 50?",s:"Делители 50: 1, 2, 5, 10, 25, 50.\nДвузначные делители: 10, 25, 50 — 3 штуки."},130:{q:"Для натуральных a, b выполняется a + b/2 = 100. Найдите наибольшее значение a + b.",s:"a + b/2 = 100 → 2a + b = 200.\nЧтобы a+b было наибольшим, b — больше, a — меньше.\na=1 → b=198. a+b = 199."},143:{q:"Найдите сумму простых чисел до 25.",s:"Простые числа: 2,3,5,7,11,13,17,19,23.\nСумма: 2+3+5+7+11+13+17+19+23 = 100."},164:{q:"Сколько раз цифра 6 встречается среди натуральных чисел от 1 до 97?",s:"В разряде единиц: 6,16,26,36,46,56,66,76,86,96 → 10 раз.\nВ разряде десятков: 60,61,…,69 → 10 раз.\nВсего: 10 + 10 = 20 раз."},167:{q:"Какое наибольшее натуральное число нужно вычесть из 225, чтобы результат был больше 144?",s:"225 − x > 144 → x < 81.\nНаибольшее натуральное число: x = 80.\nПроверка: 225 − 80 = 145 > 144 ✓"},172:{q:"Сколько целых делителей у числа 18?",s:"Положительные делители: 1,2,3,6,9,18 — 6.\nЦелые делители включают и отрицательные: ±1,±2,±3,±6,±9,±18 — 12.",o:["6","9","12","24"]},190:{q:"Сколько натуральных делителей у числа 48?",s:"48 = 2⁴×3.\nЧисло делителей = (4+1)(1+1) = 5×2 = 10."},212:{q:"Найдите разность наименьшего трёхзначного и наибольшего двузначного чисел.",s:"Наименьшее трёхзначное число = 100.\nНаибольшее двузначное число = 99.\nРазность = 100 − 99 = 1."},231:{q:"Найдите сумму наибольшего и наименьшего четырёхзначных чисел.",s:"Наибольшее 4-значное число = 9999.\nНаименьшее 4-значное число = 1000.\n9999 + 1000 = 10999."},232:{q:"В числе 5 678: в каком разряде стоит цифра 6 и чему равно её значение?",s:"5678 = 5·1000 + 6·100 + 7·10 + 8.\nЦифра 6 стоит в разряде сотен, её значение 6·100 = 600.",o:["Десятки, 60","Сотни, 600","Тысячи, 6000","Единицы, 6"]},233:{q:"Округлите число 3 472 до ближайшей сотни.",s:"При округлении до сотен смотрим на разряд десятков: 7 ≥ 5, округляем вверх.\n3472 ≈ 3500."},234:{q:"Расположите числа в порядке возрастания: 4 050, 4 005, 4 500, 4 055.",s:"Сравниваем по разрядам:\n4005 < 4050 < 4055 < 4500."},235:{q:"Число умножили на 10 и прибавили 7, получилось 247. Найдите это число.",s:"10·x + 7 = 247.\n10·x = 240.\nx = 24."},236:{q:"Как записывается число из 7 сотен, 0 десятков и 9 единиц?",s:"7·100 + 0·10 + 9 = 700 + 0 + 9 = 709."},237:{q:"Вычислите удобным способом: 345 + 199.",s:"199 = 200 − 1.\n345 + 200 − 1 = 545 − 1 = 544."},238:{q:"Вычислите удобным способом: 846 − 298.",s:"298 = 300 − 2.\n846 − 300 + 2 = 546 + 2 = 548."},239:{q:"Найдите сумму наибольшего двузначного нечётного и наименьшего двузначного чётного чисел.",s:"Наибольшее двузначное нечётное число = 99.\nНаименьшее двузначное чётное число = 10.\n99 + 10 = 109."},240:{q:"Продолжите закономерность: 2, 5, 8, 11, … Какое число следующее?",s:"Каждое число больше предыдущего на 3.\n11 + 3 = 14."},241:{q:"Сумма пяти подряд идущих натуральных чисел равна 100. Найдите наименьшее из них.",s:"Числа: n, n+1, n+2, n+3, n+4.\nСумма = 5n + 10 = 100 → 5n = 90 → n = 18.\nПроверка: 18+19+20+21+22 = 100 ✓"},242:{q:"Найдите сумму всех натуральных чисел от 1 до 100.",s:"Способ Гаусса: 1+2+…+100 = n(n+1)/2 = 100·101/2 = 5050.\n(50 пар, каждая равна 101: 1+100, 2+99, …)"},243:{q:"У трёхзначного числа разряд сотен 4, разряд единиц 7, а разряд десятков равен разности цифр сотен и единиц. Найдите это число.",s:"Сотни = 4, единицы = 7.\nДесятки = 7 − 4 = 3.\nЧисло = 437."},244:{q:"Диёр выписал натуральные числа от 1 до 50. Сколько всего цифр он написал?",s:"От 1 до 9: 9 однозначных чисел → 9 цифр.\nОт 10 до 50: 41 двузначное число → 41×2 = 82 цифры.\nВсего: 9 + 82 = 91 цифра."},245:{q:"Какому числу соответствует точка A на числовой прямой?",s:"Точка A стоит на делении 7 (между 6 и 8)."},246:{q:"На какие числа делится 126?",s:"126 — чётное → делится на 2.\nСумма цифр 1+2+6 = 9 → делится на 3 и на 9.",o:["2, 3 и 9","Только 2 и 3","Только 3","Ни на одно"]},247:{q:"Найдите НОД(24; 36).",s:"24 = 2³·3, 36 = 2²·3².\nНОД = наименьшие степени общих множителей = 2²·3 = 12."},248:{q:"Найдите НОК(6; 8).",s:"6 = 2·3, 8 = 2³.\nНОК = 2³·3 = 24."},249:{q:"Какое из чисел делится и на 4, и на 9?",s:"Делимость на 4: две последние цифры кратны 4.\nДелимость на 9: сумма цифр кратна 9.\n36: 36÷4=9 ✓ и 3+6=9 ✓. Значит 36."},250:{q:"Разложите число 120 на простые множители.",s:"120 = 2·60 = 2·2·30 = 2·2·2·15 = 2³·3·5."},251:{q:"Найдите наименьшее двузначное число, делящееся и на 3, и на 5.",s:"Если дел function renderQ(s){
  s=String(s);
  if(s.indexOf("<svg")>=0){
    var end=s.indexOf("</svg>")+6;
    var before=s.slice(0,s.indexOf("<svg")).replace(/<br\s*\/?>(\s*)$/i,"");
    var svg=s.slice(s.indexOf("<svg"),end);
    var after=s.slice(end);
    return renderQ(before)+svg+(after?renderQ(after):"");
  }
  var allowed=[];
  var tmp=s.replace(/<(\/?)(br|span|b|i|sup|sub)([^>]*?)\/?>/gi,function(m){
    allowed.push(m); return ""+(allowed.length-1)+"";
  });
  tmp=esc(tmp);
  tmp=tmp.replace(/(\d+)/g,function(_,i){return allowed[+i];});
  return tmp;
}

  var src=filtered.length>=need?filtered:pool;

}

function liveStudentJoin(code,name){
  if(!fbdb){initFirebase();}
  if(!fbdb){flash("Internet aloqasi yo'q yoki Firebase yuklanmadi. Sahifani yangilang.");return;}
  code=(code||"").trim(); name=(name||"").trim();
  if(!/^\d{6}$/.test(code)){flash("Kod 6 ta raqam bo'lishi kerak");return;}
  if(!name){flash("Ismingizni yozing");return;}
  live.role="student"; live.uid=liveUid(); live.name=name; live.code=code;
  live.roomRef=fbdb.ref("rooms/"+code);
  live.roomRef.once("value").then(function(snap){
    if(!snap.exists()){flash("Bunday xona topilmadi");return;}
    var d=snap.val();
    if(d.status==="finished"){flash("Bu test allaqachon tugagan");return;}
    live.roomRef.child("students/"+live.uid).set({name:name,joinedAt:Date.now(),score:null,done:false});
    liveAttachRoom();
    state.phase="liveStudentLobby"; render();
  }).catch(function(){flash("Ulanishda xato");});
}
function liveAttachRoom(){
  if(!live.roomRef)return;
  var cb=function(snap){
    var d=snap.val(); if(!d){return;}
    live.roomData=d;
    if(live.role==="student"){
      if(d.status==="running" && state.phase==="liveStudentLobby"){
        live.qset=d.questions.map(function(q){return {q:q.q,q_ru:q.q_ru||null,options:q.options,options_ru:q.options_ru||null,correct:q.correct,solution:q.solution,solution_ru:q.solution_ru||null};});
        live.sel=Array(live.qset.length).fill(null); live.cur=0; live.submitted=false;
        live.startedAt=d.startedAt||Date.now();
        state.phase="liveStudentQuiz"; render();
      }
    }
    if(live.role==="teacher"){
      if(state.phase==="liveTeacherLobby" || state.phase==="liveTeacherLive"){
        liveRenderTeacherStudents();
      }
    }
  };
  live.roomRef.on("value",cb);

}

function doImport(){
  var raw=document.getElementById("bulk").value;
  if(!raw||!raw.trim()){flash("Avval savollarni joylang");return;}
  var lines=raw.split(/\r?\n/);var ok=[],bad=0;
  lines.forEach(function(ln){
    if(!ln.trim())return;
    var parts=(ln.indexOf("\t")>=0?ln.split("\t"):ln.split("|")).map(function(p){return (p||"").trim();});
    if(parts.length<7){bad++;return;}
    var q=parts[0],a=parts[1],b=parts[2],c=parts[3],d=parts[4],cor=(parts[5]||"").toUpperCase(),sol=parts.slice(6).join(" ").trim();
    var ci=["A","B","C","D"].indexOf(cor);
    if(ci<0&&["1","2","3","4"].indexOf(cor)>=0)ci=parseInt(cor,10)-1;
    if(!q||!a||!b||!c||!d||!sol||ci<0){bad++;return;}
    ok.push({q:q,options:[a,b,c,d],correct:ci,solution:sol});
  });
  if(!ok.length){flash("To'g'ri qator topilmadi");return;}
  flash(ok.length+" ta savol yuklanmoqda…");
  bankImport(ok).then(function(res){if(res){flash(ok.length+" ta qo'shildi"+(bad?(", "+bad+" o'tkazildi"):""));document.getElementById("bulk").value="";fillBank();}else flash("Saqlashda xato");});
}

 else if(a==="goTeacher"){state.phase="teacherName";render();}
 else if(a==="goStudent"){state.phase="studentJoin";render();}
 else if(a==="goSolo"){state.phase=state.profile&&state.profile.name?"intro":"name";render();}
 else if(a==="backRole"){state.phase="rolePick";render();}
 else if(a==="goHome"){state.phase="rolePick";render();}
 else if(a==="setTopic"){state.topic=t.dataset.val;render();}
 else if(a==="startMistakes")startMistakeQuiz();
 else if(a==="createRoom"){live.name=(document.getElementById("tName").value||"").trim()||"Ustoz";liveTeacherCreate();}
 else if(a==="startLive")liveTeacherStart();
 else if(a==="finishLive")liveTeacherFinish();
 else if(a==="joinRoom"){liveStudentJoin(document.getElementById("sCode").value,document.getElementById("sName").value);}
 else if(a==="lchoose")liveChoose(parseInt(t.dataset.val,10));
 else if(a==="lnext")liveNav(1);
 else if(a==="lprev")liveNav(-1);
 else if(a==="lsubmit")liveStudentSubmit();
 else if(a==="exitLive")exitLive();
});
app.addEventListener("keydown",function(e){if(e.key==="Enter"&&state.phase==="name")saveName();});
(function(){var le=document.getElementById("langsw");if(le)le.addEventListener("click",function(e){var b=e.target.closest("[data-l]");if(!b)return;var nl=b.dataset.l;if(nl&&nl!==state.lang){state.lang=nl;LS.set(K.lang,nl);render();}});})();
init();
