<title>Majburiy Matematika — Test</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;}
:root{--teal1:#2bacc7;--teal2:#0f7c8f;--ink:#15293c;--ink2:#5d7282;--blue:#0e7cc4;--blue2:#0a6298;--green:#239e69;--green-bg:#e7f4ee;--red:#df544a;--red-bg:#fceae8;--amber:#f4a23b;--ice:#2bacc7;--paper:#fff;--paper2:#eef4f7;--line:#dde7ed;}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;background:linear-gradient(165deg,var(--teal1) 0%,var(--teal2) 100%);background-attachment:fixed;}
.disp{font-family:'Montserrat',system-ui,sans-serif;letter-spacing:-.01em;}
.wrap{max-width:680px;margin:0 auto;padding:20px 20px 64px;position:relative;z-index:1;}
.fbg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.fbg span{position:absolute;color:rgba(255,255,255,.10);font-weight:700;font-family:'Montserrat',sans-serif;white-space:nowrap;}
.fade{animation:fade .5s cubic-bezier(.2,.9,.3,1) both;}
@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(14,124,196,0)}50%{box-shadow:0 0 0 4px rgba(14,124,196,.14)}}
@keyframes dotin{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes conf{to{transform:translateY(430px) rotate(720deg);opacity:0}}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.h{color:#fff;font-weight:800;}
.kicker{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:8px;}
.date{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:14px;font-weight:500;margin-top:14px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 34px -22px rgba(8,40,55,.5);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:16px;border:none;cursor:pointer;border-radius:13px;padding:16px 22px;transition:transform .14s,box-shadow .25s,background .2s;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 12px 26px -12px rgba(14,124,196,.8);}
.btn-primary:hover{transform:translateY(-2px);background:var(--blue2);}
.btn-primary:disabled{background:#bcd3e2;color:#eef4f7;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-green{background:var(--green);color:#fff;box-shadow:0 12px 26px -12px rgba(35,158,105,.8);}
.btn-green:hover{transform:translateY(-2px);filter:brightness(1.05);}
.btn-green:disabled{background:#bcd3e2;color:#eef4f7;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:#c5d4dd;background:var(--paper2);}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:inherit;font-size:16.5px;color:var(--ink);cursor:pointer;transition:.16s;}
.opt:hover{border-color:#a9c9dd;background:var(--paper2);}
.opt.sel{border-color:var(--blue);background:rgba(14,124,196,.07);animation:glow 1.6s ease infinite;}
.opt.sel .badge{background:var(--blue);color:#fff;border-color:var(--blue);}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .badge{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt.wrong .badge{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dis{cursor:default;}.opt.dis:hover{background:var(--paper);}
.badge{flex:0 0 auto;width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--ink2);}
.seg{display:flex;gap:5px;}
.seg i{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.3);transition:.35s;}
.seg i.on{background:#fff;}
.rule{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
.rule:last-child{border-bottom:none;}
.ic{flex:0 0 auto;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(14,124,196,.1);color:var(--blue);}
.dot{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid var(--line);}
.dot.ok{background:var(--green);border-color:var(--green);}
.dot.bad{background:var(--red);border-color:var(--red);}
.sol{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
.tchips{display:flex;flex-wrap:wrap;gap:8px}
.tchip{border:1.5px solid #dde7ed;background:#fff;color:#3a4f60;border-radius:999px;padding:8px 13px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.tchip:hover{border-color:var(--blue);color:var(--blue)}
.tchip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;color:var(--ink);}
.icbtn{width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.16);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icbtn:hover{background:rgba(255,255,255,.26);}
.timer{display:inline-flex;align-items:center;gap:8px;font-family:'Montserrat',monospace;font-weight:800;font-size:17px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-variant-numeric:tabular-nums;color:var(--ink);}
.timer.danger{color:var(--red);border-color:rgba(223,84,74,.4);animation:pulse 1s ease infinite;}
.input{width:100%;background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-family:inherit;font-size:17px;color:var(--ink);outline:none;}
.input:focus{border-color:var(--blue);}
.input::placeholder{color:#9bb0bd;}
.xpbar{height:10px;border-radius:99px;background:var(--paper2);overflow:hidden;border:1px solid var(--line);}
.xpfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal1),var(--green));border-radius:99px;transition:width .6s;}
.mile{display:flex;gap:12px;align-items:center;border-radius:14px;padding:14px 16px;margin-top:14px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--amber);}
.toggle{display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:11px;padding:4px;gap:4px;flex-wrap:wrap;}
.toggle button{font-family:inherit;font-weight:700;font-size:14px;border:none;background:none;color:#fff;padding:8px 13px;border-radius:8px;cursor:pointer;}
.toggle button.active{background:#fff;color:var(--blue);}
.loader{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite;}
.srow{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;border:1px solid transparent;}
.rk{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--paper2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:Montserrat,sans-serif;color:var(--ink);}
.delx{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--paper2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.delx:hover{background:var(--red-bg);}
svg.lic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:70;animation:fade .3s both;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);}
.hero{background:linear-gradient(135deg,#fff,#f4f9fc);border-radius:22px;padding:22px 22px 20px;margin-top:16px;box-shadow:0 18px 40px -22px rgba(10,40,70,.5);border:1px solid rgba(255,255,255,.6)}
.hero-row{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.hero-hi{font-family:Montserrat,sans-serif;font-weight:800;font-size:clamp(22px,6vw,28px);color:var(--ink);line-height:1.1}
.hero-sub{color:var(--ink2);font-size:14px;margin-top:4px}
.hero-lvl{flex:0 0 auto;width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--teal1));display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 22px -8px rgba(14,124,196,.7)}
.hero-lvl-n{font-family:Montserrat,sans-serif;font-weight:900;font-size:24px;color:#fff;line-height:1}
.hero-lvl-l{font-size:9.5px;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.hero-bar{height:8px;border-radius:99px;background:#e2ecf2;margin-top:16px;overflow:hidden}
.hero-bar-f{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--teal1));transition:width .6s cubic-bezier(.2,.8,.2,1)}
.hero-stats{display:flex;gap:10px;margin-top:16px}
.hstat{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center}
.hstat-n{display:block;font-family:Montserrat,sans-serif;font-weight:800;font-size:16px;color:var(--ink)}
.hstat-l{display:block;font-size:11px;color:var(--ink2);margin-top:2px}
.sect-h{display:flex;justify-content:space-between;align-items:center;margin:24px 2px 12px}
.sect-h>span:first-child{font-family:Montserrat,sans-serif;font-weight:800;font-size:17px;color:#fff;display:flex;align-items:center;gap:7px}
.sect-tag{background:rgba(255,255,255,.22);color:#fff;font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:99px;backdrop-filter:blur(4px)}
.tcards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tcard{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:13px 14px;cursor:pointer;transition:all .15s;font-family:inherit;text-align:left}
.tcard:hover{transform:translateY(-2px);box-shadow:0 10px 22px -12px rgba(10,40,70,.35)}
.tcard-ic{flex:0 0 auto;font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--paper2);border-radius:10px}
.tcard-name{flex:1;font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.2}
.tcard-n{flex:0 0 auto;font-size:12px;font-weight:800;color:var(--ink2);background:var(--paper2);padding:2px 8px;border-radius:99px}
.tcard.on{border-color:var(--blue);background:linear-gradient(135deg,rgba(14,124,196,.08),rgba(43,172,199,.08))}
.tcard.on .tcard-ic{background:var(--blue);}
.tcard.on .tcard-name{color:var(--blue)}
.tcard.on .tcard-n{background:var(--blue);color:#fff}
.mistcard{display:flex;align-items:center;gap:13px;background:linear-gradient(135deg,#fff6ed,#fff);border:1.5px solid #f4d9bc;border-radius:18px;padding:16px 18px;margin-top:14px;cursor:pointer;transition:all .15s}
.mistcard:hover{transform:translateY(-2px);box-shadow:0 12px 26px -14px rgba(244,162,59,.6)}
.mistcard-ic{font-size:26px;flex:0 0 auto}
.mistcard-t{font-family:Montserrat,sans-serif;font-weight:800;font-size:16px;color:var(--ink)}
.mistcard-s{color:#b5743a;font-size:13px;margin-top:2px}
.mistcard-go{flex:0 0 auto;width:34px;height:34px;border-radius:50%;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center}
.startbtn{width:100%;margin-top:20px;flex-direction:column;gap:3px;padding:16px;font-size:17px}
.startbtn-sub{font-size:12.5px;font-weight:600;opacity:.85}
.qtag{background:rgba(255,255,255,.22);color:#fff;font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:99px;backdrop-filter:blur(4px)}
.qhead{display:flex;justify-content:space-between;align-items:flex-end;margin:16px 2px 10px}
.qhead-n{font-family:Montserrat,sans-serif;color:#fff}
.qhead-cur{font-size:30px;font-weight:900}
.qhead-tot{font-size:17px;font-weight:700;opacity:.7;margin-left:2px}
.qhead-cnt{font-size:13px;color:rgba(255,255,255,.9);font-weight:600;padding-bottom:4px}
.seg2{display:flex;gap:5px}
.seg2 i{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.28);transition:all .3s}
.seg2 i.done{background:#fff}
.seg2 i.cur{background:var(--amber);box-shadow:0 0 10px var(--amber)}
.qcard{background:#fff;border-radius:20px;padding:22px;box-shadow:0 16px 38px -22px rgba(10,40,70,.5)}
.qcard-num{display:inline-block;font-size:12px;font-weight:800;color:var(--blue);background:rgba(14,124,196,.1);padding:4px 11px;border-radius:99px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.qcard-q{font-size:clamp(18px,5vw,23px);line-height:1.4;font-weight:700;margin:0;color:var(--ink)}
.banksec{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;background:#fff}
.banksec-h{width:100%;display:flex;align-items:center;gap:8px;background:var(--paper2);border:none;padding:12px 14px;font-family:inherit;font-weight:800;font-size:14px;color:var(--ink);cursor:pointer;text-align:left}
.banksec-h:hover{background:#e6eef3}
.banksec-h .arr{color:var(--blue);font-size:12px;width:12px}
.banksec-h .cnt{margin-left:auto;background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:99px}
.banksec-body{padding:4px 6px}
#langsw{display:flex;justify-content:flex-end;margin-bottom:6px}
.langpill{display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);border-radius:10px;padding:3px;gap:3px}
.langpill button{font-family:inherit;font-weight:800;font-size:12.5px;border:none;background:none;color:#fff;padding:5px 12px;border-radius:7px;cursor:pointer}
.langpill button.on{background:#fff;color:var(--blue)}
</style>

{q:"(248 + 152) : 8 - 15 ifodaning qiymatini toping.",options:["30","35","40","45"],correct:1,solution:"248 + 152 = 400. 400 : 8 = 50. 50 - 15 = 35.",topic:"m1"},

{q:"8² + 6² ifodaning qiymatini hisoblang.",options:["48","84","100","196"],correct:2,solution:"8² = 64, 6² = 36. 64 + 36 = 100.",topic:"m1"},

{q:"(96 - 24) : 12 + 5 × 3 ifodaning qiymatini toping.",options:["15","18","21","24"],correct:2,solution:"96 - 24 = 72. 72 : 12 = 6. 5 × 3 = 15. 6 + 15 = 21.",topic:"m1"},
{q:"2 dan 9 gacha bo'lgan barcha natural sonlar yig'indisini toping.",options:["40","42","44","48"],correct:2,solution:"2+3+4+5+6+7+8+9 = (2+9)×8:2 = 44.",topic:"m1"},
{q:"7 ta ketma-ket natural sonning yig'indisi 70 ga teng. Eng katta sonni toping.",options:["12","13","14","15"],correct:1,solution:"7 ta ketma-ket sonning o'rta hadi yig'indini 7 ga bo'lishdan topiladi: 70:7=10. Sonlar 7,8,9,10,11,12,13 — eng kattasi 13.",topic:"m1"},
{q:"356 ni 1000 dan ayirib, hosil bo'lgan ayirmani 4 ga ko'paytiring.",options:["2496","2576","2616","2704"],correct:1,solution:"1000 - 356 = 644. 644 × 4 = 2576.",topic:"m1"},
{q:"84 va 126 sonlarining EKUBini (eng katta umumiy bo'luvchisini) toping.",options:["21","42","63","84"],correct:1,solution:"84 = 2²×3×7, 126 = 2×3²×7. Umumiy ko'paytuvchilar: 2×3×7 = 42.",topic:"m2"},
{q:"18, 24 va 36 sonlarining EKUKini (eng kichik umumiy bo'linuvchisini) toping.",options:["36","48","72","144"],correct:2,solution:"18=2×3², 24=2³×3, 36=2²×3². EKUK = 2³×3² = 72.",topic:"m2"},
{q:"936 sonini 8 ga bo'lgandagi bo'linmani toping.",options:["107","117","127","137"],correct:1,solution:"936 ning oxirgi uch raqami (936) 8 ga bo'linadi: 936 : 8 = 117.",topic:"m2"},
{q:"Quyidagi sonlardan qaysi biri 9 ga bo'linadi: 2345, 3344, 5104, 6831?",options:["2345","3344","5104","6831"],correct:3,solution:"Son 9 ga bo'linishi uchun raqamlari yig'indisi 9 ga bo'linishi kerak. 6+8+3+1=18, 18:9=2 — bo'linadi. Qolganlar: 2345→14, 3344→14, 5104→10 — 9 ga bo'linmaydi.",topic:"m2"},
{q:"120 sonining barcha natural bo'luvchilari sonini toping.",options:["12","14","16","18"],correct:2,solution:"120 = 2³×3×5. Bo'luvchilar soni = (3+1)(1+1)(1+1) = 4×2×2 = 16.",topic:"m2"},

{q:"45 va 75 sonlarining EKUBini toping va har ikki sonni shu songa bo'lib, hosil bo'lgan sonlarning yig'indisini toping.",options:["6","7","8","9"],correct:2,solution:"EKUB(45,75)=15. 45:15=3, 75:15=5. 3+5=8.",topic:"m2"},
{q:"Ikki sonning EKUBi 6, EKUKi 72. Sonlardan biri 18 bo'lsa, ikkinchisini toping.",options:["20","24","28","36"],correct:1,solution:"Ikki son ko'paytmasi EKUB×EKUK ga teng: 6×72=432. Ikkinchi son = 432:18 = 24.",topic:"m2"},
{q:"100 dan kichik, 6 ga ham, 8 ga ham bo'linadigan eng katta sonni toping.",options:["72","84","96","100"],correct:2,solution:"EKUK(6,8)=24. 24 ning 100 dan kichik eng katta ko'paytmasi: 24×4=96.",topic:"m2"},
