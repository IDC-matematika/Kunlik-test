ие 4³ в виде степени с основанием 2 и найдите его значение.",o:["2⁵=32","2⁶=64","2⁷=128","2¹²=4096"],s:"4 = 2², поэтому 4³ = (2²)³ = 2⁶ = 64."},433:{q:"Найдите 25% от 240.",o:["48","54","60","72"],s:"240 × 25 : 100 = 240 × 1/4 = 60."},434:{q:"В классе 15 учеников, из них 20% — девочки. Сколько девочек в классе?",o:["2","3","4","5"],s:"15 × 20 : 100 = 15 × 0,2 = 3."},435:{q:"Товар стоимостью 80000 сум продаётся со скидкой 15%. Найдите цену после скидки.",o:["12000 сум","65000 сум","68000 сум","70000 сум"],s:"Скидка: 80000 × 15 : 100 = 12000. Новая цена: 80000 − 12000 = 68000 сум."},436:{q:"В банк положено 200000 сум под 8% годовых. Сколько будет на счёте через 1 год?",o:["208000 сум","210000 сум","216000 сум","224000 сум"],s:"Проценты: 200000 × 8 : 100 = 16000. Итоговая сумма: 200000 + 16000 = 216000 сум."},437:{q:"Из 40 учеников 12 интересуются спортом. Сколько процентов составляют интересующиеся спортом?",o:["20%","25%","30%","35%"],s:"12 : 40 × 100% = 30%."},438:{q:"Цена товара сначала была увеличена на 25%, затем на новую цену дали скидку 20%. Если начальная цена 1000 сум, найдите итоговую цену.",o:["900 сум","1000 сум","1050 сум","1100 сум"],s:"1000 × 1,25 = 1250. 1250 × 0,8 = 1000 сум. Итоговая цена равна начальной."},439:{q:"40% некоторого числа равны 60. Найдите это число.",o:["120","130","140","150"],s:"x × 0,4 = 60. x = 60 : 0,4 = 150."},440:{q:"Из 750 орехов 30% оказались испорченными. Найдите количество пригодных орехов.",o:["225","450","525","600"],s:"Испорченные: 750 × 0,3 = 225. Пригодные: 750 − 225 = 525."},441:{q:"В посёлке с населением 5000 человек население ежегодно увеличивается на 10%. Каким будет население через 2 года?",o:["5500","6000","6050","6100"],s:"1-й год: 5000 × 1,1 = 5500. 2-й год: 5500 × 1,1 = 6050."},442:{q:"Число A на 25% больше числа B. Если B = 80, найдите A.",o:["95","100","105","110"],s:"A = 80 + 80 × 0,25 = 80 + 20 = 100."},443:{q:"Найдите периметр прямоугольника со сторонами 7 см и 12 см.",o:["19 см","34 см","38 см","84 см"],s:"P = 2 × (7+12) = 2 × 19 = 38 см."},444:{q:"Найдите сторону квадрата, площадь которого равна 144 см².",o:["10 см","11 см","12 см","14 см"],s:"Сторона = √144 = 12 см."},445:{q:"Найдите площадь треугольника с основанием 10 см и высотой 6 см.",o:["16 см²","30 см²","60 см²","68 см²"],s:"S = (основание × высота) : 2 = (10×6):2 = 30 см²."},446:{q:"Найдите площадь круга радиусом 14 см (примите π ≈ 22/7).",o:["308 см²","440 см²","616 см²","880 см²"],s:"S = πr² = 22/7 × 14² = 22/7 × 196 = 616 см²."},447:{q:"Найдите площадь трапеции с основаниями 8 см и 14 см и высотой 5 см.",o:["44 см²","55 см²","70 см²","110 см²"],s:"S = (сумма оснований : 2) × высота = ((8+14):2) × 5 = 11 × 5 = 55 см²."},448:{q:"Найдите площадь квадрата, периметр которого равен 56 см.",o:["144 см²","169 см²","196 см²","225 см²"],s:"Сторона = 56 : 4 = 14 см. Площадь = 14² = 196 см²."},449:{q:"Катеты прямоугольного треугольника равны 9 см и 12 см. Найдите гипотенузу.",o:["13 см","14 см","15 см","21 см"],s:"Гипотенуза = √(9²+12²) = √(81+144) = √225 = 15 см."},450:{q:"Найдите периметр ромба со стороной 6 см.",o:["12 см","18 см","24 см","36 см"],s:"У ромба все стороны равны: P = 4 × 6 = 24 см."},451:{q:"Найдите площадь параллелограмма с основанием 15 см и высотой 8 см.",o:["60 см²","92 см²","120 см²","240 см²"],s:"S = основание × высота = 15 × 8 = 120 см²."},452:{q:"Из прямоугольника со сторонами 20 см и 15 см вырезали квадрат со стороной 5 см. Найдите площадь оставшейся фигуры.",o:["250 см²","275 см²","295 см²","300 см²"],s:"Площадь прямоугольника: 20×15=300 см². Площадь квадрата: 5²=25 см². Оставшаяся площадь: 300−25=275 см²."},453:{q:"Найдите объём прямоугольного параллелепипеда с ребрами 4 см, 5 см и 6 см.",o:["60 см³","90 см³","120 см³","150 см³"],s:"V = a×b×c = 4×5×6 = 120 см³."},454:{q:"Найдите полную площадь поверхности куба со стороной 7 см.",o:["196 см²","245 см²","294 см²","343 см²"],s:"Площадь поверхности куба = 6a² = 6 × 49 = 294 см²."},455:{q:"Найдите объём цилиндра с радиусом 3 см и высотой 7 см (выразите через π).",o:["21π см³","42π см³","63π см³","84π см³"],s:"V = πr²h = π × 3² × 7 = 63π см³."},456:{q:"Найдите объём шара радиусом 5 см (V = 4/3 πr³, выразите через π).",o:["100π/3 см³","125π см³","250π см³","500π/3 см³"],s:"V = 4/3 × π × 5³ = 4/3 × π × 125 = 500π/3 см³."},457:{q:"Найдите объём правильной пирамиды, в основании которой квадрат со стороной 6 см, а высота равна 4 см (V = 1/3 × S × h).",o:["24 см³","36 см³","48 см³","72 см³"],s:"S = 6² = 36 см². V = 1/3 × 36 × 4 = 48 см³."},458:{q:"Объём куба равен 216 см³. Найдите его ребро.",o:["5 см","6 см","8 см","9 см"],s:"Ребро = ∛216 = 6 см (6³ = 216)."},459:{q:"Найдите объём конуса с радиусом основания 6 см и высотой 10 см (V = 1/3 πr²h, выразите через π).",o:["60π см³","120π см³","180π см³","360π см³"],s:"V = 1/3 × π × 6² × 10 = 1/3 × π × 360 = 120π см³."},460:{q:"Найдите полную площадь поверхности прямоугольного параллелепипеда с размерами 3 см, 4 см и 5 см.",o:["47 см²","60 см²","94 см²","120 см²"],s:"S = 2×(ab+bc+ac) = 2×(3×4+4×5+3×5) = 2×(12+20+15) = 2×47 см²."},461:{q:"Сколько ребёр у треугольной пирамиды (тетраэдра)?",o:["4","5","6","8"],s:"У тетраэдра 4 вершины, 4 грани и 6 рёбер."},462:{q:"Найдите общее число граней правильной призмы, основанием которой является восьмиугольник.",o:["8","9","10","16"],s:"У призмы 2 основания и 8 боковых граней: 2 + 8 = 10 граней."},463:{q:"Выразите 3,5 т в килограммах.",o:["350 кг","3500 кг","35000 кг","350000 кг"],s:"1 т = 1000 кг. 3,5 × 1000 = 3500 кг."},464:{q:"Выразите 2 часа 15 минут в минутах.",o:["125 минут","130 минут","135 минут","145 минут"],s:"2 часа = 120 минут. 120 + 15 = 135 минут."},465:{q:"Выразите 0,75 км в метрах.",o:["75 м","750 м","7500 м","7,5 м"],s:"1 км = 1000 м. 0,75 × 1000 = 750 м."},466:{q:"Выразите 4,2 м² в см².",o:["420 см²","4200 см²","42000 см²","420000 см²"],s:"1 м² = 10000 см². 4,2 × 10000 = 42000 см²."},467:{q:"Выразите 1500 мл в литрах.",o:["0,15 л","1,5 л","15 л","150 л"],s:"1 л = 1000 мл. 1500 : 1000 = 1,5 л."},468:{q:"Если машина движется со скоростью 90 км/ч в течение 2,5 часов, какое расстояние она проедет?",o:["180 км","200 км","225 км","250 км"],s:"Расстояние = скорость × время = 90 × 2,5 = 225 км."},469:{q:"Выразите 2 т 350 кг в килограммах.",o:["235 кг","2350 кг","2530 кг","23500 кг"],s:"2 т = 2000 кг. 2000 + 350 = 2350 кг."},470:{q:"Выразите 5 км 240 м в метрах.",o:["524 м","5240 м","5024 м","50240 м"],s:"5 км = 5000 м. 5000 + 240 = 5240 м."},471:{q:"Выразите 120 минут в часах.",o:["1 час","1,5 часа","2 часа","2,5 часа"],s:"60 минут = 1 час. 120 : 60 = 2 часа."},472:{q:"Выразите 3,2 м в сантиметрах.",o:["32 см","320 см","3200 см","0,32 см"],s:"1 м = 100 см. 3,2 × 100 = 320 см."},473:{q:"Упростите произведение 3x²y × 4xy³.",o:["7x³y⁴","12x³y⁴","12x²y³","12x³y³"],s:"Коэффициенты: 3×4=12. x²×x=x³. y×y³=y⁴. Результат: 12x³y⁴."},474:{q:"Упростите выражение (−2a²b)³.",o:["−8a⁶b³","8a⁶b³","−6a⁶b³","−8a⁵b³"],s:"(−2)³=−8, (a²)³=a⁶, b³=b³. Результат: −8a⁶b³."},475:{q:"Упростите выражение 12x⁵y³ : 4x²y.",o:["3x³y²","3x²y²","8x³y²","3x⁷y⁴"],s:"12:4=3. x⁵:x²=x³. y³:y=y². Результат: 3x³y²."},476:{q:"Найдите сумму одночленов 5m³n² и −3m³n².",o:["2m³n²","2m⁶n⁴","8m³n²","−2m³n²"],s:"Подобные члены: 5m³n² + (−3m³n²) = (5−3)m³n² = 2m³n²."},477:{q:"Упростите выражение (3x²)² × x.",o:["6x⁵","9x⁴","9x⁵","3x⁵"],s:"(3x²)² = 9x⁴. 9x⁴ × x = 9x⁵."},478:{q:"Найдите сумму коэффициента и степени одночлена −7a⁴b².",o:["−3","−1","1","3"],s:"Коэффициент = −7. Степень = 4+2 = 6. Сумма: −7 + 6 = −1."},479:{q:"Упростите выражение 2x³ × 5x⁴.",o:["7x⁷","10x⁷","10x¹²","7x¹²"],s:"Коэффициенты: 2×5=10. x³×x⁴=x⁷. Результат: 10x⁷."},480:{q:"Упростите выражение (4a²b³)² : (2ab)².",o:["2a²b⁴","4a²b⁴","4a⁴b⁶","8a²b⁴"],s:"(4a²b³)² = 16a⁴b⁶. (2ab)² = 4a²b². 16a⁴b⁶ : 4a²b² = 4a²b⁴."},481:{q:"Из 6x⁴y⁵ вычтите 2x⁴y⁵.",o:["4x⁴y⁵","4x⁸y¹⁰","8x⁴y⁵","3x⁴y⁵"],s:"(6−2)x⁴y⁵ = 4x⁴y⁵."},482:{q:"Возведите одночлен −3x²y³ в квадрат.",o:["−9x⁴y⁶","9x⁴y⁶","9x²y³","−6x⁴y⁶"],s:"(−3x²y³)² = (−3)² × (x²)² × (y³)² = 9x⁴y⁶."},483:{q:"Запишите произведение (x+5)(x−3) в виде многочлена.",o:["x²+2x−15","x²−2x−15","x²+2x+15","x²+8x−15"],s:"(x+5)(x−3) = x² − 3x + 5x − 15 = x² + 2x − 15."},484:{q:"Запишите произведение (2x−1)(x+4) в виде многочлена.",o:["2x²+7x−4","2x²−7x−4","2x²+9x−4","2x²+7x+4"],s:"(2x−1)(x+4) = 2x² + 8x − x − 4 = 2x² + 7x − 4."},485:{q:"Раскройте выражение (x+7)².",o:["x²+49","x²+14x+49","x²+7x+49","x²+14x+14"],s:"(x+7)² = x² + 2×x×7 + 7² = x² + 14x + 49."},486:{q:"Раскройте выражение (x−6)².",o:["x²−36","x²−12x+36","x²−6x+36","x²+12x+36"],s:"(x−6)² = x² − 2×x×6 + 6² = x² − 12x + 36."},487:{q:"Раскройте выражение (x−5)(x+5).",o:["x²−25","x²+25","x²−10x−25","x²−10x+25"],s:"(x−5)(x+5) = x² − 5² = x² − 25 (формула разности квадратов)."},488:{q:"Упростите сумму (3x²+2x−1) + (x²−5x+4).",o:["4x²−3x+3","4x²+3x+3","4x²−3x−3","2x²−3x+3"],s:"Складываем подобные члены: (3+1)x² + (2−5)x + (−1+4) = 4x² − 3x + 3."},489:{q:"Упростите разность (5x²−3x+2) − (2x²+x−6).",o:["3x²−4x+8","3x²−2x−4","3x²−4x−4","7x²−2x−4"],s:"(5−2)x² + (−3−1)x + (2+6) = 3x² − 4x + 8."},490:{q:"Если P(x) = 2x² − 3x + 1, найдите P(2).",o:["1","3","5","7"],s:"P(2) = 2×4 − 3×2 + 1 = 8 − 6 + 1 = 3."},491:{q:"Разложите многочлен x² − 9x на множители, вынеся общий множитель.",o:["x(x−9)","x(x+9)","9(x−x)","x²(x−9)"],s:"В обоих членах общий множитель x: x² − 9x = x(x−9)."},492:{q:"Упростите произведение (x−2)(x²+2x+4).",o:["x³−8","x³+8","x³−2x²−8","x³−6x−8"],s:"Это формула разности кубов: (a−b)(a²+ab+b²)=a³−b³, где a=x, b=2. Результат: x³−8."},493:{q:"Решите уравнение 3(x−2) + 5 = 2x + 7.",o:["6","7","8","9"],s:"3x − 6 + 5 = 2x + 7 → 3x − 1 = 2x + 7 → x = 8."},494:{q:"Решите уравнение (x+3)/4 = (2x−1)/6.",o:["9","10","11","12"],s:"Умножим обе части на 12: 3(x+3) = 2(2x−1) → 3x+9 = 4x−2 → x = 11."},495:{q:"Решите уравнение 5x − 3(x−4) = 20.",o:["2","4","6","8"],s:"5x − 3x + 12 = 20 → 2x = 8 → x = 4."},496:{q:"Решите уравнение 2(3x+1) − 4(x−2) = 18.",o:["3","4","5","6"],s:"6x + 2 − 4x + 8 = 18 → 2x + 10 = 18 → 2x = 8 → x = 4."},497:{q:"Если некоторое число умножить на 3 и из результата вычесть 7, получится 20. Найдите это число.",o:["7","8","9","10"],s:"3x − 7 = 20 → 3x = 27 → x = 9."},498:{q:"Отец старше сына на 24 года. Через 5 лет отец будет старше сына в 3 раза. Найдите текущий возраст сына.",o:["5","6","7","8"],s:"Сын — x лет, отец — x+24 лет. Через 5 лет: x+24+5 = 3(x+5) → x+29 = 3x+15 → 14 = 2x → x = 7."},499:{q:"Решите уравнение (2x−5)/3 + 1 = x.",o:["−3","−2","−1","2"],s:"Умножим обе части на 3: 2x−5+3=3x → 2x−2=3x → −2=x."},500:{q:"Решите уравнение 0,5x + 1,5 = 0,2x + 6.",o:["10","12","15","18"],s:"0,5x − 0,2x = 6 − 1,5 → 0,3x = 4,5 → x = 15."},501:{q:"Решите уравнение x/3 + x/4 = 7.",o:["10","12","14","21"],s:"Общий знаменатель 12: 4x/12 + 3x/12 = 7 → 7x/12 = 7 → x = 12."},502:{q:"Сумма двух чисел равна 45. Одно из них на 9 больше другого. Найдите меньшее число.",o:["16","17","18","19"],s:"Меньшее число x, большее x+9. x + (x+9) = 45 → 2x+9=45 → 2x=36 → x=18."},503:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + 2y = 11</span><span>x − y = 2</span></span></span>",o:["x=5, y=3","x=3, y=5","x=7, y=2","x=4, y=3,5"],s:"Из второго уравнения x = y+2. Подставляем в первое: (y+2)+2y=11 → 3y+2=11 → 3y=9 → y=3. Тогда x=5.\nПроверка: 5+2×3=11 ✓, 5−3=2 ✓."},504:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x − 2y = 4</span><span>x + y = 8</span></span></span>",o:["x=4, y=4","x=3, y=5","x=5, y=3","x=2, y=6"],s:"Из второго уравнения x=8−y. Подставляем в первое: 3(8−y)−2y=4 → 24−3y−2y=4 → 24−5y=4 → 5y=20 → y=4. Тогда x=4.\nПроверка: 3×4−2×4=4 ✓, 4+4=8 ✓."},505:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + y = 11</span><span>x − 2y = −2</span></span></span>",o:["x=4, y=3","x=3, y=4","x=5, y=1","x=6, y=−1"],s:"Умножим первое уравнение на 2: 4x+2y=22. Сложим со вторым уравнением: 5x=20 → x=4. Тогда y=11−2×4=3.\nПроверка: 2×4+3=11 ✓, 4−2×3=−2 ✓."},506:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x = 3y</span><span>2x + y = 21</span></span></span>",o:["x=9, y=3","x=6, y=2","x=12, y=4","x=3, y=9"],s:"Подставляем x=3y во второе уравнение: 2×3y+y=21 → 7y=21 → y=3. Тогда x=3×3=9.\nПроверка: x=3y → 9=3×3 ✓, 2×9+3=21 ✓."},507:{q:"Сумма двух чисел равна 50, а разность равна 12. Найдите большее число.",o:["28","29","31","33"],s:"Пусть большее число x, меньшее y. x+y=50 и x−y=12. Сложив уравнения: 2x=62 → x=31."},508:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + 2y = 19</span><span>x − y = 3</span></span></span>",o:["x=5, y=2","x=4, y=1","x=6, y=3","x=7, y=4"],s:"Из второго уравнения x=y+3. Подставляем в первое: 3(y+3)+2y=19 → 5y+9=19 → 5y=10 → y=2. Тогда x=5.\nПроверка: 3×5+2×2=19 ✓, 5−2=3 ✓."},509:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + 5y = 7</span><span>x + 3y = 3</span></span></span>",o:["x=6, y=−1","x=−1, y=6","x=3, y=0","x=8, y=−2"],s:"Из второго уравнения x=3−3y. Подставляем в первое: 2(3−3y)+5y=7 → 6−y=7 → y=−1. Тогда x=3−3×(−1)=6.\nПроверка: 2×6+5×(−1)=7 ✓, 6+3×(−1)=3 ✓."},510:{q:"Один карандаш стоит 1500 сум, одна тетрадь — 2500 сум. Всего купили 10 штук (карандашей и тетрадей) и заплатили 19000 сум. Сколько тетрадей было куплено?",o:["3","4","5","6"],s:"Пусть количество карандашей p, тетрадей d. p+d=10 и 1500p+2500d=19000. Подставляем p=10−d: 1500(10−d)+2500d=19000 → 15000+1000d=19000 → 1000d=4000 → d=4."},511:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 2x + 1</span><span>3x + y = 11</span></span></span>",o:["x=2, y=5","x=5, y=2","x=3, y=7","x=1, y=3"],s:"Подставляем y=2x+1 во второе: 3x+2x+1=11 → 5x=10 → x=2. Тогда y=2×2+1=5.\nПроверка: 5=2×2+1 ✓, 3×2+5=11 ✓."},512:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x − 2y = −1</span><span>x + y = 11</span></span></span>",o:["x=7, y=4","x=4, y=7","x=9, y=2","x=5, y=6"],s:"Из второго уравнения x=11−y. Подставляем в первое: (11−y)−2y=−1 → 11−3y=−1 → 3y=12 → y=4. Тогда x=7.\nПроверка: 7−2×4=−1 ✓, 7+4=11 ✓."},513:{q:"Машина проехала 240 км за 3 часа. На обратном пути она двигалась на 20 км/ч быстрее. Сколько часов заняла обратная дорога?",o:["2 часа","2,2 часа","2,4 часа","2,5 часа"],s:"Скорость туда: 240:3=80 км/ч. Скорость обратно: 80+20=100 км/ч. Время обратно: 240:100=2,4 часа."},514:{q:"Один рабочий выполняет работу за 12 дней, другой — за 8 дней. За сколько дней они выполнят работу вместе?",o:["4 дня","4,5 дня","4,8 дня","5 дней"],s:"Доля работы 1-го рабочего за день — 1/12, 2-го — 1/8. Вместе: 1/12+1/8=5/24. Время = 24/5 = 4,8 дня."},515:{q:"Мать старше дочери на 28 лет. Через 4 года мать будет старше дочери в 3 раза. Сколько лет дочери сейчас?",o:["8","9","10","12"],s:"Дочь — x лет, мать — x+28 лет. Через 4 года: x+28+4=3(x+4) → x+32=3x+12 → 20=2x → x=10."},516:{q:"В смеси массой 120 кг отношение муки и риса равно 3:5. Сколько килограммов риса в смеси?",o:["45 кг","60 кг","72 кг","75 кг"],s:"Всего частей: 3+5=8. Рис: 120:8×5=75 кг."},517:{q:"Расстояние между двумя городами 360 км. Два автомобиля одновременно выехали навстречу друг другу со скоростями 70 км/ч и 50 км/ч. Через сколько часов они встретятся?",o:["2 часа","2,5 часа","3 часа","3,5 часа"],s:"Скорость сближения: 70+50=120 км/ч. Время = 360:120 = 3 часа."},518:{q:"Одну работу 3 рабочих выполняют за 10 дней. За сколько дней эту работу выполнят 5 рабочих (при одинаковой производительности)?",o:["5 дней","6 дней","7 дней","8 дней"],s:"Общий объём работы: 3×10=30 человеко-дней. Для 5 рабочих: 30:5=6 дней."},519:{q:"Первая труба заполняет бассейн за 6 часов, вторая — за 9 часов. За сколько часов бассейн заполнится, если открыть обе трубы вместе?",o:["3 часа","3,6 часа","4 часа","4,5 часа"],s:"Доля 1-й трубы за час — 1/6, 2-й — 1/9. Вместе: 1/6+1/9=5/18. Время = 18/5 = 3,6 часа."},520:{q:"У Алишера денег в 2 раза больше, чем у Ботира. Вместе у них 90000 сум. Сколько денег у Алишера?",o:["30000 сум","45000 сум","60000 сум","70000 сум"],s:"У Ботира x, у Алишера 2x. x+2x=90000 → 3x=90000 → x=30000. У Алишера 2×30000=60000 сум."},521:{q:"Отношение двух чисел равно 4:7, а их разность равна 27. Найдите большее число.",o:["49","56","63","70"],s:"Разность соответствует 3 частям (7−4=3): 1 часть = 27:3=9. Большее число = 7×9=63."},522:{q:"Пешеход проходит 2 км за 24 минуты. За сколько минут он пройдёт 5 км с той же скоростью?",o:["48 минут","54 минуты","60 минут","75 минут"],s:"На 1 км требуется 24:2=12 минут. На 5 км: 12×5=60 минут."},523:{q:"Количество покупателей, посетивших магазин за неделю: понедельник — 45, вторник — 38, среда — 52, четверг — 41, пятница — 60, субота — 70, воскресенье — 44. Сколько покупателей в среднем приходило в магазин в день за неделю?",o:["45","48","50","52"],s:"Всего: 45+38+52+41+60+70+44=350. Среднее: 350:7=50."},524:{q:"Результаты теста (баллы) 5 учеников: 78, 85, 92, 67, 88. Найдите разницу между наибольшим и наименьшим результатами.",o:["20","22","25","30"],s:"Наибольший результат — 92, наименьший — 67. Разница: 92−67=25."},525:{q:"В опросе среди 40 учеников класса 15 человек сказали, что любят футбол. Сколько процентов составляют те, кто любит футбол?",o:["30%","35%","37,5%","40%"],s:"15:40×100% = 37,5%."},526:{q:"Доход магазина за 4 месяца (млн сум): январь — 12, февраль — 15, март — 9, апрель — 18. Найдите разницу между месяцами с наибольшим и наименьшим доходом.",o:["3 млн сум","6 млн сум","9 млн сум","12 млн сум"],s:"Наибольший доход — апрель (18), наименьший — март (9). Разница: 18−9=9 млн сум."},527:{q:"360 студентов распределены по факультетам: математика — 90, физика — 72, химия — 108, биология — 90. Сколько процентов от общего числа студентов составляют студенты математического факультета?",o:["20%","22,5%","25%","30%"],s:"90:360×100% = 25%."},528:{q:"Количество осадков за две недели: 1-я неделя — 23 мм, 2-я неделя — 17 мм. Найдите среднее количество осадков за две недели.",o:["18 мм","19 мм","20 мм","21 мм"],s:"Всего: 23+17=40 мм. Среднее: 40:2=20 мм."},529:{q:"Температура за 5 дней (°C): 18, 21, 19, 24, 23. Найдите среднюю температуру.",o:["19°C","20°C","21°C","22°C"],s:"Всего: 18+21+19+24+23=105. Среднее: 105:5=21°C."},530:{q:"В магазине цена яблок — 12000 сум/кг, цена груш — 15000 сум/кг. Найдите общую стоимость 2 кг яблок и 1 кг груш.",o:["27000 сум","36000 сум","39000 сум","42000 сум"],s:"2×12000+1×15000 = 24000+15000 = 39000 сум."},531:{q:"Объём продаж за 6 месяцев (штук): 120, 135, 110, 145, 130, 140. На сколько штук продажи в месяце с наибольшим объёмом превышают средний объём продаж?",o:["10","12","15","18"],s:"Всего: 120+135+110+145+130+140=780. Среднее: 780:6=130. Наибольший объём продаж: 145. Разница: 145−130=15 штук."},532:{q:"Способ добирания до школы 200 учеников: пешком — 80, на автобусе — 60, на велосипеде — 40, на машине — 20. На сколько процентных пунктов доля идущих пешком больше доли едущих на автобусе?",o:["5","8","10","15"],s:"Пешком: 80:200×100%=40%. Автобус: 60:200×100%=30%. Разница: 40%−30%=10 процентных пунктов."},533:{q:"При пересечении двух прямых один из образовавшихся углов равен 72°. Найдите смежный с ним угол.",o:["18°","72°","98°","108°"],s:"Сумма смежных углов равна 180°: 180°−72°=108°."},534:{q:"Отношение внутренних углов треугольника равно 2:3:4. Найдите наибольший угол.",o:["60°","70°","80°","90°"],s:"Всего частей: 2+3+4=9. Одна часть: 180°:9=20°. Наибольший угол: 4×20°=80°."},535:{q:"Прямая, пересекающая параллельные прямые, образует односторонние внутренние углы, один из которых равен 110°. Найдите второй угол.",o:["60°","70°","80°","110°"],s:"Сумма односторонних внутренних углов равна 180°: 180°−110°=70°."},536:{q:"Сумма двух углов равна 90°. Если первый угол в 2 раза больше второго, найдите меньший угол.",o:["20°","30°","40°","45°"],s:"Меньший угол — x, больший — 2x. x+2x=90° → 3x=90° → x=30°."},537:{q:"Сумма двух смежных углов равна 180°. Один из них больше другого на 40°. Найдите меньший угол.",o:["60°","65°","70°","75°"],s:"Меньший угол — x, больший — x+40°. x+(x+40°)=180° → 2x=140° → x=70°."},538:{q:"Найдите расстояние между точками A(2; 3) и B(2; 9).",o:["4","6","8","12"],s:"Так как x-координаты точек равны, расстояние = |9−3| = 6."},539:{q:"На числовой прямой даны точки M(−5) и N(7). Найдите расстояние MN.",o:["2","7","12","35"],s:"MN = |7−(−5)| = |12| = 12."},540:{q:"Два внутренних угла треугольника равны 50° и 65°. Найдите внешний угол, смежный с третьим углом.",o:["65°","105°","115°","125°"],s:"Третий внутренний угол: 180°−50°−65°=65°. Смежный с ним внешний угол: 180°−65°=115° (по теореме о внешнем угле также 50°+65°=115°)."},541:{q:"Угол величиной 40° разделён биссектрисой на две части. Найдите каждый из получившихся углов.",o:["10°","15°","20°","25°"],s:"Биссектриса делит угол на два равных угла: 40°:2=20°."},542:{q:"Найдите угол между минутной и часовой стрелками часов в 3:00.",o:["60°","75°","90°","120°"],s:"В 3:00 минутная стрелка указывает на 12, часовая — на 3. Угол между ними равен 90°."},543:{q:"Сколькими способами можно распределить первое, второе и третье места среди 6 учеников?",o:["60","90","120","216"],s:"Размещения: 6×5×4=120."},544:{q:"Сколькими способами можно выбрать 3 учеников из 10 для поездки (порядок не важен)?",o:["30","60","120","720"],s:"Сочетания: C(10,3) = (10×9×8):(1×2×3) = 720:6 = 120."},545:{q:"В ресторане 4 вида блюд и 3 вида напитков. Сколько различных вариантов выбора получится, если выбрать одно блюдо и один напиток?",o:["7","12","16","24"],s:"Правило умножения: 4×3=12."},546:{q:"Найдите значение выражения 5! (5 факториал).",o:["20","60","120","720"],s:"5! = 5×4×3×2×1 = 120."},547:{q:"Используя цифры от 0 до 9, сколько различных 3-значных паролей можно составить, если цифры могут повторяться?",o:["100","720","900","1000"],s:"Для каждого разряда есть 10 вариантов: 10×10×10=1000."},548:{q:"Сколькими способами можно выбрать 2 друзей из 8, чтобы они принесли подарок?",o:["16","28","56","64"],s:"Сочетания: C(8,2) = (8×7):(1×2) = 56:2 = 28."},549:{q:"Сколько различных последовательностей из 4 букв можно составить, переставляя 4 буквы слова «ОЛИМ» (буквы не повторяются)?",o:["4","12","16","24"],s:"Число перестановок 4 различных букв: 4! = 24."},550:{q:"На встрече присутствуют 7 человек. Если каждый человек пожимает руку каждому другому ровно один раз, сколько всего будет рукопожатий?",o:["14","21","42","49"],s:"Сочетания: C(7,2) = (7×6):(1×2) = 42:2 = 21."},551:{q:"В шкафу 5 видов рубашек и 4 вида брюк. Сколько различных комбинаций одежды получится, если надеть одну рубашку и одни брюки?",o:["9","18","20","24"],s:"Правило умножения: 5×4=20."},552:{q:"Используя цифры 1, 2, 3, 4, 5 (без повторения), сколько трёхзначных чисел можно составить?",o:["10","20","60","125"],s:"Размещения: 5×4×3=60."},553:{q:"Найдите сумму наибольшего двузначного натурального числа и наименьшего четырёхзначного натурального числа.",o:["1099","1100","1098","999"],s:"Наибольшее двузначное число = 99.\nНаименьшее четырёхзначное число = 1000.\nСумма = 99 + 1000 = 1099."},554:{q:"Вычислите: 1 − 2 + 3 − 4 + 5 − 6 + ... + 99 − 100",o:["−50","50","−100","0"],s:"Сгруппируем числа парами: (1−2)+(3−4)+...+(99−100).\nКаждая пара = −1.\nКоличество пар = 100:2 = 50.\nСумма = 50·(−1) = −50."},555:{q:"Вычислите удобным способом: 23 · 18 + 23 · 12 − 23 · 10",o:["460","450","480","506"],s:"Выносим общий множитель за скобки:\n23·(18+12−10) = 23·20 = 460."},556:{q:"Сколько из чисел 11, 21, 23, 27, 29, 33, 37, 41 являются простыми?",o:["5","4","6","3"],s:"Проверим каждое число:\n11 — простое, 21=3·7 — нет, 23 — простое, 27=3³ — нет, 29 — простое, 33=3·11 — нет, 37 — простое, 41 — простое.\nПростые числа: 11,23,29,37,41 — всего 5."},557:{q:"Утверждение A: «Число 12 делится на 3». Утверждение B: «Число 15 — чётное». Найдите правильный вывод об утверждениях.",o:["A — верно, B — неверно","A — неверно, B — верно","A и B — верны","A и B — неверны"],s:"A: 12:3=4, целое число, значит A — верно.\nB: 15 — нечётное число (не делится на 2), значит B — неверно.\nВывод: A — верно, B — неверно."},558:{q:"Найдите наименьшее из 5 последовательных чётных чисел, сумма которых равна 60.",o:["8","6","10","12"],s:"5 последовательных чётных чисел: x, x+2, x+4, x+6, x+8.\nСумма = 5x+20 = 60 → 5x=40 → x=8.\nНаименьшее = 8.\nПроверка: 8+10+12+14+16=60 ✓"},559:{q:"Найдите результат деления разности чисел 564 и 456 на 4.",o:["27","26","28","25"],s:"564 − 456 = 108.\n108 : 4 = 27."},560:{q:"Если из некоторого числа вычесть 125 и результат умножить на 7, получится 350. Найдите это число.",o:["175","165","185","150"],s:"(x − 125) · 7 = 350.\nx − 125 = 350:7 = 50.\nx = 50 + 125 = 175.\nПроверка: (175−125)·7 = 50·7 = 350 ✓"},561:{q:"Сколько чётных чисел находится в промежутке от 100 до 200 (включительно)?",o:["51","50","49","52"],s:"Чётные числа: 100, 102, 104, ..., 200.\nКоличество = (200−100):2 + 1 = 50+1 = 51."},562:{q:"Утверждение A: «Сумма всех натуральных делителей числа 36 равна 91». Утверждение B: «Число 17 — чётное». Найдите правильный вывод.",o:["A — верно, B — неверно","A — неверно, B — верно","A и B — верны","A и B — неверны"],s:"Делители числа 36: 1,2,3,4,6,9,12,18,36.\nСумма = 1+2+3+4+6+9+12+18+36 = 91. A — верно.\n17 — нечётное число, B — неверно.\nВывод: A — верно, B — неверно."},563:{q:"Сколько из чисел 213, 514, 6213, 729, 1001 делятся на 3?",o:["3","2","4","5"],s:"Если сумма цифр числа делится на 3, то и само число делится на 3:\n213→2+1+3=6 ✓\n514→5+1+4=10 ✗\n6213→6+2+1+3=12 ✓\n729→7+2+9=18 ✓\n1001→1+0+0+1=2 ✗\nВсего: 3."},564:{q:"Разложите число 84 на простые множители и найдите сумму различных простых множителей.",o:["12","14","9","19"],s:"84 = 2²·3·7.\nРазличные простые множители: 2, 3, 7.\nСумма = 2+3+7 = 12."},565:{q:"Найдите разность НОК(36,60) и НОД(36,60).",o:["168","172","160","180"],s:"36=2²·3², 60=2²·3·5.\nНОД = 2²·3 = 12.\nНОК = 2²·3²·5 = 180.\nРазность = 180−12 = 168."},566:{q:"Отношение двух чисел равно 2:3, их НОК равен 60. Найдите меньшее число.",o:["20","24","12","30"],s:"Обозначим числа как 2k и 3k, так как НОД(2,3)=1, то НОК(2k,3k)=6k.\n6k=60 → k=10.\nМеньшее число = 2k = 20."},567:{q:"Сколько чисел от 100 до 150 (включительно) делятся на 6?",o:["9","8","10","7"],s:"Числа, делящиеся на 6: 102,108,114,120,126,132,138,144,150.\nКоличество = (150−102):6 + 1 = 8+1 = 9."},568:{q:"Найдите результат деления числа 240 на его наименьший простой множитель.",o:["120","80","60","48"],s:"240 = 2⁴·3·5.\nНаименьший простой множитель = 2.\n240:2 = 120."},569:{q:"Произведение двух чисел равно 360, их НОД равен 6. Найдите их НОК.",o:["60","54","66","72"],s:"Правило: НОД · НОК = произведение чисел.\nНОК = 360 : 6 = 60."},570:{q:"Найдите НОД чисел 63 и 81, и разделите 63 на это число.",o:["7","9","6","8"],s:"63=3²·7, 81=3⁴.\nНОД(63,81) = 3² = 9.\n63 : 9 = 7."},571:{q:"Утверждение A: «Квадрат любого чётного числа делится на 4». Утверждение B: «Число 15 — простое». Найдите правильный вывод.",o:["A — верно, B — неверно","A — неверно, B — верно","A и B — верны","A и B — неверны"],s:"Чётное число имеет вид 2n, (2n)²=4n² — всегда делится на 4. A — верно.\n15=3·5, не простое число. B — неверно.\nВывод: A — верно, B — неверно."},572:{q:"Сколько чисел от 1 до 50 делятся и на 4, и на 6?",o:["4","3","5","6"],s:"Числа, делящиеся и на 4, и на 6, делятся на НОК(4,6)=12.\nЧисла, делящиеся на 12, от 1 до 50: 12,24,36,48 — всего 4."},573:{q:"Найдите значение выражения 3/8 + 5/12 в виде несократимой дроби.",o:["19/24","8/20","18/24","2/3"],s:"Приведём к общему знаменателю: НОК(8,12)=24.\n3/8=9/24, 5/12=10/24.\n9/24+10/24=19/24 — не сокращается."},574:{q:"Найдите значение выражения 2 3/5 · 1 1/4 в виде смешанного числа.",o:["3 1/4","3 1/2","2 3/4","3 3/4"],s:"2 3/5 = 13/5, 1 1/4 = 5/4.\n13/5 · 5/4 = 65/20 = 13/4 = 3 1/4."},575:{q:"Найдите значение выражения 4/9 : 2/3.",o:["2/3","8/27","3/2","6/9"],s:"Заменим деление умножением: 4/9 · 3/2 = 12/18 = 2/3."},576:{q:"Найдите значение выражения 5/6 − 1/4 + 1/3.",o:["11/12","3/4","5/12","13/12"],s:"Общий знаменатель 12: 10/12 − 3/12 + 4/12 = 11/12."},577:{q:"3/8 часть учеников класса — девочки, что составляет 12 человек. Сколько всего учеников в классе?",o:["32","30","36","24"],s:"x · 3/8 = 12 → x = 12 · 8/3 = 32."},578:{q:"Какая из дробей 2/5 и 5/8 больше и чему равна их разность?",o:["5/8 больше, разность 9/40","2/5 больше, разность 9/40","5/8 больше, разность 1/3","2/5 больше, разность 1/3"],s:"Общий знаменатель 40: 2/5=16/40, 5/8=25/40.\n25/40 > 16/40, значит 5/8 больше.\nРазность = 25/40 − 16/40 = 9/40."},579:{q:"Из уравнения x − 2/3 = 1/6 найдите x.",o:["5/6","1/2","1/6","7/6"],s:"x = 1/6 + 2/3 = 1/6 + 4/6 = 5/6."},580:{q:"5/6 часть некоторого числа равна 40. Найдите 1/3 часть этого числа.",o:["16","12","20","24"],s:"x · 5/6 = 40 → x = 40 · 6/5 = 48.\n1/3 часть от 48 = 16."},581:{q:"Какое из чисел 0,7 и 3/4 больше и чему равна их разность (в виде десятичной дроби)?",o:["3/4 больше, разность 0,05","0,7 больше, разность 0,05","3/4 больше, разность 0,5","равны"],s:"3/4 = 0,75. 0,75 > 0,7, значит 3/4 больше.\nРазность = 0,75 − 0,7 = 0,05."},582:{q:"Найдите значение выражения 2 1/2 + 3 1/3 − 1 1/6 в виде смешанного числа.",o:["4 2/3","4 1/3","5 1/6","4 1/6"],s:"Приведём дроби к знаменателю 6: 2 1/2=15/6, 3 1/3=20/6, 1 1/6=7/6.\n15/6+20/6−7/6 = 28/6 = 14/3 = 4 2/3."},583:{q:"Какое из чисел 0,7 и 0,68 больше и чему равна их разность?",o:["0,7 больше, разность 0,02","0,68 больше, разность 0,02","0,7 больше, разность 0,2","равны"],s:"0,7 = 0,70. 0,70 > 0,68.\nРазность = 0,70 − 0,68 = 0,02."},584:{q:"Вычислите 3,2 · 0,05.",o:["0,16","1,6","0,016","16"],s:"3,2 · 0,05 = 32 · 5 : 1000 = 160:1000 = 0,16."},585:{q:"Вычислите 12,48 : 0,4.",o:["31,2","3,12","312","30,2"],s:"12,48 : 0,4 = 124,8 : 4 = 31,2."},586:{q:"Вычислите 0,9 − 0,375.",o:["0,525","0,625","0,475","0,5"],s:"0,900 − 0,375 = 0,525."},587:{q:"Вычислите 2,5².",o:["6,25","5","12,5","25"],s:"2,5² = 2,5 · 2,5 = 6,25."},588:{q:"Вычислите 5,2 + 3,75 − 1,45.",o:["7,5","7,4","8,5","6,5"],s:"5,2 + 3,75 = 8,95.\n8,95 − 1,45 = 7,5."},589:{q:"Переведите число 0,004 в проценты.",o:["0,4%","4%","40%","0,04%"],s:"Для перевода в проценты умножаем на 100: 0,004 · 100% = 0,4%."},590:{q:"Округлите число 1,84 до десятых (до одного знака после запятой).",o:["1,8","1,9","1,84","2,0"],s:"Цифра в разряде сотых равна 4 < 5, поэтому округление в меньшую сторону: 1,84 ≈ 1,8."},591:{q:"Запишите сумму 0,25 + 0,5 в виде несократимой обычной дроби.",o:["3/4","5/4","1/2","7/10"],s:"0,25 + 0,5 = 0,75 = 75/100 = 3/4."},592:{q:"Сравните величины 670 см и 6 м 7 см.",o:["670 см > 6 м 7 см","670 см < 6 м 7 см","670 см = 6 м 7 см","сравнить невозможно"],s:"6 м 7 см = 600 см + 7 см = 607 см.\n670 см > 607 см, значит 670 см > 6 м 7 см."},593:{q:"Сколько из чисел −3/4, 5/(−7), −1/3, 0, 8/(−9), 2/5 являются отрицательными?",o:["4","3","5","2"],s:"Определим знаки:\n−3/4 — отрицательное, 5/(−7) — отрицательное, −1/3 — отрицательное, 0 — ноль, 8/(−9) — отрицательное, 2/5 — положительное.\nОтрицательных: 4."},594:{q:"Вычислите (−2,5) + 1,75 − (−0,5).",o:["−0,25","−4,75","0,25","−0,75"],s:"(−2,5) + 1,75 + 0,5 = −2,5 + 2,25 = −0,25."},595:{q:"Вычислите (−3)² − (−2)³ + (−1)⁵.",o:["16","0","18","−2"],s:"(−3)²=9, (−2)³=−8, (−1)⁵=−1.\n9 − (−8) + (−1) = 9+8−1 = 16."},596:{q:"Вычислите −24 : (−6) · (−3).",o:["−12","12","−2","2"],s:"Слева направо: −24:(−6) = 4.\n4 · (−3) = −12."},597:{q:"Найдите сумму всех решений уравнения |x| = 7.",o:["0","7","14","−7"],s:"|x|=7 → x=7 или x=−7.\nСумма = 7+(−7) = 0."},598:{q:"Какое из чисел −5/6 и −7/8 больше?",o:["−5/6","−7/8","равны","определить невозможно"],s:"Переведём в десятичные дроби: −5/6 ≈ −0,833, −7/8 = −0,875.\n−0,833 > −0,875 (ближе к нулю), значит −5/6 больше."},599:{q:"Вычислите (−1)²⁰²⁴ + (−1)²⁰²⁵.",o:["0","2","−2","1"],s:"(−1)²⁰²⁴ = 1 (чётная степень), (−1)²⁰²⁵ = −1 (нечётная степень).\n1 + (−1) = 0."},600:{q:"Если a=−4, b=3, найдите значение выражения a² − 2ab + b².",o:["49","1","−1","−49"],s:"a²−2ab+b² = (a−b)².\na−b = −4−3 = −7.\n(−7)² = 49."},601:{q:"Вычислите удобным способом: (−25) · 17 + (−25) · 3",o:["−500","500","−440","−110"],s:"Выделим общий множитель: (−25)·(17+3) = (−25)·20 = −500."},602:{q:"Из равенств x + 5 = −3 и y − 2 = −7 найдите x + y.",o:["−13","−10","−5","13"],s:"x = −3−5 = −8.\ny = −7+2 = −5.\nx+y = −8+(−5) = −13."},603:{q:"Вычислите значение выражения 3² · 3³ : 3⁴.",o:["3","9","1","27"],s:"Свойства степеней: aᵘ·aᵛ=aᵘ⁺ᵛ, aᵘ:aᵛ=aᵘ⁻ᵛ.\n3²·3³:3⁴ = 3^(2+3−4) = 3¹ = 3."},604:{q:"Вычислите значение выражения (2³)² : 2⁴.",o:["4","2","8","16"],s:"(2³)² = 2⁶.\n2⁶ : 2⁴ = 2² = 4."},605:{q:"Упростите выражение x⁵ : x² · x.",o:["x⁴","x⁶","x³","x⁸"],s:"x⁵:x²·x = x^(5−2+1) = x⁴."},606:{q:"Вычислите значение выражения (−3)² · (−3)³.",o:["−243","243","−729","729"],s:"(−3)²·(−3)³ = (−3)^(2+3) = (−3)⁵ = −243."},607:{q:"Представьте число 2¹⁰ в виде степени степени с основанием 2².",o:["(2²)⁵","(2²)⁴","(2⁵)²","(2¹⁰)¹"],s:"По правилу (aᵘ)ᵛ = aᵘᵛ: 2¹⁰ = 2^(2·5) = (2²)⁵."},608:{q:"Вычислите (0,1)² + (0,1)³.",o:["0,011","0,11","0,0011","0,02"],s:"(0,1)² = 0,01.\n(0,1)³ = 0,001.\n0,01 + 0,001 = 0,011."},609:{q:"Упростите выражение a³ · a² : a⁴.",o:["a","a²","a⁵","a⁹"],s:"a³·a²:a⁴ = a^(3+2−4) = a¹ = a."},610:{q:"Вычислите значение выражения 5² + 5³ и разделите его на 6.",o:["25","20","30","15"],s:"5²=25, 5³=125.\n25+125=150.\n150:6=25."},611:{q:"Найдите значение выражения (2/3)².",o:["4/9","2/9","4/3","2/3"],s:"(2/3)² = 2²/3² = 4/9."},612:{q:"Найдите положительное число n, удовлетворяющее равенству n⁴ = 81.",o:["3","9","27","4"],s:"3⁴ = 3·3·3·3 = 81.\nЗначит n = 3."},613:{q:"При перевозке кирпичей разбилось 4% от их общего количества, что составило 60 штук. Сколько всего кирпичей было перевезено?",o:["1500","1400","1600","2400"],s:"x · 0,04 = 60 → x = 60 : 0,04 = 1500."},614:{q:"15% некоторого числа равно 45. Найдите 60% этого числа.",o:["180","150","200","270"],s:"x · 0,15 = 45 → x = 300.\n60% от 300 = 300·0,6 = 180."},615:{q:"Из 640 учеников 30% посещают спортивный кружок, а половина оставшихся — кружок рисования. Сколько учеников посещают кружок рисования?",o:["224","192","256","320"],s:"Спортивный кружок: 640·0,3 = 192.\nОсталось: 640−192 = 448.\nКружок рисования: 448:2 = 224."},616:{q:"После повышения цены товара на 25% цена стала 50000 сум. Найдите первоначальную цену.",o:["40000","37500","45000","42000"],s:"x · 1,25 = 50000 → x = 50000:1,25 = 40000."},617:{q:"Сколько процентов от 120 составляет 30?",o:["25%","30%","20%","40%"],s:"30:120 · 100% = 25%."},618:{q:"Рабочий выполнил 120% дневного плана и изготовил 60 деталей. Каким был дневной план?",o:["50","48","55","45"],s:"x · 1,2 = 60 → x = 60:1,2 = 50."},619:{q:"На сколько процентов число 2,5 больше числа 2?",o:["25%","20%","50%","12,5%"],s:"Разность = 2,5−2 = 0,5.\n0,5:2 · 100% = 25%."},620:{q:"В банк положили 500000 сум. Каждый год начисляется 6% по простой процентной ставке. Найдите сумму на счёте через 2 года.",o:["560000","530000","561800","580000"],s:"Простой процент: годовой процент = 500000·0,06 = 30000.\nЗа 2 года: 30000·2 = 60000.\nОбщая сумма = 500000+60000 = 560000."},621:{q:"3/4 некоторого числа на 18 больше, чем 60% этого числа. Найдите это число.",o:["120","100","150","90"],s:"3/4 x − 0,6x = 18.\n0,75x − 0,6x = 0,15x = 18.\nx = 18:0,15 = 120."},622:{q:"Из 45 орехов 9 оказались гнилыми. Сколько процентов составляют гнилые орехи?",o:["20%","18%","25%","15%"],s:"9:45 · 100% = 20%."},623:{q:"Если сторону квадрата увеличить в 2 раза, во сколько раз увеличится его площадь?",o:["в 4 раза","в 2 раза","в 8 раз","в 16 раз"],s:"Площадь = сторона².\nЕсли сторона увеличится в 2 раза, площадь увеличится в 2² = 4 раза."},624:{q:"Если одну сторону прямоугольника уменьшить в 3 раза, а другую — в 2 раза, во сколько раз уменьшится его площадь?",o:["в 6 раз","в 5 раз","в 8 раз","в 3 раза"],s:"Площадь = длина · ширина.\nНовая площадь = (длина:3)·(ширина:2) = старая площадь : 6.\nЗначит уменьшится в 6 раз."},625:{q:"Периметр прямоугольника равен 24 см, отношение сторон 1:2. Найдите его площадь.",o:["32 см²","24 см²","48 см²","16 см²"],s:"Стороны a и 2a. Периметр = 2(a+2a)=6a=24 → a=4.\nСтороны: 4 см и 8 см.\nПлощадь = 4·8 = 32 см²."},626:{q:"Отношение сторон двух квадратов равно 3:4. Найдите отношение их площадей.",o:["9:16","3:4","6:8","9:12"],s:"Отношение площадей = квадрат отношения сторон = 3²:4² = 9:16."},627:{q:"Из квадрата со стороной 10 см вырезан круг радиусом 3 см (π≈3,14). Найдите приближённо оставшуюся площадь.",o:["71,74 см²","78,5 см²","65 см²","90 см²"],s:"Площадь квадрата = 10² = 100 см².\nПлощадь круга = π·r² = 3,14·9 = 28,26 см².\nОставшаяся площадь = 100−28,26 = 71,74 см²."},628:{q:"Гипотенуза прямоугольного треугольника равна 13 см, один катет — 5 см. Найдите его площадь.",o:["30 см²","60 см²","32,5 см²","65 см²"],s:"Второй катет = √(13²−5²) = √(169−25) = √144 = 12 см.\nПлощадь = (5·12):2 = 30 см²."},629:{q:"Длина окружности равна 31,4 см (π≈3,14). Найдите её радиус.",o:["5 см","10 см","6,28 см","3,14 см"],s:"Длина окружности C=2πr.\nr = C:(2π) = 31,4:(2·3,14) = 31,4:6,28 = 5 см."},630:{q:"Найдите диагональ прямоугольника со сторонами 6 см и 8 см.",o:["10 см","14 см","12 см","9 см"],s:"Диагональ = √(6²+8²) = √(36+64) = √100 = 10 см."},631:{q:"Найдите основание треугольника, площадь которого равна 60 см², а высота — 12 см.",o:["10 см","5 см","12 см","6 см"],s:"Площадь = (основание·высота):2.\n60 = (a·12):2 → a = (60·2):12 = 10 см."},632:{q:"Найдите разницу между периметром и площадью (численно) квадрата со стороной 5 см.",o:["5","10","15","0"],s:"Периметр = 4·5=20.\nПлощадь = 5²=25.\nРазница = 25−20 = 5."},633:{q:"Если ребро куба увеличить в 3 раза, во сколько раз увеличится его объём?",o:["в 27 раз","в 3 раза","в 9 раз","в 6 раз"],s:"Объём = ребро³.\nЕсли ребро увеличится в 3 раза, объём увеличится в 3³=27 раз."},634:{q:"Если ребро куба увеличить в 2 раза, во сколько раз увеличится его площадь поверхности?",o:["в 4 раза","в 2 раза","в 8 раз","в 6 раз"],s:"Площадь поверхности = 6·ребро².\nЕсли ребро увеличится в 2 раза, площадь поверхности увеличится в 2²=4 раза."},635:{q:"Если все размеры прямоугольного параллелепипеда увеличить в 2 раза, во сколько раз увеличится его объём?",o:["в 8 раз","в 2 раза","в 4 раза","в 6 раз"],s:"Объём = a·b·c.\nЕсли каждый размер увеличится в 2 раза, объём увеличится в 2³=8 раз."},636:{q:"Найдите площадь поверхности куба, объём которого равен 64 см³.",o:["96 см²","64 см²","48 см²","144 см²"],s:"Ребро³=64 → ребро=4 см.\nПлощадь поверхности = 6·4² = 6·16 = 96 см²."},637:{q:"Если радиус шара уменьшить в 2 раза, во сколько раз уменьшится его объём?",o:["в 8 раз","в 2 раза","в 4 раза","в 6 раз"],s:"Объём = (4/3)πr³.\nЕсли радиус уменьшится в 2 раза, объём уменьшится в 2³=8 раз."},638:{q:"Найдите объём конуса с радиусом основания 5 см и высотой 12 см (V=(1/3)πr²h).",o:["100π см³","60π см³","300π см³","20π см³"],s:"V = (1/3)·π·5²·12 = (1/3)·π·25·12 = (1/3)·300π = 100π см³."},639:{q:"В сосуд кубической формы с ребром 6 см налили воду до краёв. Сколько литров воды в сосуде (1 литр=1000 см³)?",o:["0,216 л","2,16 л","21,6 л","0,36 л"],s:"Объём куба = 6³ = 216 см³.\n216 см³ = 216:1000 = 0,216 литра."},640:{q:"Найдите объём прямого параллелепипеда, основание которого — квадрат со стороной 4 см, а высота — 9 см.",o:["144 см³","36 см³","52 см³","128 см³"],s:"Площадь основания = 4²=16 см².\nОбъём = 16·9 = 144 см³."},641:{q:"Найдите площадь поверхности шара радиусом 4 см (S=4πr²).",o:["64π см²","16π см²","32π см²","8π см²"],s:"S = 4·π·4² = 4·π·16 = 64π см²."},642:{q:"Найдите число вершин правильной призмы, основание которой — восьмиугольник.",o:["16","8","24","10"],s:"В правильной призме число вершин = 2·число сторон основания.\nОснование 8-угольное, вершины = 2·8 = 16."},643:{q:"Выразите 54 м 89 мм в миллиметрах.",o:["54089 мм","5489 мм","540089 мм","54890 мм"],s:"54 м = 54000 мм.\n54000 + 89 = 54089 мм."},644:{q:"Сравните 3,2 т и 3200 кг.",o:["3,2 т = 3200 кг","3,2 т > 3200 кг","3,2 т < 3200 кг","сравнить невозможно"],s:"1 т = 1000 кг.\n3,2 т = 3,2·1000 = 3200 кг.\nЗначит 3,2 т = 3200 кг."},645:{q:"Сравните 0,5 часа и 35 минут.",o:["0,5 часа < 35 минут","0,5 часа > 35 минут","0,5 часа = 35 минут","сравнить невозможно"],s:"0,5 часа = 30 минут.\n30 < 35, значит 0,5 часа < 35 минут."},646:{q:"Выразите 2,4 л в миллилитрах.",o:["2400 мл","240 мл","24000 мл","2,4 мл"],s:"1 л = 1000 мл.\n2,4 · 1000 = 2400 мл."},647:{q:"Сколько минут в одних сутках?",o:["1440","1000","1200","2400"],s:"1 сутки = 24 часа.\n24 · 60 = 1440 минут."},648:{q:"Сравните 4 км 50 м и 4050 м.",o:["4 км 50 м = 4050 м","4 км 50 м > 4050 м","4 км 50 м < 4050 м","сравнить невозможно"],s:"4 км = 4000 м.\n4 км 50 м = 4000+50 = 4050 м.\nЗначит 4 км 50 м = 4050 м."},649:{q:"Выразите 0,003 т в граммах.",o:["3000 г","300 г","30000 г","3 г"],s:"0,003 т = 0,003·1000 кг = 3 кг.\n3 кг = 3·1000 = 3000 г."},650:{q:"Если автомобиль за 1,5 часа проезжает 90 км, сколько км он проедет за 20 минут?",o:["20 км","18 км","25 км","30 км"],s:"Скорость = 90:1,5 = 60 км/ч.\n20 минут = 1/3 часа.\nПуть = 60·(1/3) = 20 км."},651:{q:"Выразите 2 м² 35 см² в квадратных сантиметрах.",o:["20035 см²","2035 см²","200035 см²","20350 см²"],s:"1 м² = 10000 см².\n2 м² = 20000 см².\n20000 + 35 = 20035 см²."},652:{q:"Сравните 0,75 т и 750 кг.",o:["0,75 т = 750 кг","0,75 т > 750 кг","0,75 т < 750 кг","сравнить невозможно"],s:"0,75 т = 0,75·1000 = 750 кг.\nЗначит 0,75 т = 750 кг."},653:{q:"Упростите выражение (2x³y)² · 3xy.",o:["12x⁷y³","6x⁷y³","12x⁶y³","4x⁷y³"],s:"(2x³y)² = 4x⁶y².\n4x⁶y² · 3xy = 12x⁷y³."},654:{q:"Упростите выражение 15a⁵b⁴ : (3a²b).",o:["5a³b³","5a³b⁴","45a³b³","5a⁷b⁵"],s:"Коэффициенты: 15:3=5.\na⁵:a²=a³, b⁴:b=b³.\nРезультат: 5a³b³."},655:{q:"Упростите выражение (−x²y)³ · (−2xy²).",o:["2x⁷y⁵","−2x⁷y⁵","2x⁵y⁵","−2x⁶y⁵"],s:"(−x²y)³ = −x⁶y³.\n(−x⁶y³)·(−2xy²) = 2x⁷y⁵."},656:{q:"Возведите одночлен 4m²n³ в квадрат и упростите.",o:["16m⁴n⁶","16m²n³","8m⁴n⁶","4m⁴n⁶"],s:"(4m²n³)² = 4²·(m²)²·(n³)² = 16m⁴n⁶."},657:{q:"Упростите выражение 8x⁶y⁴ : 2x²y² и найдите его значение при x=1, y=1.",o:["4","8","2","16"],s:"8x⁶y⁴:2x²y² = 4x⁴y².\nПри x=1,y=1: 4·1·1=4."},658:{q:"Упростите выражение 3a²b · (−4ab³) · (−a).",o:["12a⁴b⁴","−12a⁴b⁴","12a³b⁴","12a⁴b³"],s:"Коэффициенты: 3·(−4)·(−1)=12.\na²·a·a=a⁴, b·b³=b⁴.\nРезультат: 12a⁴b⁴."},659:{q:"Упростите выражение (2x²)³ : (4x³).",o:["2x³","4x³","2x⁹","8x³"],s:"(2x²)³ = 8x⁶.\n8x⁶ : 4x³ = 2x³."},660:{q:"Если одночлен с коэффициентом 5 и степенью 4 сложить с одночленом с коэффициентом −3 и степенью 4, найдите коэффициент полученного одночлена.",o:["2","8","−8","−2"],s:"При сложении одночленов одинаковой степени коэффициенты складываются: 5+(−3)=2."},661:{q:"Разделите x³y² на x²y и найдите значение результата при x=2, y=3.",o:["6","5","12","18"],s:"x³y² : x²y = xy.\nПри x=2,y=3: 2·3=6."},662:{q:"Упростите выражение (−2a)⁴.",o:["16a⁴","−16a⁴","8a⁴","−8a⁴"],s:"(−2a)⁴ = (−2)⁴·a⁴ = 16a⁴ (чётная степень, знак минус исчезает)."},663:{q:"Упростите выражение (x+3)(x−3)+9.",o:["x²","x²+9","x²−9","x²+18"],s:"(x+3)(x−3) = x²−9.\nx²−9+9 = x²."},664:{q:"Раскройте выражение (2x+3)².",o:["4x²+12x+9","4x²+9","4x²+6x+9","2x²+12x+9"],s:"(2x+3)² = (2x)²+2·2x·3+3² = 4x²+12x+9."},665:{q:"Упростите выражение (a−b)² + 4ab.",o:["(a+b)²","(a−b)²","a²+b²","2ab"],s:"(a−b)² + 4ab = a²−2ab+b²+4ab = a²+2ab+b² = (a+b)²."},666:{q:"Разложите многочлен x²+6x+9 на множители.",o:["(x+3)²","(x−3)²","(x+9)(x+1)","(x+3)(x−3)"],s:"x²+6x+9 = x²+2·x·3+3² = (x+3)²."},667:{q:"Раскройте произведение (3x−2)(2x+1).",o:["6x²−x−2","6x²+x−2","6x²−x+2","6x²−7x−2"],s:"(3x−2)(2x+1) = 3x·2x+3x·1−2·2x−2·1 = 6x²+3x−4x−2 = 6x²−x−2."},668:{q:"Если P(x) = x³−3x²+2, найдите значение P(−1).",o:["−2","2","−4","0"],s:"P(−1) = (−1)³−3·(−1)²+2 = −1−3+2 = −2."},669:{q:"Упростите произведение (x+2)(x−2)(x²+4).",o:["x⁴−16","x⁴+16","x⁴−4","x²−16"],s:"(x+2)(x−2) = x²−4.\n(x²−4)(x²+4) = x⁴−16."},670:{q:"Разложите многочлен 2x²−8 на множители.",o:["2(x−2)(x+2)","2(x−4)(x+4)","(2x−4)(x+2)","2(x²−4)²"],s:"2x²−8 = 2(x²−4) = 2(x−2)(x+2)."},671:{q:"Упростите выражение (x+y)² − (x−y)².",o:["4xy","2xy","2(x²+y²)","4x²"],s:"(x+y)²−(x−y)² = [(x+y)−(x−y)]·[(x+y)+(x−y)] = (2y)(2x) = 4xy."},672:{q:"Разложите многочлен x²−5x+6 на множители.",o:["(x−2)(x−3)","(x+2)(x+3)","(x−1)(x−6)","(x−2)(x+3)"],s:"Числа, произведение которых равно 6, а сумма −5: −2 и −3.\nx²−5x+6 = (x−2)(x−3)."},673:{q:"Решите уравнение (3,8 − y) : (−1,2) = (−16) : 8.",o:["1,4","2,4","−1,4","3,8"],s:"Правая часть: (−16):8 = −2.\n(3,8−y):(−1,2) = −2.\n3,8−y = −2·(−1,2) = 2,4.\ny = 3,8−2,4 = 1,4."},674:{q:"Решите уравнение 12500 : 25 − x = 25 · 20.",o:["0","25","500","−500"],s:"12500:25 = 500.\n25·20 = 500.\n500 − x = 500 → x = 0."},675:{q:"Решите уравнение 3x + 7 = 5x − 9.",o:["8","7","9","6"],s:"7+9 = 5x−3x.\n16 = 2x.\nx = 8."},676:{q:"Решите уравнение (2/3)x − 4 = 6.",o:["15","12","10","18"],s:"(2/3)x = 10.\nx = 10·(3/2) = 15."},677:{q:"Решите уравнение 5(x+2) = 3(x+2) + 8.",o:["2","4","−2","6"],s:"Обозначим: u=x+2. 5u=3u+8 → 2u=8 → u=4.\nx+2=4 → x=2."},678:{q:"Решите уравнение −2x + 9 = 3x − 16.",o:["5","4","6","−5"],s:"9+16 = 3x+2x.\n25 = 5x.\nx = 5."},679:{q:"Решите уравнение x:4 − x:6 = 1.",o:["12","10","24","6"],s:"Общий знаменатель 12: 3x/12 − 2x/12 = 1.\nx/12 = 1.\nx = 12."},680:{q:"Разность двух чисел равна 14, сумма равна 50. Найдите меньшее число.",o:["18","16","20","22"],s:"x+y=50, x−y=14.\nСложим оба равенства: 2x=64 → x=32.\ny=50−32=18."},681:{q:"Решите уравнение 0,3(x−5) = 0,2x.",o:["15","10","20","12"],s:"0,3x − 1,5 = 0,2x.\n0,1x = 1,5.\nx = 15."},682:{q:"Решите уравнение (2x−1)/5 = (x+2)/3.",o:["13","11","15","9"],s:"Перемножим крест-накрест: 3(2x−1) = 5(x+2).\n6x−3 = 5x+10.\n6x−5x = 10+3.\nx = 13."},683:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 20</span><span>2x − y = 10</span></span></span>",o:["x=10, y=10","x=8, y=12","x=12, y=8","x=15, y=5"],s:"Из второго уравнения: 2x−y=10 → y=2x−10.\nПодставим в первое: x+(2x−10)=20 → 3x=30 → x=10.\ny=2·10−10=10."},684:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x − 3y = 1</span><span>2x + y = 9</span></span></span>",o:["x=4, y=1","x=1, y=4","x=5, y=1","x=4, y=2"],s:"Из второго уравнения: y=9−2x.\nПодставим в первое: x−3(9−2x)=1 → x−27+6x=1 → 7x=28 → x=4.\ny=9−2·4=1."},685:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>4x + y = 18</span><span>x + y = 6</span></span></span>",o:["x=4, y=2","x=2, y=4","x=3, y=3","x=5, y=1"],s:"Вычтем из первого второе: (4x+y)−(x+y)=18−6 → 3x=12 → x=4.\ny=6−4=2."},686:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x − 3y = 12</span><span>x + 3y = 15</span></span></span>",o:["x=9, y=2","x=6, y=3","x=9, y=3","x=12, y=1"],s:"Сложим уравнения: (2x−3y)+(x+3y)=12+15 → 3x=27 → x=9.\ny=(15−9):3=2."},687:{q:"Сумма двух чисел равна 38. Число, на 1 меньшее удвоенного первого, равно второму. Найдите меньшее число.",o:["13","25","19","12"],s:"x+y=38, 2x−1=y.\nx+(2x−1)=38 → 3x=39 → x=13.\ny=2·13−1=25.\nМеньшее число = 13."},688:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>5x − 2y = 12</span><span>3x + 2y = 20</span></span></span>",o:["x=4, y=4","x=2, y=7","x=4, y=2","x=6, y=1"],s:"Сложим уравнения: (5x−2y)+(3x+2y)=12+20 → 8x=32 → x=4.\ny=(20−3·4):2=4."},689:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 3x − 2</span><span>x + y = 10</span></span></span>",o:["x=3, y=7","x=4, y=6","x=2, y=8","x=3, y=4"],s:"x+(3x−2)=10 → 4x=12 → x=3.\ny=3·3−2=7."},690:{q:"В кружок продано 8 билетов на сумму 195000 сум: взрослые по 30000 сум, детские по 15000 сум. Сколько взрослых билетов продано?",o:["5","4","6","3"],s:"a+b=8, 30000a+15000b=195000.\nПодставим b=8−a во второе: 30000a+15000(8−a)=195000 → 15000a+120000=195000 → 15000a=75000 → a=5."},691:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 15</span><span>x − y = 3</span></span></span>",o:["x=9, y=6","x=6, y=9","x=10, y=5","x=8, y=7"],s:"Сложим уравнения: 2x=18 → x=9.\ny=15−9=6."},692:{q:"Решите систему уравнений:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + y = 10</span><span>x − 2y = −13</span></span></span>",o:["x=1, y=7","x=3, y=1","x=−1, y=13","x=2, y=4"],s:"Из первого: y=10−3x.\nПодставим во второе: x−2(10−3x)=−13 → x−20+6x=−13 → 7x=7 → x=1.\ny=10−3·1=7."},693:{q:"Цена одного баклажана и двух помидоров вместе равна 18000 сум, а двух баклажанов и одного помидора — 21000 сум. Найдите цену одного помидора.",o:["5000 сум","6000 сум","4000 сум","7000 сум"],s:"b+2p=18000, 2b+p=21000.\nИз первого: b=18000−2p.\nПодставим во второе: 2(18000−2p)+p=21000 → 36000−4p+p=21000 → −3p=−15000 → p=5000."},694:{q:"Автобус ехал 2,5 часа со скоростью 80 км/ч, затем 1,5 часа со скоростью 60 км/ч. Сколько всего км проехал автобус?",o:["290 км","280 км","300 км","270 км"],s:"Первая часть: 80·2,5=200 км.\nВторая часть: 60·1,5=90 км.\nВсего: 200+90=290 км."},695:{q:"20% коровьего молока составляет жир. Сколько кг жира в 15 литрах молока (1 литр молока ≈ 1 кг)?",o:["3 кг","2 кг","4 кг","3,5 кг"],s:"15·0,2 = 3 кг."},696:{q:"Два рабочих вместе изготавливают 24 детали в день. Первый один изготавливает 14 деталей в день. Сколько деталей в день изготавливает второй один?",o:["10","12","8","16"],s:"24−14=10 деталей."},697:{q:"Поезд преодолел расстояние 540 км за 6 часов. За сколько часов он преодолеет это же расстояние, если увеличит скорость на 10 км/ч?",o:["5,4 часа","5 часов","6,5 часа","4,5 часа"],s:"Начальная скорость = 540:6 = 90 км/ч.\nНовая скорость = 90+10 = 100 км/ч.\nНовое время = 540:100 = 5,4 часа."},698:{q:"Сумма месячных зарплат 16 сотрудников равна 9 600 000 сум. Найдите среднюю зарплату.",o:["600000 сум","580000 сум","620000 сум","550000 сум"],s:"9600000:16 = 600000 сум."},699:{q:"Если от некоторого числа вычесть его 1/4 часть и результат умножить на 2, получится 90. Найдите это число.",o:["60","80","45","75"],s:"(x − x/4)·2 = 90.\n(3x/4)·2 = 90.\n(3x/2) = 90.\nx = 60."},700:{q:"Мать старше ребёнка в 3 раза. 6 лет назад мать была старше ребёнка в 5 раз. Найдите текущий возраст ребёнка.",o:["12","10","15","9"],s:"Мать=3x, ребёнок=x.\n6 лет назад: 3x−6=5(x−6).\n3x−6=5x−30.\n24=2x.\nx=12."},701:{q:"Отношение двух чисел равно 5:3, их сумма равна 96. Найдите их разность.",o:["24","30","18","36"],s:"5+3=8 частей. 1 часть=96:8=12.\nЧисла: 60 и 36.\nРазность=60−36=24."},702:{q:"Группа туристов, разместившись поровну в 3 автобусах, занимает по 42 человека в каждом. Если они разместятся поровну в 6 автобусах, сколько человек будет в каждом?",o:["21","24","20","18"],s:"Всего туристов = 3·42=126.\n126:6=21."},703:{q:"В таблице указаны температуры за 5 дней: Пн=18°, Вт=20°, Ср=17°, Чт=19°, Пт=21°. Найдите среднюю температуру за эти 5 дней недели.",o:["19°","18°","20°","18,5°"],s:"Сумма: 18+20+17+19+21=95.\nСреднее: 95:5=19°."},704:{q:"На диаграмме показано количество учеников в 4 классах: 5-А — 28, 5-Б — 30, 5-В — 26, 5-Г — 32. В каком классе больше всего учеников и сколько?",o:["5-Г, 32 человека","5-Б, 30 человек","5-А, 28 человек","5-В, 26 человек"],s:"Наибольшее из данных чисел — 32, это относится к классу 5-Г."},705:{q:"В таблице указаны недельные продажи магазина (млн сум): Пн-4, Вт-5, Ср-3, Чт-6, Пт-7, Сб-8, Вс-5. Сколько составила общая продажа за неделю?",o:["38 млн сум","36 млн сум","40 млн сум","42 млн сум"],s:"4+5+3+6+7+8+5=38 млн сум."},706:{q:"На графике показана прибыль предприятия за 4 месяца: январь-12 млн, февраль-15 млн, март-10 млн, апрель-19 млн сум. В каком месяце был наибольший рост (по сравнению с предыдущим месяцем)?",o:["Апрель","Февраль","Март","Январь"],s:"Изменения: фев−янв=3, март−фев=−5, апрель−март=9.\nНаибольший рост в апреле: +9 млн сум."},707:{q:"На круговой диаграмме показаны любимые предметы 40 учеников класса: математика 40%, родной язык 25%, история 20%, другое 15%. Сколько учеников выбрали историю как любимый предмет?",o:["8","10","6","12"],s:"20% от 40: 40·0,2=8."},708:{q:"В таблице указано количество дождливых дней за 6 месяцев: янв-8, фев-6, март-10, апр-12, май-9, июнь-5. Сколько всего дождливых дней было за эти 6 месяцев?",o:["50","48","52","45"],s:"8+6+10+12+9+5=50."},709:{q:"На диаграмме показаны очки, набранные 5 игроками: A-15, B-22, V-18, G-9, D-26. Найдите разницу между наибольшим и наименьшим количеством очков.",o:["17","18","16","20"],s:"Наибольшее: D=26, наименьшее: G=9.\nРазница: 26−9=17."},710:{q:"В таблице показано изменение цены товара по месяцам: январь-25000, февраль-28000, март-24000 сум. На сколько процентов цена в марте уменьшилась по сравнению с январём?",o:["4%","5%","3%","8%"],s:"Уменьшение: 25000−24000=1000.\nПроцент: 1000:25000·100%=4%."},711:{q:"На столбчатой диаграмме показано количество продаж 4 видов продукции: A-120, B-90, V-150, G-140. Найдите общее количество продаж и долю вида A в процентах от общего.",o:["500 шт., 24%","500 шт., 20%","500 шт., 30%","510 шт., 24%"],s:"Всего: 120+90+150+140=500.\nДоля A: 120:500·100%=24%."},712:{q:"В таблице даны оценки 5 учеников по математике и физике. Средний балл по математике равен 8,4, а общая сумма баллов — 42. Определите, что записано верно.",o:["8,4·5=42 — верно","8,4·5=40 — верно","42:8,4=4 — верно","8,4+5=42 — верно"],s:"Среднее = сумма:количество.\nПроверка: 8,4·5=42, значит сумма 42 верна."},713:{q:"Один из частей прямого угла, разделённого на две части, равен 35°. Найдите вторую часть.",o:["55°","45°","50°","60°"],s:"Прямой угол=90°.\n90°−35°=55°."},714:{q:"Два угла треугольника равны 40° и 65°. Найдите третий угол.",o:["75°","70°","80°","65°"],s:"Сумма углов треугольника равна 180°.\n180°−40°−65°=75°."},715:{q:"Из двух углов, лежащих на прямой, один в 3 раза больше другого. Найдите меньший угол.",o:["45°","50°","30°","60°"],s:"x+3x=180° → 4x=180° → x=45°."},716:{q:"Расстояние между двумя параллельными дорогами равно 800 м. Каким будет это расстояние на карте масштаба 1:20000 (в см)?",o:["4 см","8 см","2 см","5 см"],s:"800 м=80000 см.\n80000:20000=4 см."},717:{q:"Угол, смежный с другим углом (сумма которых равна 180°), в 2 раза меньше его. Найдите этот угол.",o:["120°","100°","110°","130°"],s:"x+x/2=180° → (3x/2)=180° → x=120°."},718:{q:"В прямоугольном треугольнике один из острых углов равен 28°. Найдите второй острый угол.",o:["62°","72°","52°","58°"],s:"Прямой угол=90°, второй острый угол=90°−28°=62°."},719:{q:"Расстояние между двумя городами на карте масштаба 1:500000 равно 6 см. Найдите реальное расстояние в км.",o:["30 км","25 км","35 км","20 км"],s:"6 см·500000=3000000 см=30000 м=30 км."},720:{q:"Какое из утверждений о вертикальных углах верно: А) Вертикальные углы равны. Б) Сумма вертикальных углов равна 180°.",o:["только A","только Б","оба верны","ни одно не верно"],s:"Вертикальные углы всегда равны (А верно).\nИх сумма не равна 180°, сумма 180° у смежных углов (Б неверно)."},721:{q:"Углы треугольника находятся в отношении 2:3:4. Найдите наибольший угол.",o:["80°","90°","70°","75°"],s:"2+3+4=9 частей. 180°:9=20°.\nНаибольший угол=4·20°=80°."},722:{q:"Расстояние между двумя наблюдателями, стоящими на прямой дороге, на плане масштаба 1:10000 показано как 3,5 см. Найдите реальное расстояние в метрах.",o:["350 м","300 м","400 м","250 м"],s:"3,5 см·10000=35000 см=350 м."},723:{q:"Из 4 флагов разного цвета выберите 2 и определите количество способов их расположения в ряд.",o:["12","8","6","16"],s:"Упорядоченный выбор (размещение): A(4,2)=4·3=12."},724:{q:"Сколькими способами можно выбрать 3 учеников из 5 для участия в спортивном соревновании (без учёта мест, только состав)?",o:["10","15","20","60"],s:"C(5,3)=5!/(3!·2!)=10."},725:{q:"Есть 3 вида шапок и 4 вида шарфов. Сколькими способами можно выбрать по одному из них?",o:["12","7","9","10"],s:"Правило умножения: 3·4=12."},726:{q:"Сколько 2-значных чисел без повторения цифр можно составить из цифр 0,1,2,3 (первая цифра не равна 0)?",o:["9","12","6","16"],s:"Первая цифра: одна из 1,2,3 (3 варианта).\nВторая цифра: одна из оставшихся 3 цифр (3 варианта).\nВсего: 3·3=9."},727:{q:"Сколькими способами можно выбрать 2 из 6 друзей для дежурства (без учёта дня и порядка)?",o:["15","30","12","20"],s:"C(6,2)=6!/(2!·4!)=15."},728:{q:"Из 4 шаров разного цвета выберите 3 и определите количество способов расположить их в коробке по порядку (порядок цветов важен).",o:["24","12","6","8"],s:"A(4,3)=4·3·2=24."},729:{q:"Монета бросается 3 раза. Найдите количество исходов, в которых хотя бы раз выпадет «орёл» (всего исходов 8).",o:["7","6","8","5"],s:"Ни одного орла — 1 исход (РРР).\n8−1=7."},730:{q:"Сколькими способами можно выбрать из 7 человек 1 председателя и 1 заместителя (разные люди)?",o:["42","49","21","14"],s:"Для председателя 7 вариантов, для заместителя — оставшиеся 6.\n7·6=42."},731:{q:"Сколькими способами можно расставить 5 разных книг на полке по порядку?",o:["120","60","24","20"],s:"5!=5·4·3·2·1=120."},732:{q:"В секретном коде используются 2 буквы (из А,Б,В, с повторением) и в конце 1 цифра (от 1 до 5). Сколько всего различных кодов можно составить?",o:["45","30","15","60"],s:"Для каждой буквы 3 варианта: 3·3=9.\nДля цифры 5 вариантов.\nВсего: 9·5=45."}};
Object.assign(QRU,{0:{q:"Натуральные числа от 1 до 30 записали подряд одним числом: 123456...2930. Сколько цифр в полученном числе?",s:"От 1 до 9: 9 однозначных чисел → 9×1 = 9 цифр.\nОт 10 до 30: 21 двузначное число → 21×2 = 42 цифры.\nВсего цифр: 9 + 42 = 51.\nЗначит число 51-значное.",o:["51-значное","52-значное","59-значное","60-значное"]},17:{q:"Сколькими способами из 8 кандидатов можно выбрать президента, вице-президента и секретаря? (порядок важен)",s:"Это размещение: P(8,3) = 8·7·6 = 336.\nНа президента 8 вариантов, на вице-президента 7, на секретаря 6.\n8·7·6 = 336 способов."},25:{q:"Сколькими способами можно расставить в ряд 7 разноцветных шаров?",s:"Это перестановка n различных элементов: P₇ = 7! = 7·6·5·4·3·2·1 = 5040."},34:{q:"Сколько различных трёхзначных чисел можно составить из цифр 2, 3, 5 (без повторения)?",s:"Цифры: {2, 3, 5} — 3 различные цифры.\nТрёхзначное число (без повторения): 3! = 6.\nСписок: 235, 253, 325, 352, 523, 532.",o:["6","4","3","5"]},47:{q:"Сколькими способами можно набрать 100 сум монетами по 10 и 20 сум?",s:"10×a + 20×b = 100. a=10−2b.\nb=0: a=10; b=1: a=8; b=2: a=6; b=3: a=4; b=4: a=2; b=5: a=0.\nВсего 6 способов."},53:{q:"Из цифр 0, 1, 2, 3 (без повторения) составили наибольшее и наименьшее четырёхзначные числа. Найдите их положительную разность.",s:"Наибольшее четырёхзначное: 3210.\nНаименьшее четырёхзначное (0 не в начале): 1023.\nРазность: 3210 − 1023 = 2187."},55:{q:"Сабина должна подготовиться к 8 темам. Сколькими способами она может выбрать одну из них?",s:"Выбор 1 темы из 8 = C(8,1) = 8 способов."},57:{q:"Сколько двузначных чисел можно составить из цифр 2, 3, 4, 5? (с повторением)",s:"4 цифры (2,3,4,5), каждая может повторяться.\nДвузначное число: 4×4 = 16.\n(На десятки 4 варианта, на единицы 4.)"},65:{q:"Сколько двузначных чисел без повторения можно составить из цифр 1, 2, 3, 5?",s:"4 цифры (1,2,3,5), без повторения, двузначное:\nна десятки 4 варианта, на единицы 3 = 4×3 = 12."},75:{q:"Сколько различных салатов можно приготовить, взяв 2 из 4 видов овощей?",s:"Сочетание: C(4,2) = 4!/(2!×2!) = (4×3)/(2×1) = 6."},90:{q:"Сардор может пойти из дома в школу 4 разными путями. Сколькими способами он может сходить и вернуться, не возвращаясь по тому же пути?",s:"Туда: 4 способа.\nОбратно: 3 способа (не по тому пути).\nВсего: 4×3 = 12 способов."},94:{q:"В корзине 4 яблока и 3 груши. Сколькими способами можно взять из корзины 1 фрукт?",s:"Всего фруктов = 4+3 = 7. Выбор 1 = 7 способов."},102:{q:"Из цифр 0, 1, 2, 4 (без повторения) составили наибольшее и наименьшее четырёхзначные числа. Найдите их разность.",s:"Наибольшее: 4210 (большие цифры впереди).\nНаименьшее (0 не в начале): 1024.\nРазность: 4210 − 1024 = 3186."},112:{q:"Сколько различных трёхзначных чисел можно составить из цифр 0, 2, 4 (без повторения)?",s:"0 не в начале (без повторения):\nна сотни 2 или 4 (2 варианта), остальные 2 цифры дают 2! = 2 расстановки.\n2 × 2 = 4. (204, 240, 402, 420)",o:["4","6","8","3"]},126:{q:"В цветочном магазине из красных роз сделали 3 вида букетов, из белых — 2 вида. Сколькими способами можно взять один из этих букетов?",s:"Правило суммы: 3 + 2 = 5 способов.\n(Выбирается 1 букет — красный или белый.)"},127:{q:"В цветочном магазине из красных роз сделали 4 вида букетов, из белых — 2 вида. Сколькими способами можно взять 2 букета — по одному каждого цвета?",s:"Правило произведения: 4 × 2 = 8 способов.\n(Красный и белый букет берутся вместе.)"},134:{q:"В спортзале 8 спортсменов из Узбекистана и 10 из Казахстана. Сколькими способами можно выбрать 1 узбекского и 1 казахского спортсмена?",s:"Правило произведения: 8 × 10 = 80 способов."},144:{q:"На окружности есть точки A, B, C, D. Сколько хорд можно провести через эти точки?",s:"Хорда = соединение 2 точек.\nC(4,2) = 4!/(2!·2!) = 6 хорд.\n(AB, AC, AD, BC, BD, CD)",o:["7","4","6","12"]},163:{q:"Сколько двузначных чисел, у которых произведение цифр равно 12?",s:"Пары цифр с произведением 12: 2×6 и 3×4.\nДвузначные числа: 26, 62, 34, 43.\nВсего: 4.",o:["3","4","5","6"]},168:{q:"10 друзей обменялись рукопожатиями. Сколько было рукопожатий?",s:"Каждая пара по 1 разу: C(10,2) = (10×9)/2 = 45."},170:{q:"Сколькими способами можно разложить 3 разных письма в 3 разных конверта?",s:"P₃ = 3! = 3×2×1 = 6 способов.",o:["5","1","9","6"]},178:{q:"В скольких точках максимум пересекаются 3 прямые?",s:"Каждая пара прямых пересекается в 1 точке.\nC(3,2) = 3 точки пересечения.",o:["1","2","3","4"]},180:{q:"Сколько двузначных чисел, у которых все цифры чётные?",s:"Десятки (чётные, не 0): 2,4,6,8 — 4.\nЕдиницы (чётные): 0,2,4,6,8 — 5.\nВсего: 4 × 5 = 20."},4:{q:"Чему равно расстояние между точками A(−4) и B(6) и в какой точке середина отрезка AB?",s:"Расстояние = 6−(−4) = 6+4 = 10 единиц.\nСередина = (a+b)/2 = (−4+6)/2 = 2/2 = 1.\nКоордината середины = 1.\nПроверка: от A(−4) до 1 = 5, от B(6) до 1 = 5 ✓",o:["Расст.=10, сер.=(1)","Расст.=10, сер.=(−1)","Расст.=2, сер.=(1)","Расст.=10, сер.=(2)"]},16:{q:"Две прямые пересекаются, один из пары вертикальных углов равен 65°. Найдите остальные три угла.",s:"Вертикальные углы равны: противоположный тоже 65°.\nСмежные углы: 180°−65°=115°.\nИтак 4 угла: 65°, 115°, 65°, 115°.\nОстальные три: 65°, 115°, 115°."},18:{q:"Внутренние углы треугольника в отношении 1:2:3. Чему они равны?",s:"Сумма = 180°. Отношение 1:2:3 — это 6 равных частей.\nКаждая часть = 180°/6 = 30°.\nУглы: 30°, 60°, 90°.\nЭто прямоугольный треугольник."},42:{q:"На рисунке в точке на прямой образованы три угла 3x°, 2x° и x°. Найдите значение x.",s:"Сумма углов на прямой равна 180°.\n3x + 2x + x = 6x = 180°.\nx = 30°."},111:{q:"Угол при вершине равнобедренного треугольника равен 58°. Найдите один из углов при основании.",s:"В равнобедренном треугольнике два угла при основании равны.\n58° + 2α = 180°.\n2α = 122° → α = 61°."},121:{q:"Угол при вершине равнобедренного треугольника 58°. Найдите внешний угол x° на рисунке.",s:"Угол при основании: (180°−58°)/2 = 61°.\nВнешний угол = 180° − 61° = 119°."},147:{q:"Найдите расстояние между точками с координатами A(−5; 0) и B(5; 0).",s:"Расстояние = |5 − (−5)| = |10| = 10 единиц."},152:{q:"Точки A, B, C, D на одной прямой. AC=25 см, BD=27 см, AD=45 см. Найдите длину отрезка BC.",s:"AC + BD = (AB+BC) + (BC+CD) = AB + 2·BC + CD.\nAD = AB+BC+CD = 45.\nAC+BD = 25+27 = 52 = AD + BC.\n52 = 45 + BC → BC = 7 см."},197:{q:"По данным рисунка найдите угол x. (Равнобедренный треугольник, угол при основании 50°)",s:"В равнобедренном треугольнике углы при основании равны.\nЕсли один угол при основании 50°, то и второй (x) тоже 50°."},198:{q:"В треугольнике ABC угол при вершине B равен 64°, угол A = α, угол C = β. Если 2α = 64°, найдите угол β.",s:"2α = 64° → α = 32°.\nСумма углов: 64° + α + β = 180°.\n64° + 32° + β = 180°.\nβ = 180° − 96° = 84°."},199:{q:"Прямые AD и CB пересекаются в точке O. Если ∠AOB = 30°, вычислите ∠AOB + ∠BOD.",s:"∠AOB и ∠BOD — смежные углы (AD — прямая).\nСумма смежных углов = 180°.\n∠AOB + ∠BOD = 180°."},200:{q:"ABCD — квадрат, BD — диагональ. Найдите значение угла α при вершине B.",s:"Диагональ квадрата делит угол пополам.\nУгол квадрата 90°.\nДиагональ: α = 90°/2 = 45°."},201:{q:"На рисунке в прямоугольном треугольнике найдите x.",s:"Сумма углов треугольника 180°.\n90° (прямой угол) + 39° + x = 180°.\nx = 180° − 90° − 39° = 51°."},205:{q:"В данном прямоугольном треугольнике найдите внешний угол x. (В одной вершине прямой угол, в противоположной — внутренний угол 20°)",s:"В прямоугольном треугольнике: 90° + 20° + C = 180° → C = 70°.\nx — внешний угол при C.\nx = 180° − 70° = 110°."},207:{q:"По данным найдите x. (В верхней вершине треугольника 70°, в вершине A внешний угол 120°, в вершине C внешний угол x)",s:"Внутренний угол при A = 180°−120° = 60°.\nТреугольник: 70° + 60° + C_внутр = 180° → C_внутр = 50°.\nx (внешний при C) = 180° − 50° = 130°."},209:{q:"Если a∥b, найдите x. (Ломаная пересекает параллельные прямые, углы 140° и 20°)",s:"Через точку излома проводим прямую, параллельную a и b.\nОна делит угол x на две части.\nОтвет: x = 120°."},369:{q:"Один из двух углов на прямой равен 130°. Найдите второй угол (x).",s:"Сумма смежных углов на прямой равна 180°.\nx = 180° − 130° = 50°."},370:{q:"Прямой угол (90°) разделён на два угла: один 35°. Найдите второй (x).",s:"Прямой угол 90°.\nx = 90° − 35° = 55°."},371:{q:"Два угла треугольника равны 60° и 70°. Найдите третий угол (x).",s:"Сумма углов треугольника 180°.\nx = 180° − 60° − 70° = 50°."},372:{q:"Две прямые пересеклись. Один из углов равен 110°. Найдите смежный с ним угол (x).",s:"Сумма смежных углов 180°.\nx = 180° − 110° = 70°."}});
Object.assign(QRU,{22:{q:"Возраст отца 40, сына — 10 лет. Через сколько лет отношение возраста отца к возрасту сына станет 2:1?",s:"Через n лет: (40+n)/(10+n) = 2/1.\n40+n = 2(10+n) = 20+2n.\n40−20 = 2n−n. n = 20 лет.\nПроверка: 60/30 = 2 ✓",o:["через 10 лет","через 15 лет","через 20 лет","через 5 лет"]},27:{q:"В классе 36 учеников. 20 играют в футбол, 18 — в баскетбол, 8 — в оба. Сколько учеников не играют ни в одну игру?",s:"Теория множеств: |F∪B| = |F|+|B|−|F∩B| = 20+18−8 = 30.\nНе играют ни в одну: 36−30 = 6.",o:["4","6","8","10"]},32:{q:"В коробке одинаковые книги общим весом 6 кг. Если каждая книга весит 400 г, сколько книг в коробке?",s:"6 кг = 6000 г.\nЧисло книг = 6000 / 400 = 15.\nПроверка: 15 × 400 = 6000 г = 6 кг ✓",o:["5","10","12","15"]},41:{q:"7 лошадей за 5 дней съедают 60 кг корма. Сколько корма съедят 15 лошадей за 14 дней?",s:"1 лошадь за 1 день: 60/(7×5) = 60/35 = 12/7 кг.\n15 лошадей за 14 дней: 15 × 14 × 12/7 = 15 × 24 = 360 кг.",o:["300 кг","350 кг","360 кг","180 кг"]},46:{q:"У Зафара 25 000 сум, у Азизы 13 000 сум. Сколько Зафар должен отдать Азизе, чтобы денег стало поровну?",s:"Всего денег = 25000+13000 = 38000.\nКаждому = 38000/2 = 19000 сум.\nЗафар должен отдать = 25000−19000 = 6000 сум."},85:{q:"Когда отцу было 24 года, родился сын. Сейчас отец в 3 раза старше сына. Найдите возраст сына.",s:"Возраст сына = x, отца = 3x.\nОтец − сын = 24 (всегда).\n3x − x = 24 → 2x = 24 → x = 12."},115:{q:"После того как в коробку добавили 185 яблок, их стало 400. Сколько яблок было в коробке вначале?",s:"x + 185 = 400 → x = 400 − 185 = 215.",o:["585","225","215","185"]},128:{q:"Нигина-опа на 1 кг клубники кладёт 1,25 кг сахара для варенья. Сколько кг клубники и сколько кг сахара нужно для 9 кг клубники?",s:"Клубника: 9 кг.\nСахар: 9 × 1,25 = 11,25 кг.\nОтвет: 9 кг клубники и 11,25 кг сахара."},131:{q:"Старший брат на 10 лет старше младшего, их возрасты в отношении 3:1. Через сколько лет отношение станет 2:1?",s:"Сейчас: младший = x, старший = 3x. Старший−младший = 2x = 10 → x=5.\nМладший=5, старший=15.\nЧерез n лет: (15+n)/(5+n) = 2/1.\n15+n = 10+2n → n = 5 лет."},140:{q:"Если a+b=320 и a/b=39, найдите значение a−b.",s:"a/b = 39 → a = 39b.\n39b + b = 320 → 40b = 320 → b = 8.\na = 312. a−b = 312 − 8 = 304."},155:{q:"Если a=5, b=3, найдите значение (a+b)/(a−b).",s:"(5+3)/(5−3) = 8/2 = 4."},160:{q:"В поезд село 18 человек, затем вышло 6, и в поезде осталось 31 человек. Сколько человек было в поезде вначале?",s:"x + 18 − 6 = 31.\nx + 12 = 31 → x = 19 человек."},162:{q:"Сумма двух чисел равна 600, одно в 2 раза больше другого. Найдите большее.",s:"x + 2x = 600 → 3x = 600 → x = 200.\nБольшее: 2x = 400."},166:{q:"На ферме 250 кг фруктов. В первый магазин отправили в 4 раза больше, чем во второй. Сколько фруктов отправили в первый магазин?",s:"Второй = x, первый = 4x.\nx + 4x = 250 → 5x = 250 → x = 50.\nПервый = 4×50 = 200 кг."},175:{q:"Найдите ответ, соответствующий 1/5 от 4 часов.",s:"1/5 от 4 часов = 4/5 = 0,8 часа.\n(0,8 часа = 48 минут.)",o:["80 минут","40 минут","0,8 часа","0,4 часа"]},182:{q:"Сумма возрастов Санжара и его отца 45. Санжара и матери — 44. Отца и матери — 67. Сколько лет Санжару?",s:"С+О=45, С+М=44, О+М=67.\n(С+О)+(С+М) = 2С+О+М = 89.\n2С + 67 = 89 → 2С = 22 → С = 11."},185:{q:"Утка на 3 кг легче гуся и на 1 кг тяжелее курицы. На сколько гусь тяжелее курицы?",s:"Утка = курица + 1.\nГусь = утка + 3 = курица + 1 + 3 = курица + 4.\nГусь тяжелее курицы на 4 кг."},211:{q:"Общий вес трёх мешков 84 кг. Первый мешок на 5 кг тяжелее второго, второй на 4 кг легче третьего. Найдите вес третьего мешка.",s:"3-й мешок = x. 2-й = x−4. 1-й = (x−4)+5 = x+1.\nСумма: (x+1)+(x−4)+x = 84.\n3x−3 = 84 → 3x = 87 → x = 29 кг."},367:{q:"Один карандаш стоит 1 500 сум, один ластик — 800 сум. Азиз купил 2 карандаша и 3 ластика. Сколько он заплатил?",s:"Карандаши: 2 · 1 500 = 3 000 сум.\nЛастики: 3 · 800 = 2 400 сум.\nВсего: 3 000 + 2 400 = 5 400 сум.",o:["5 400 сум","4 800 сум","6 900 сум","3 900 сум"]},368:{q:"В бассейн вода поступает по двум трубам: первая 30 литров в час, вторая — 20. Если открыть обе, сколько воды поступит в бассейн за 4 часа?",s:"Обе трубы вместе: 30 + 20 = 50 литров/час.\nЗа 4 часа: 50 · 4 = 200 литров.",o:["50 литров","120 литров","200 литров","100 литров"]},15:{q:"В таблице даны оценки учеников класса по математике. Найдите средний балл.",s:"Всего учеников: 8+12+6+4=30.\nСумма баллов: 5·8 + 4·12 + 3·6 + 2·4 = 40+48+18+8 = 114.\nСреднее = 114/30 = 3,8.",o:["3,8","4,0","3,6","3,5"]},44:{q:"По таблице найдите общую стоимость покупки (сум).",s:"Яблоко: 5000 × 5 = 25 000 сум.\nГруша: 7000 × 6 = 42 000 сум.\nАпельсин: 13000 × 9 = 117 000 сум.\nВсего: 25 000 + 42 000 + 117 000 = 184 000 сум."},210:{q:"Найдите общую оплату за товары из таблицы (сум).",s:"Помидор: 9000×3 = 27000.\nБаклажан: 13000×4 = 52000.\nОгурец: 8000×5 = 40000.\nВсего: 27000+52000+40000 = 119000 сум."},228:{q:"На диаграмме показаны продажи магазина за 4 дня (штук). Найдите средние продажи в день.",s:"Всего: 12 + 18 + 15 + 25 = 70 штук.\nСреднее = 70 / 4 = 17,5 штук."},229:{q:"На графике показана температура за 5 дней (°C). Найдите разность наибольшей и наименьшей температуры.",s:"Наибольшая = 23°, наименьшая = 19°.\nРазность = 23° − 19° = 4°."},230:{q:"На круговой диаграмме показана запись учеников в предметные кружки. Сколько процентов составляют выбравшие математику?",s:"Всего: 90 + 45 + 45 = 180 учеников.\nМатематика: 90/180 × 100% = 50%."},347:{q:"На диаграмме показано число страниц, прочитанных Азизом за неделю. Сколько всего страниц он прочитал?",s:"Складываем все столбцы: 10 + 20 + 15 + 25 + 30 = 100 страниц."},348:{q:"Сколько учеников получили оценку 4 и выше по таблице?",s:"Оценка 5: 6, оценка 4: 9.\n6 + 9 = 15 учеников."},349:{q:"На круговой диаграмме показан семейный бюджет. Сколько процентов тратится на транспорт?",s:"Всего: 50 + 20 + 30 = 100.\nТранспорт: 20/100 = 20%."},350:{q:"На графике показана температура за неделю. Сколько дней температура была выше 21°?",s:"Дни выше 21°: 22°, 25°, 24° — всего 3 дня.\n(21° не считается «выше».)",o:["4 дня","3 дня","2 дня","5 дней"]},351:{q:"Найдите общую оплату за покупки из таблицы.",s:"Ручка: 4·2 000 = 8 000.\nТетрадь: 3·5 000 = 15 000.\nКнига: 1·20 000 = 20 000.\nВсего: 8 000 + 15 000 + 20 000 = 43 000 сум.",o:["35 000 сум","27 000 сум","43 000 сум","48 000 сум"]},352:{q:"На диаграмме показано число учеников в классах. Найдите разность между наибольшим и наименьшим классом.",s:"Наибольший: 5В = 30, наименьший: 5Г = 22.\nРазность: 30 − 22 = 8."},353:{q:"В таблице показано, как ученики добираются до школы (всего 100 учеников). Сколько процентов учеников приходят пешком?",s:"Всего 100 учеников. Пешком: 25.\n25/100 = 25%."},354:{q:"На диаграмме показаны осадки за три месяца (мм). На сколько больше дождя выпало в апреле, чем в марте?",s:"Апрель: 60 мм, Март: 40 мм.\nРазность: 60 − 40 = 20 мм.",o:["30 мм","20 мм","100 мм","10 мм"]},355:{q:"На графике показана высота растения (см) по неделям. На сколько оно выросло с 1-й по 4-ю неделю?",s:"4-я неделя: 15 см, 1-я неделя: 5 см.\nРост: 15 − 5 = 10 см.",o:["15 см","12 см","10 см","7 см"]},356:{q:"В таблице даны экзаменационные баллы 4 учеников. Найдите средний балл.",s:"Всего: 85 + 90 + 80 + 85 = 340.\nСреднее: 340 ÷ 4 = 85."},357:{q:"На диаграмме показано число фруктов в корзине. Сколько всего фруктов в корзине?",s:"8 + 5 + 12 + 3 = 28 фруктов."},358:{q:"На круговой диаграмме показано распределение суток (24 часа). Сколько процентов занимает сон? (примерно)",s:"Сон 8 часов, всего 24 часа.\n8/24 = 1/3 ≈ 33%."},359:{q:"В таблице даны наименьшая и наибольшая температуры за три дня. В какой день разность температур (макс − мин) наибольшая?",s:"Понедельник: 24 − 12 = 12°.\nВторник: 26 − 14 = 12°.\nСреда: 25 − 10 = 15°.\nНаибольшая разность — среда.",o:["Понедельник","Вторник","Среда","Все равны"]},360:{q:"На диаграмме показаны голоса за любимый спорт учеников. За какой спорт отдано больше всего голосов?",s:"Столбцы: Футбол 15, Плавание 10, Баскетбол 9, Теннис 6.\nСамый высокий столбец — Футбол (15 голосов).",o:["Футбол","Баскетбол","Плавание","Теннис"]}});
Object.assign(QRU,{12:{q:"Решите уравнение: (2x+1)/3 − (x−1)/2 = 2",s:"НОК(3,2)=6. Умножаем каждую часть на 6:\n2(2x+1) − 3(x−1) = 12.\n4x+2 − 3x+3 = 12.\nx + 5 = 12.\nx = 7.\nПроверка: (15/3) − (6/2) = 5−3=2 ✓"},48:{q:"Решите уравнение: 2(2x−3) + 3 = 3x",s:"4x−6+3 = 3x.\n4x−3 = 3x.\nx = 3.\nПроверка: 2(6−3)+3 = 6+3=9=3×3 ✓"},59:{q:"Решите уравнение: −17 + (−28) + 2x = −41",s:"−17−28+2x = −41.\n−45+2x = −41.\n2x = 4.\nx = 2."},89:{q:"Решите уравнение: 2(2x−3) + 4 = 3(x+1)",s:"4x−6+4 = 3x+3.\n4x−2 = 3x+3.\nx = 5."},95:{q:"Решите уравнение: (3x+2)/(2x−1) = 2",s:"3x+2 = 2(2x−1) = 4x−2.\n3x+2 = 4x−2.\n2+2 = 4x−3x.\nx = 4."},104:{q:"Решите уравнение: 7/(x+1) + 2 = 6/(x+1) + 3",s:"7/(x+1) − 6/(x+1) = 3 − 2.\n1/(x+1) = 1 → x+1 = 1 → x = 0.\nПроверка: 7/1+2 = 6/1+3 → 9=9 ✓"},138:{q:"Решите уравнение: 2(x−3)+7 = 2x",s:"2x−6+7 = 2x → 2x+1 = 2x → 1 = 0.\nЭто ложное равенство. Решений нет (∅).",o:["2","нет решений (∅)","4","5"]},151:{q:"Решите уравнение: 2019 − 2x = 2021",s:"−2x = 2021 − 2019 = 2.\nx = −1."},161:{q:"Сколько корней имеет уравнение? 10 − 2x = 2(4−x) + 2",s:"10 − 2x = 8 − 2x + 2 = 10 − 2x.\n10−2x = 10−2x — верно всегда.\nБесконечно много решений.",o:["нет решений","бесконечно много","1","2"]},171:{q:"Решите уравнение: 10·(x−10) = 6x",s:"10x − 100 = 6x.\n4x = 100 → x = 25."},323:{q:"Решите уравнение: x + 7 = 12",s:"x = 12 − 7 = 5."},324:{q:"Решите уравнение: 3x = 21",s:"x = 21 ÷ 3 = 7."},325:{q:"Решите уравнение: 2x − 5 = 11",s:"2x = 11 + 5 = 16.\nx = 16 ÷ 2 = 8."},326:{q:"Решите уравнение: x : 4 = 6",s:"x = 6 · 4 = 24."},327:{q:"Решите уравнение: 5x + 3 = 2x + 18",s:"5x − 2x = 18 − 3.\n3x = 15.\nx = 5."},328:{q:"Решите уравнение: 4(x − 2) = 12",s:"Обе части делим на 4: x − 2 = 3.\nx = 3 + 2 = 5."},329:{q:"Решите уравнение: x + x + 4 = 20",s:"2x + 4 = 20.\n2x = 16.\nx = 8."},330:{q:"Число увеличили в 3 раза и прибавили 5, получилось 26. Найдите это число.",s:"3x + 5 = 26.\n3x = 21.\nx = 7."},331:{q:"Решите уравнение: 7 − 2x = 1",s:"−2x = 1 − 7 = −6.\nx = (−6) ÷ (−2
