@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;}
:root{--teal1:#2bacc7;--teal2:#0f7c8f;--ink:#15293c;--ink2:#5d7282;--blue:#0e7cc4;--blue2:#0a6298;--green:#239e69;--green-bg:#e7f4ee;--red:#df544a;--red-bg:#fceae8;--amber:#f4a23b;--ice:#2bacc7;--paper:#fff;--paper2:#eef4f7;--line:#dde7ed;}
body{font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;background:linear-gradient(165deg,var(--teal1) 0%,var(--teal2) 100%);background-attachment:fixed;}
.disp{font-family:'Montserrat',system-ui,sans-serif;letter-spacing:-.01em;}
.wrap{max-width:680px;margin:0 auto;padding:20px 20px 64px;position:relative;z-index:1;}
.fbg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.fbg span{position:absolute;color:rgba(255,255,255,.10);font-weight:700;font-family:'Montserrat',sans-serif;white-space:nowrap;}
.fade{animation:fade .5s cubic-bezier(.2,.9,.3,1) both;}
@keyframes fade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(14,124,196,0)}50%{box-shadow:0 0 0 4px rgba(14,124,196,.14)}}
@keyframes dotin{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes conf{to{transform:translateY(430px) rotate(720deg);opacity:0}}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.h{color:#fff;font-weight:800;}
.kicker{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);padding:7px 13px;border-radius:8px;}
.date{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.85);font-size:14px;font-weight:500;margin-top:14px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 34px -22px rgba(8,40,55,.5);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;font-family:inherit;font-weight:700;font-size:16px;border:none;cursor:pointer;border-radius:13px;padding:16px 22px;transition:transform .14s,box-shadow .25s,background .2s;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 12px 26px -12px rgba(14,124,196,.8);}
.btn-primary:hover{transform:translateY(-2px);background:var(--blue2);}
.btn-primary:disabled{background:#bcd3e2;color:#eef4f7;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-green{background:var(--green);color:#fff;box-shadow:0 12px 26px -12px rgba(35,158,105,.8);}
.btn-green:hover{transform:translateY(-2px);filter:brightness(1.05);}
.btn-green:disabled{background:#bcd3e2;color:#eef4f7;box-shadow:none;cursor:not-allowed;transform:none;}
.btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
.btn-ghost:hover{border-color:#c5d4dd;background:var(--paper2);}
.opt{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:inherit;font-size:16.5px;color:var(--ink);cursor:pointer;transition:.16s;}
.opt:hover{border-color:#a9c9dd;background:var(--paper2);}
.opt.sel{border-color:var(--blue);background:rgba(14,124,196,.07);animation:glow 1.6s ease infinite;}
.opt.sel .badge{background:var(--blue);color:#fff;border-color:var(--blue);}
.opt.correct{border-color:var(--green);background:var(--green-bg);}
.opt.correct .badge{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red);background:var(--red-bg);}
.opt.wrong .badge{background:var(--red);color:#fff;border-color:var(--red);}
.opt.dis{cursor:default;}.opt.dis:hover{background:var(--paper);}
.badge{flex:0 0 auto;width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--ink2);}
.seg{display:flex;gap:5px;}
.seg i{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.3);transition:.35s;}
.seg i.on{background:#fff;}
.rule{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);}
.rule:last-child{border-bottom:none;}
.ic{flex:0 0 auto;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(14,124,196,.1);color:var(--blue);}
.dot{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid var(--line);}
.dot.ok{background:var(--green);border-color:var(--green);}
.dot.bad{background:var(--red);border-color:var(--red);}
.sol{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-top:12px;display:flex;gap:11px;align-items:flex-start;}
.chip{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;color:var(--ink);}
.icbtn{width:40px;height:40px;border-radius:11px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.16);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icbtn:hover{background:rgba(255,255,255,.26);}
.timer{display:inline-flex;align-items:center;gap:8px;font-family:'Montserrat',monospace;font-weight:800;font-size:17px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 13px;font-variant-numeric:tabular-nums;color:var(--ink);}
.timer.danger{color:var(--red);border-color:rgba(223,84,74,.4);animation:pulse 1s ease infinite;}
.input{width:100%;background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:15px 16px;font-family:inherit;font-size:17px;color:var(--ink);outline:none;}
.input:focus{border-color:var(--blue);}
.input::placeholder{color:#9bb0bd;}
.xpbar{height:10px;border-radius:99px;background:var(--paper2);overflow:hidden;border:1px solid var(--line);}
.xpfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal1),var(--green));border-radius:99px;transition:width .6s;}
.mile{display:flex;gap:12px;align-items:center;border-radius:14px;padding:14px 16px;margin-top:14px;background:#fff;border:1px solid var(--line);border-left:4px solid var(--amber);}
.toggle{display:inline-flex;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:11px;padding:4px;gap:4px;flex-wrap:wrap;}
.toggle button{font-family:inherit;font-weight:700;font-size:14px;border:none;background:none;color:#fff;padding:8px 13px;border-radius:8px;cursor:pointer;}
.toggle button.active{background:#fff;color:var(--blue);}
.loader{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .8s linear infinite;}
.srow{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;border:1px solid transparent;}
.rk{flex:0 0 auto;width:28px;height:28px;border-radius:8px;background:var(--paper2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:Montserrat,sans-serif;color:var(--ink);}
.delx{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--paper2);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.delx:hover{background:var(--red-bg);}
svg.lic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:70;animation:fade .3s both;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);}

function questions(){if(state.phase==="result"&&state.result)return state.result.questions;return state.variant||[];}
function scoreMsg(s){return s>=9?{t:"Ajoyib!",e:"🎉",c:"var(--green)"}:s>=7?{t:"Yaxshi ish!",e:"👏",c:"var(--blue)"}:s>=5?{t:"O'rtacha — mashq qiling.",e:"💪",c:"var(--blue)"}:{t:"Yana urinib ko'ring.",e:"📚",c:"var(--red)"};}
function nextAllowedTs(){return state.result?state.result.finishedAt+state.cooldownMin*60000:0;}

(function(){var fbg=document.getElementById("fbg");FORMULAS.forEach((f,i)=>{var s=document.createElement("span");s.textContent=f;s.style.top=((i*37+6)%94)+"%";s.style.left=((i*53+4)%90)+"%";s.style.transform="rotate("+(((i*47)%60)-30)+"deg)";s.style.fontSize=(13+(i%4)*5)+"px";s.className="disp";fbg.appendChild(s);});})();

function wordmark(scale){scale=scale||1;return '<div style="display:flex;align-items:center;gap:12px"><img src="'+LOGO+'" alt="IDC" style="height:'+(58*scale)+'px;width:auto;display:block"><div style="line-height:1.02"><div class="disp" style="font-weight:800;font-size:'+(21*scale)+'px;color:#0d1a25">MAJBURIY</div><div class="disp" style="font-weight:800;font-size:'+(21*scale)+'px;color:var(--blue)">MATEMATIKA</div></div></div>';}

function pickPool(){var bank=state.bank||[];return bank.length>=10?bank:bank.concat(BUILTIN);}
function generateVariant(){
  var pool=pickPool();
  var lastQs=(state.result&&state.result.questions)?state.result.questions.map(x=>x.q):[];
  var filtered=pool.filter(x=>lastQs.indexOf(x.q)<0);
  var src=filtered.length>=10?filtered:pool;
  return shuffle(src).slice(0,10).map(x=>({q:x.q,options:x.options.slice(),correct:x.correct,solution:x.solution}));
}

function init(){
  try{var params=new URLSearchParams(location.search);if(ADMIN_KEY&&params.get("admin")===ADMIN_KEY){state.phase="admin";state.adminTab="daily";render();return;}}catch(e){}
  render();
  Promise.all([loadConfig(),loadBank()]).then(function(r){var cm=r[0];if(typeof cm==="number"&&cm>0)state.cooldownMin=cm;state.bank=r[1]||[];routeStudent();});
}
function routeStudent(){
  state.profile=LS.get(K.profile);state.history=LS.get(K.history)||[];
  var att=LS.get(K.attempt),last=LS.get(K.last);
  if(att&&att.date===today.key&&att.questions){state.variant=att.questions;state.selections=att.selections||Array(10).fill(null);state.current=att.current||0;state.startedAt=att.startedAt;state.submitted=false;state.phase="quiz";render();return;}
  if(last){state.result=last;state.onlyMistakes=true;state.counted=true;state.confetti=false;state.phase="result";render();return;}
  state.phase=state.profile&&state.profile.name?"intro":"name";render();
}
function persistAttempt(){LS.set(K.attempt,{date:today.key,startedAt:state.startedAt,questions:state.variant,selections:state.selections,current:state.current});}
function saveName(){var v=(document.getElementById("nameI").value||"").trim();var p={id:genId(),name:v||"Mehmon",streak:0,bestStreak:0,lastDate:null,totalXP:0,freezes:1};state.profile=p;LS.set(K.profile,p);state.phase="intro";render();}
function startVariant(){
  if(state.result&&Date.now()<nextAllowedTs())return;
  ac();state.submitted=false;state.counted=false;state.confetti=false;state.onlyMistakes=false;
  state.variant=generateVariant();state.selections=Array(10).fill(null);state.current=0;state.startedAt=Date.now();state.remaining=TEST;
  persistAttempt();if(!state.muted)sStart();state.phase="quiz";render();
}
function choose(i){if(!state.muted)sBlip();else ac();state.selections[state.current]=i;persistAttempt();render();}
function nav(d){state.current+=d;persistAttempt();render();}

function submitQuiz(){
  if(state.submitted)return;state.submitted=true;if(timerInt)clearInterval(timerInt);
  var qs=state.variant;
  var score=state.selections.reduce(function(a,s,i){return a+(s===qs[i].correct?1:0);},0);
  var elapsed=state.startedAt?Math.min(TEST,Math.floor((Date.now()-state.startedAt)/1000)):0;
  var p=state.profile||{};
  var streak=p.streak||0,best=p.bestStreak||0,freezes=(p.freezes==null?1:p.freezes),freezeUsed=false,milestone=null;
  if(p.lastDate!==today.key){
    var yest=shiftKey(today.key,-1),two=shiftKey(today.key,-2);
    if(p.lastDate===yest)streak=streak+1;
    else if(p.lastDate===two&&freezes>0){streak=streak+1;freezes--;freezeUsed=true;}
    else streak=1;
    best=Math.max(best,streak);
    if(streak%7===0)freezes++;
    if([3,7,14,30,50,100].indexOf(streak)>=0)milestone=streak;
  }
  var xpEarned=score*10;
  var newProf=Object.assign({},p,{id:p.id||genId(),name:p.name||"Mehmon",lastDate:today.key,streak:streak,bestStreak:best,totalXP:(p.totalXP||0)+xpEarned,freezes:freezes});
  var result={questions:qs,selections:state.selections.slice(),score:score,elapsed:elapsed,finishedAt:Date.now(),date:today.key,xpEarned:xpEarned,streak:streak,freezeUsed:freezeUsed,milestone:milestone};
  state.profile=newProf;state.result=result;state.counted=false;state.confetti=(score>=9||!!milestone);state.onlyMistakes=true;
  var hist=LS.get(K.history)||[];var h=hist.filter(x=>x.date===today.key)[0];
  if(h){h.correct+=score;h.attempts=(h.attempts||0)+1;}else{hist.push({date:today.key,correct:score,attempts:1});}
  hist=hist.slice(-60);state.history=hist;
  LS.set(K.profile,newProf);LS.set(K.last,result);LS.set(K.history,hist);LS.del(K.attempt);
  lbPush(newProf.id,newProf.name,score);
  if(!state.muted)sFinish();
  state.phase="result";render();
}

 if(state.adminTab==="bank")return viewBank();
 var when=state.adminTab==="weekly"?"Joriy hafta":today.weekday+", "+today.label;
 return '<div class="fade"><div class="top"><span class="kicker">'+I.trophy+' Ustoz paneli</span><button class="icbtn" data-act="refresh">'+I.redo+'</button></div>'
 +'<div class="card" style="padding:18px;text-align:center;margin-top:12px"><div style="display:inline-flex">'+wordmark(0.9)+'</div></div>'
 +adminTabs()
 +'<div style="color:rgba(255,255,255,.85);font-size:13px;text-align:center;margin-bottom:6px">'+when+' · jami to\'g\'ri javoblar bo\'yicha</div>'
 +'<div class="card" id="adminlb" style="padding:8px"></div></div>';
}
function viewBank(){
 if(!fbdb)return '<div class="fade"><div class="top"><span class="kicker">'+I.trophy+' Ustoz paneli</span></div>'+adminTabs()+'<div class="card" style="padding:16px;color:var(--ink2);line-height:1.5">Savollar bazasi uchun Firebase kerak. Faylga FB_CONFIG qiymatlarini qo\'shing.</div></div>';
 var sels="";for(var j=0;j<4;j++)sels+='<option value="'+j+'">'+LETTERS[j]+'</option>';
 return '<div class="fade"><div class="top"><span class="kicker">'+I.trophy+' Ustoz paneli</span></div>'+adminTabs()
 +'<div class="card" style="padding:16px"><div class="disp" style="font-weight:800;font-size:15px;margin-bottom:8px">Oraliq vaqti</div>'
 +'<div style="display:flex;gap:10px;align-items:center"><input id="cdmin" type="number" min="1" max="60" class="input" style="width:110px" value="'+state.cooldownMin+'"><span style="color:var(--ink2);font-size:14px">daqiqa</span><button class="btn btn-ghost" data-act="saveCd" style="padding:12px 16px;margin-left:auto">Saqlash</button></div></div>'
 +'<div class="card" style="padding:16px;margin-top:14px"><div class="disp" style="font-weight:800;font-size:15px;margin-bottom:6px">Ko\'p savol qo\'shish (import)</div>'
 +'<div style="font-size:13px;color:var(--ink2);line-height:1.5;margin-bottom:9px">Ustunlar: <b>Savol | A | B | C | D | To\'g\'ri (A/B/C/D) | Yechim</b>. Tab yoki | bilan ajrating.</div>'
 +'<textarea id="bulk" class="input" placeholder="Savollarni shu yerga joylang…" style="min-height:120px;resize:vertical;font-size:13.5px"></textarea>'
 +'<button class="btn btn-primary" data-act="importQ" style="width:100%;margin-top:10px">Import qilish</button></div>'
 +'<div class="card" style="padding:16px;margin-top:14px"><div class="disp" style="font-weight:800;font-size:15px;margin-bottom:10px">Bitta savol qo\'shish</div>'
 +'<textarea id="qa" class="input" placeholder="Savol matni" style="min-height:54px;resize:vertical"></textarea>'
 +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px"><input id="oa0" class="input" placeholder="A varianti"><input id="oa1" class="input" placeholder="B varianti"><input id="oa2" class="input" placeholder="C varianti"><input id="oa3" class="input" placeholder="D varianti"></div>'
 +'<div style="display:flex;gap:8px;align-items:center;margin-top:8px"><span style="font-size:13px;color:var(--ink2)">To\'g\'ri javob:</span><select id="ca" class="input" style="width:auto;padding:10px 12px">'+sels+'</select></div>'
 +'<textarea id="sa" class="input" placeholder="Yechish usuli (izoh)" style="min-height:44px;resize:vertical;margin-top:8px"></textarea>'
 +'<button class="btn btn-primary" data-act="addQ" style="width:100%;margin-top:12px">Bazaga qo\'shish</button></div>'
 +'<h3 class="disp h" style="font-size:18px;margin:22px 0 10px" id="banktitle">Bazadagi savollar</h3>'
 +'<div class="card" id="banklist" style="padding:8px"></div><div style="height:20px"></div></div>';
}
function fillAdmin(){
 if(state.adminTab==="bank"){fillBank();return;}
 var card=document.getElementById("adminlb");if(!card)return;
 if(!fbdb){card.innerHTML='<div style="padding:16px;color:var(--ink2);font-size:14px;">Firebase sozlanmagan.</div>';return;}
 card.innerHTML='<div style="padding:16px;color:var(--ink2)">Yuklanmoqda…</div>';
 var p=state.adminTab==="weekly"?lbLoadWeekly():lbLoadDaily();
 p.then(function(list){
   if(!list){card.innerHTML='<div style="padding:16px;color:var(--ink2)">Yuklab bo\'lmadi.</div>';return;}
   if(!list.length){card.innerHTML='<div style="padding:16px;color:var(--ink2)">Hozircha natija yo\'q.</div>';return;}
   list.sort(function(a,b){return ((b.correct||0)-(a.correct||0))||((a.attempts||0)-(b.attempts||0));});
   var rows=list.map(function(e,i){var medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":(i+1);var att=state.adminTab==="weekly"?'':'<span style="color:var(--ink2);font-size:12.5px;margin-right:10px">'+(e.attempts||0)+' urinish</span>';return '<div class="srow"><span class="rk">'+medal+'</span><span style="flex:1;font-weight:600;font-size:15.5px">'+esc(e.name||"—")+'</span>'+att+'<span class="disp" style="font-weight:800;color:var(--ink)">'+(e.correct||0)+'</span></div>';}).join("");
   card.innerHTML=rows;
 });
}
function fillBank(){
 var box=document.getElementById("banklist");if(!box)return;
 box.innerHTML='<div style="padding:14px;color:var(--ink2)">Yuklanmoqda…</div>';
 loadBank().then(function(list){
   state.bank=list;
   var t=document.getElementById("banktitle");if(t)t.textContent="Bazadagi savollar ("+list.length+")";
   if(!list.length){box.innerHTML='<div style="padding:14px;color:var(--ink2)">Hali savol yo\'q.</div>';return;}
   box.innerHTML=list.map(function(q){return '<div class="srow"><span style="flex:1;font-size:14.5px">'+esc(q.q)+'&nbsp;<b style="color:var(--green)">('+LETTERS[q.correct]+')</b></span><button class="delx" data-act="delQ" data-id="'+q.id+'">'+I.trash+'</button></div>';}).join("");
 });
}
function doAddQ(){
 var q=(document.getElementById("qa").value||"").trim();
 var opts=[0,1,2,3].map(j=>(document.getElementById("oa"+j).value||"").trim());
 var c=parseInt(document.getElementById("ca").value,10)||0;
 var s=(document.getElementById("sa").value||"").trim();
 if(!q||opts.some(o=>!o)||!s){flash("Barcha maydonlarni to'ldiring");return;}
 bankAdd({q:q,options:opts,correct:c,solution:s}).then(function(ok){if(ok){flash("Qo'shildi");document.getElementById("qa").value="";[0,1,2,3].forEach(j=>document.getElementById("oa"+j).value="");document.getElementById("sa").value="";fillBank();}else flash("Xato");});
}
function doDelQ(id){bankDel(id).then(function(ok){if(ok){flash("O'chirildi");fillBank();}else flash("Xato");});}
function bankImport(list){
  if(!fbdb)return Promise.resolve(false);
  var chunks=[];for(var i=0;i<list.length;i+=400)chunks.push(list.slice(i,i+400));
  var p=Promise.resolve(true);
  chunks.forEach(function(ch){p=p.then(function(prev){if(!prev)return false;var updates={};ch.forEach(function(q){updates[fbdb.ref("bank").push().key]=q;});return fbdb.ref("bank").update(updates).then(function(){return true;}).catch(function(){return false;});});});
  return p;
}
function doImport(){
  var raw=document.getElementById("bulk").value;
  if(!raw||!raw.trim()){flash("Avval savollarni joylang");return;}
  var lines=raw.split(/\r?\n/);var ok=[],bad=0;
  lines.forEach(function(ln){
    if(!ln.trim())return;
    var parts=(ln.indexOf("\t")>=0?ln.split("\t"):ln.split("|")).map(function(p){return (p||"").trim();});
    if(parts.length<7){bad++;return;}
    var q=parts[0],a=parts[1],b=parts[2],c=parts[3],d=parts[4],cor=(parts[5]||"").toUpperCase(),sol=parts.slice(6).join(" ").trim();
    var ci=["A","B","C","D"].indexOf(cor);
    if(ci<0&&["1","2","3","4"].indexOf(cor)>=0)ci=parseInt(cor,10)-1;
    if(!q||!a||!b||!c||!d||!sol||ci<0){bad++;return;}
    ok.push({q:q,options:[a,b,c,d],correct:ci,solution:sol});
  });
  if(!ok.length){flash("To'g'ri qator topilmadi");return;}
  flash(ok.length+" ta savol yuklanmoqda…");
  bankImport(ok).then(function(res){if(res){flash(ok.length+" ta qo'shildi"+(bad?(", "+bad+" o'tkazildi"):""));document.getElementById("bulk").value="";fillBank();}else flash("Saqlashda xato");});
}
function doSaveCd(){var n=parseInt(document.getElementById("cdmin").value,10);if(!n||n<1){flash("To'g'ri son kiriting");return;}saveCooldown(n).then(function(ok){if(ok){state.cooldownMin=n;flash("Saqlandi: "+n+" daqiqa");}else flash("Xato");});}

var toastT;
function flash(t){var old=document.querySelector(".toast");if(old)old.remove();var d=document.createElement("div");d.className="toast";d.textContent=t;document.body.appendChild(d);clearTimeout(toastT);toastT=setTimeout(function(){d.remove();},2200);}

app.addEventListener("click",function(e){
 var t=e.target.closest("[data-act]");if(!t)return;var a=t.dataset.act;
 if(a==="mute"){ac();state.muted=!state.muted;render();}
 else if(a==="saveName")saveName();
 else if(a==="start")startVariant();
 else if(a==="choose")choose(parseInt(t.dataset.val,10));
 else if(a==="next")nav(1);
 else if(a==="prev")nav(-1);
 else if(a==="submit")submitQuiz();
 else if(a==="newVariant"){if(!t.disabled)startVariant();}
 else if(a==="all"){state.onlyMistakes=false;render();}
 else if(a==="miss"){state.onlyMistakes=true;render();}
 else if(a==="refresh")fillAdmin();
 else if(a==="tabDaily"){state.adminTab="daily";render();}
 else if(a==="tabWeekly"){state.adminTab="weekly";render();}
 else if(a==="tabBank"){state.adminTab="bank";render();}
 else if(a==="addQ")doAddQ();
 else if(a==="importQ")doImport();
 else if(a==="delQ")doDelQ(t.dataset.id);
 else if(a==="saveCd")doSaveCd();
});
app.addEventListener("keydown",function(e){if(e.key==="Enter"&&state.phase==="name")saveName();});

init();
</script>
</body>
