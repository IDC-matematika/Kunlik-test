{q:"Quyidagi sonlarni o'sish tartibida joylashtirilganda ikkinchi o'rinda turadigan sonni toping: -5, 3, -8, 0.",options:["-8","-5","0","3"],correct:1,solution:"O'sish tartibida: -8, -5, 0, 3. Ikkinchi o'rinda -5 turadi.",topic:"m5"},
{q:"2⁵ × 2³ ifodaning qiymatini hisoblang.",options:["64","128","256","512"],correct:2,solution:"2⁵ × 2³ = 2⁸ = 256.",topic:"m6"},
{q:"3⁶ : 3² ifodaning qiymatini hisoblang.",options:["9","27","81","243"],correct:2,solution:"3⁶ : 3² = 3⁴ = 81.",topic:"m6"},
{q:"(5²)³ ifodani daraja ko'rinishida ifodalang.",options:["5⁵","5⁶","5⁸","25⁶"],correct:1,solution:"Daraja darajaga ko'tarilganda ko'rsatkichlar ko'paytiriladi: (5²)³ = 5^(2×3) = 5⁶.",topic:"m6"},
{q:"2³ × (2²)² ifodaning qiymatini hisoblang.",options:["32","64","128","256"],correct:2,solution:"(2²)² = 2⁴. 2³ × 2⁴ = 2⁷ = 128.",topic:"m6"},
{q:"5⁰ + 3¹ + 2⁴ ifodaning qiymatini hisoblang.",options:["18","19","20","21"],correct:2,solution:"5⁰=1, 3¹=3, 2⁴=16. 1+3+16=20.",topic:"m6"},
{q:"(-2)⁴ - (-2)³ ifodaning qiymatini hisoblang.",options:["0","8","16","24"],correct:3,solution:"(-2)⁴=16, (-2)³=-8. 16 - (-8) = 24.",topic:"m6"},
{q:"10³ - 10² ifodaning qiymatini hisoblang.",options:["100","800","900","990"],correct:2,solution:"10³=1000, 10²=100. 1000-100=900.",topic:"m6"},
{q:"(a³)⁴ ifodani soddalashtiring.",options:["a⁷","a¹²","a⁶⁴","4a³"],correct:1,solution:"Daraja darajaga ko'tarilganda ko'rsatkichlar ko'paytiriladi: (a³)⁴ = a^(3×4) = a¹².",topic:"m6"},
{q:"2⁴ × 5⁴ ifodaning qiymatini hisoblang.",options:["1000","2000","9000","10000"],correct:3,solution:"2⁴ × 5⁴ = (2×5)⁴ = 10⁴ = 10000.",topic:"m6"},
{q:"4³ ifodani 2 asosli daraja ko'rinishida ifodalang va qiymatini toping.",options:["2⁵=32","2⁶=64","2⁷=128","2¹²=4096"],correct:1,solution:"4 = 2², shuning uchun 4³ = (2²)³ = 2⁶ = 64.",topic:"m6"},
{q:"240 ning 25% ini toping.",options:["48","54","60","72"],correct:2,solution:"240 × 25 : 100 = 240 × 1/4 = 60.",topic:"m7"},
{q:"Sinfda 15 nafar o'quvchi bor, ulardan 20% qiz bola. Sinfda nechta qiz bola bor?",options:["2","3","4","5"],correct:1,solution:"15 × 20 : 100 = 15 × 0,2 = 3.",topic:"m7"},
{q:"Narxi 80000 so'm bo'lgan tovar 15% chegirma bilan sotilmoqda. Chegirmadan keyingi narxni toping.",options:["12000 so'm","65000 so'm","68000 so'm","70000 so'm"],correct:2,solution:"Chegirma: 80000 × 15 : 100 = 12000. Yangi narx: 80000 - 12000 = 68000 so'm.",topic:"m7"},
{q:"Bankka 200000 so'm qo'yilgan, yillik foiz stavkasi 8%. 1 yildan keyin hisobdagi summa qancha bo'ladi?",options:["208000 so'm","210000 so'm","216000 so'm","224000 so'm"],correct:2,solution:"Foiz: 200000 × 8 : 100 = 16000. Yakuniy summa: 200000 + 16000 = 216000 so'm.",topic:"m7"},
{q:"40 nafar o'quvchidan 12 nafari sportga qiziqadi. Sportga qiziquvchilar nechta foizni tashkil etadi?",options:["20%","25%","30%","35%"],correct:2,solution:"12 : 40 × 100% = 30%.",topic:"m7"},
{q:"Mahsulot narxi avval 25% oshirildi, so'ng yangi narxdan 20% chegirma berildi. Boshlang'ich narx 1000 so'm bo'lsa, yakuniy narxni toping.",options:["900 so'm","1000 so'm","1050 so'm","1100 so'm"],correct:1,solution:"1000 × 1,25 = 1250. 1250 × 0,8 = 1000 so'm. Yakuniy narx boshlang'ich narxga teng bo'ldi.",topic:"m7"},
{q:"Bir sonning 40% i 60 ga teng. Shu sonni toping.",options:["120","130","140","150"],correct:3,solution:"x × 0,4 = 60. x = 60 : 0,4 = 150.",topic:"m7"},
{q:"750 ta yong'oqdan 30% i chirigan ekan. Yaroqli yong'oqlar sonini toping.",options:["225","450","525","600"],correct:2,solution:"Chirigan: 750 × 0,3 = 225. Yaroqli: 750 - 225 = 525.",topic:"m7"},
{q:"Aholisi 5000 kishi bo'lgan posyolkada har yili aholi soni 10% ga oshib boradi. 2 yildan keyin aholi soni qancha bo'ladi?",options:["5500","6000","6050","6100"],correct:2,solution:"1-yil: 5000 × 1,1 = 5500. 2-yil: 5500 × 1,1 = 6050.",topic:"m7"},
{q:"A soni B sonidan 25% katta. Agar B = 80 bo'lsa, A ni toping.",options:["95","100","105","110"],correct:1,solution:"A = 80 + 80 × 0,25 = 80 + 20 = 100.",topic:"m7"},
{q:"Tomonlari 7 sm va 12 sm bo'lgan to'g'ri to'rtburchakning perimetrini toping.",options:["19 sm","34 sm","38 sm","84 sm"],correct:2,solution:"P = 2 × (7+12) = 2 × 19 = 38 sm.",topic:"m8"},
{q:"Yuzasi 144 sm² bo'lgan kvadratning tomonini toping.",options:["10 sm","11 sm","12 sm","14 sm"],correct:2,solution:"Tomon = √144 = 12 sm.",topic:"m8"},
{q:"Asosi 10 sm, balandligi 6 sm bo'lgan uchburchakning yuzasini toping.",options:["16 sm²","30 sm²","60 sm²","68 sm²"],correct:1,solution:"S = (asos × balandlik) : 2 = (10×6):2 = 30 sm².",topic:"m8"},
{q:"Radiusi 14 sm bo'lgan doiraning yuzasini toping (π ≈ 22/7 deb oling).",options:["308 sm²","440 sm²","616 sm²","880 sm²"],correct:2,solution:"S = πr² = 22/7 × 14² = 22/7 × 196 = 616 sm².",topic:"m8"},
{q:"Asoslari 8 sm va 14 sm, balandligi 5 sm bo'lgan trapetsiyaning yuzasini toping.",options:["44 sm²","55 sm²","70 sm²","110 sm²"],correct:1,solution:"S = (asoslar yig'indisi : 2) × balandlik = ((8+14):2) × 5 = 11 × 5 = 55 sm².",topic:"m8"},
{q:"Perimetri 56 sm bo'lgan kvadratning yuzasini toping.",options:["144 sm²","169 sm²","196 sm²","225 sm²"],correct:2,solution:"Tomon = 56 : 4 = 14 sm. Yuza = 14² = 196 sm².",topic:"m8"},
{q:"To'g'ri burchakli uchburchakning katetlari 9 sm va 12 sm. Gipotenuzasini toping.",options:["13 sm","14 sm","15 sm","21 sm"],correct:2,solution:"Gipotenuza = √(9²+12²) = √(81+144) = √225 = 15 sm.",topic:"m8"},
{q:"Tomoni 6 sm bo'lgan rombning perimetrini toping.",options:["12 sm","18 sm","24 sm","36 sm"],correct:2,solution:"Rombning barcha tomonlari teng: P = 4 × 6 = 24 sm.",topic:"m8"},
{q:"Asosi 15 sm, balandligi 8 sm bo'lgan parallelogrammning yuzasini toping.",options:["60 sm²","92 sm²","120 sm²","240 sm²"],correct:2,solution:"S = asos × balandlik = 15 × 8 = 120 sm².",topic:"m8"},
{q:"Tomonlari 20 sm va 15 sm bo'lgan to'g'ri to'rtburchakdan tomoni 5 sm bo'lgan kvadrat kesib olindi. Qolgan shaklning yuzasini toping.",options:["250 sm²","275 sm²","295 sm²","300 sm²"],correct:1,solution:"To'rtburchak yuzasi: 20×15=300 sm². Kvadrat yuzasi: 5²=25 sm². Qolgan yuza: 300-25=275 sm².",topic:"m8"},
{q:"Qirralari 4 sm, 5 sm va 6 sm bo'lgan to'g'ri burchakli parallelepipedning hajmini toping.",options:["60 sm³","90 sm³","120 sm³","150 sm³"],correct:2,solution:"V = a×b×c = 4×5×6 = 120 sm³.",topic:"m9"},
{q:"Tomoni 7 sm bo'lgan kubning to'liq sirt yuzasini toping.",options:["196 sm²","245 sm²","294 sm²","343 sm²"],correct:2,solution:"Kubning sirt yuzasi = 6a² = 6 × 49 = 294 sm².",topic:"m9"},
{q:"Radiusi 3 sm, balandligi 7 sm bo'lgan silindrning hajmini toping (π orqali ifodalang).",options:["21π sm³","42π sm³","63π sm³","84π sm³"],correct:2,solution:"V = πr²h = π × 3² × 7 = 63π sm³.",topic:"m9"},
{q:"Radiusi 5 sm bo'lgan sharning hajmini toping (V = 4/3 πr³, π orqali ifodalang).",options:["100π/3 sm³","125π sm³","250π sm³","500π/3 sm³"],correct:3,solution:"V = 4/3 × π × 5³ = 4/3 × π × 125 = 500π/3 sm³.",topic:"m9"},
{q:"Asosi tomoni 6 sm bo'lgan kvadrat, balandligi 4 sm bo'lgan to'g'ri piramidaning hajmini toping (V = 1/3 × S × h).",options:["24 sm³","36 sm³","48 sm³","72 sm³"],correct:2,solution:"S = 6² = 36 sm². V = 1/3 × 36 × 4 = 48 sm³.",topic:"m9"},
{q:"Kubning hajmi 216 sm³ ga teng. Uning qirrasini toping.",options:["5 sm","6 sm","8 sm","9 sm"],correct:1,solution:"Qirra = ∛216 = 6 sm (6³ = 216).",topic:"m9"},
{q:"Asos radiusi 6 sm, balandligi 10 sm bo'lgan konusning hajmini toping (V = 1/3 πr²h, π orqali ifodalang).",options:["60π sm³","120π sm³","180π sm³","360π sm³"],correct:1,solution:"V = 1/3 × π × 6² × 10 = 1/3 × π × 360 = 120π sm³.",topic:"m9"},
{q:"O'lchamlari 3 sm, 4 sm va 5 sm bo'lgan to'g'ri burchakli parallelepipedning to'liq sirt yuzasini toping.",options:["47 sm²","60 sm²","94 sm²","120 sm²"],correct:2,solution:"S = 2×(ab+bc+ac) = 2×(3×4+4×5+3×5) = 2×(12+20+15) = 2×47 = 94 sm².",topic:"m9"},
{q:"Uchburchakli piramida (tetraedr) nechta qirraga ega?",options:["4","5","6","8"],correct:2,solution:"Tetraedrning 4 ta uchi, 4 ta yoqi va 6 ta qirrasi bor.",topic:"m9"},
{q:"Asosi sakkizburchak bo'lgan to'g'ri prizmaning jami yoqlari sonini toping.",options:["8","9","10","16"],correct:2,solution:"Prizmaning 2 ta asosi va 8 ta yon yog'i bor: 2 + 8 = 10 yoq.",topic:"m9"},
{q:"3,5 t ni kg larda ifodalang.",options:["350 kg","3500 kg","35000 kg","350000 kg"],correct:1,solution:"1 t = 1000 kg. 3,5 × 1000 = 3500 kg.",topic:"m10"},
{q:"2 soat 15 daqiqani daqiqalarda ifodalang.",options:["125 daqiqa","130 daqiqa","135 daqiqa","145 daqiqa"],correct:2,solution:"2 soat = 120 daqiqa. 120 + 15 = 135 daqiqa.",topic:"m10"},
{q:"0,75 km ni metrlarda ifodalang.",options:["75 m","750 m","7500 m","7,5 m"],correct:1,solution:"1 km = 1000 m. 0,75 × 1000 = 750 m.",topic:"m10"},
{q:"4,2 m² ni sm² larda ifodalang.",options:["420 sm²","4200 sm²","42000 sm²","420000 sm²"],correct:2,solution:"1 m² = 10000 sm². 4,2 × 10000 = 42000 sm².",topic:"m10"},
{q:"1500 ml ni litrda ifodalang.",options:["0,15 l","1,5 l","15 l","150 l"],correct:1,solution:"1 l = 1000 ml. 1500 : 1000 = 1,5 l.",topic:"m10"},
{q:"Mashina 90 km/soat tezlikda 2,5 soat yo'l yursa, necha km masofani bosib o'tadi?",options:["180 km","200 km","225 km","250 km"],correct:2,solution:"Masofa = tezlik × vaqt = 90 × 2,5 = 225 km.",topic:"m10"},
{q:"2 t 350 kg ni kg larda ifodalang.",options:["235 kg","2350 kg","2530 kg","23500 kg"],correct:1,solution:"2 t = 2000 kg. 2000 + 350 = 2350 kg.",topic:"m10"},
{q:"5 km 240 m ni metrlarda ifodalang.",options:["524 m","5240 m","5024 m","50240 m"],correct:1,solution:"5 km = 5000 m. 5000 + 240 = 5240 m.",topic:"m10"},
{q:"120 daqiqani soatlarda ifodalang.",options:["1 soat","1,5 soat","2 soat","2,5 soat"],correct:2,solution:"60 daqiqa = 1 soat. 120 : 60 = 2 soat.",topic:"m10"},
{q:"3,2 m ni sm larda ifodalang.",options:["32 sm","320 sm","3200 sm","0,32 sm"],correct:1,solution:"1 m = 100 sm. 3,2 × 100 = 320 sm.",topic:"m10"},
{q:"3x²y × 4xy³ ko'paytmani soddalashtiring.",options:["7x³y⁴","12x³y⁴","12x²y³","12x³y³"],correct:1,solution:"Koeffitsiyentlar: 3×4=12. x²×x=x³. y×y³=y⁴. Natija: 12x³y⁴.",topic:"m11"},
{q:"(-2a²b)³ ifodani soddalashtiring.",options:["-8a⁶b³","8a⁶b³","-6a⁶b³","-8a⁵b³"],correct:0,solution:"(-2)³=-8, (a²)³=a⁶, b³=b³. Natija: -8a⁶b³.",topic:"m11"},
{q:"12x⁵y³ : 4x²y ifodani soddalashtiring.",options:["3x³y²","3x²y²","8x³y²","3x⁷y⁴"],correct:0,solution:"12:4=3. x⁵:x²=x³. y³:y=y². Natija: 3x³y².",topic:"m11"},
{q:"5m³n² va -3m³n² birhadlarning yig'indisini toping.",options:["2m³n²","2m⁶n⁴","8m³n²","-2m³n²"],correct:0,solution:"O'xshash hadlar: 5m³n² + (-3m³n²) = (5-3)m³n² = 2m³n².",topic:"m11"},
{q:"(3x²)² × x ifodani soddalashtiring.",options:["6x⁵","9x⁴","9x⁵","3x⁵"],correct:2,solution:"(3x²)² = 9x⁴. 9x⁴ × x = 9x⁵.",topic:"m11"},
{q:"-7a⁴b² birhadning koeffitsiyenti bilan darajasi yig'indisini toping.",options:["-3","-1","1","3"],correct:1,solution:"Koeffitsiyent = -7. Daraja = 4+2 = 6. Yig'indi: -7 + 6 = -1.",topic:"m11"},
{q:"2x³ × 5x⁴ ifodani soddalashtiring.",options:["7x⁷","10x⁷","10x¹²","7x¹²"],correct:1,solution:"Koeffitsiyentlar: 2×5=10. x³×x⁴=x⁷. Natija: 10x⁷.",topic:"m11"},
{q:"(4a²b³)² : (2ab)² ifodani soddalashtiring.",options:["2a²b⁴","4a²b⁴","4a⁴b⁶","8a²b⁴"],correct:1,solution:"(4a²b³)² = 16a⁴b⁶. (2ab)² = 4a²b². 16a⁴b⁶ : 4a²b² = 4a²b⁴.",topic:"m11"},
{q:"6x⁴y⁵ dan 2x⁴y⁵ ni ayiring.",options:["4x⁴y⁵","4x⁸y¹⁰","8x⁴y⁵","3x⁴y⁵"],correct:0,solution:"(6-2)x⁴y⁵ = 4x⁴y⁵.",topic:"m11"},
{q:"-3x²y³ birhadni kvadratga ko'taring.",options:["-9x⁴y⁶","9x⁴y⁶","9x²y³","-6x⁴y⁶"],correct:1,solution:"(-3x²y³)² = (-3)² × (x²)² × (y³)² = 9x⁴y⁶.",topic:"m11"},
{q:"(x+5)(x-3) ko'paytmani ko'phad ko'rinishida yozing.",options:["x²+2x-15","x²-2x-15","x²+2x+15","x²+8x-15"],correct:0,solution:"(x+5)(x-3) = x² - 3x + 5x - 15 = x² + 2x - 15.",topic:"m12"},
{q:"(2x-1)(x+4) ko'paytmani ko'phad ko'rinishida yozing.",options:["2x²+7x-4","2x²-7x-4","2x²+9x-4","2x²+7x+4"],correct:0,solution:"(2x-1)(x+4) = 2x² + 8x - x - 4 = 2x² + 7x - 4.",topic:"m12"},
{q:"(x+7)² ifodani ochib yozing.",options:["x²+49","x²+14x+49","x²+7x+49","x²+14x+14"],correct:1,solution:"(x+7)² = x² + 2×x×7 + 7² = x² + 14x + 49.",topic:"m12"},
{q:"(x-6)² ifodani ochib yozing.",options:["x²-36","x²-12x+36","x²-6x+36","x²+12x+36"],correct:1,solution:"(x-6)² = x² - 2×x×6 + 6² = x² - 12x + 36.",topic:"m12"},
{q:"(x-5)(x+5) ifodani ochib yozing.",options:["x²-25","x²+25","x²-10x-25","x²-10x+25"],correct:0,solution:"(x-5)(x+5) = x² - 5² = x² - 25 (kvadratlar ayirmasi formulasi).",topic:"m12"},
{q:"(3x²+2x-1) + (x²-5x+4) yig'indini soddalashtiring.",options:["4x²-3x+3","4x²+3x+3","4x²-3x-3","2x²-3x+3"],correct:0,solution:"O'xshash hadlarni qo'shamiz: (3+1)x² + (2-5)x + (-1+4) = 4x² - 3x + 3.",topic:"m12"},
{q:"(5x²-3x+2) - (2x²+x-6) ayirmani soddalashtiring.",options:["3x²-4x+8","3x²-2x-4","3x²-4x-4","7x²-2x-4"],correct:0,solution:"(5-2)x² + (-3-1)x + (2+6) = 3x² - 4x + 8.",topic:"m12"},
{q:"P(x) = 2x² - 3x + 1 bo'lsa, P(2) ni toping.",options:["1","3","5","7"],correct:1,solution:"P(2) = 2×4 - 3×2 + 1 = 8 - 6 + 1 = 3.",topic:"m12"},
{q:"x² - 9x ko'phadini umumiy ko'paytuvchini chiqarib ko'paytuvchilarga ajratib yozing.",options:["x(x-9)","x(x+9)","9(x-x)","x²(x-9)"],correct:0,solution:"Har ikki hadda x umumiy ko'paytuvchi: x² - 9x = x(x-9).",topic:"m12"},
{q:"(x-2)(x²+2x+4) ko'paytmani soddalashtiring.",options:["x³-8","x³+8","x³-2x²-8","x³-6x-8"],correct:0,solution:"Bu kublar ayirmasi formulasi: (a-b)(a²+ab+b²)=a³-b³, bunda a=x, b=2. Natija: x³-8.",topic:"m12"},
{q:"3(x-2) + 5 = 2x + 7 tenglamani yeching.",options:["6","7","8","9"],correct:2,solution:"3x - 6 + 5 = 2x + 7 → 3x - 1 = 2x + 7 → x = 8.",topic:"m13"},
{q:"(x+3)/4 = (2x-1)/6 tenglamani yeching.",options:["9","10","11","12"],correct:2,solution:"Har ikki tomonni 12 ga ko'paytiramiz: 3(x+3) = 2(2x-1) → 3x+9 = 4x-2 → x = 11.",topic:"m13"},
{q:"5x - 3(x-4) = 20 tenglamani yeching.",options:["2","4","6","8"],correct:1,solution:"5x - 3x + 12 = 20 → 2x = 8 → x = 4.",topic:"m13"},
{q:"2(3x+1) - 4(x-2) = 18 tenglamani yeching.",options:["3","4","5","6"],correct:1,solution:"6x + 2 - 4x + 8 = 18 → 2x + 10 = 18 → 2x = 8 → x = 4.",topic:"m13"},
{q:"Bir sonni 3 ga ko'paytirib, natijadan 7 ni ayirsak, 20 hosil bo'ladi. Shu sonni toping.",options:["7","8","9","10"],correct:2,solution:"3x - 7 = 20 → 3x = 27 → x = 9.",topic:"m13"},
{q:"Otaning yoshi o'g'lining yoshidan 24 yosh katta. 5 yildan keyin otaning yoshi o'g'lining yoshidan 3 marta katta bo'ladi. O'g'ilning hozirgi yoshini toping.",options:["5","6","7","8"],correct:2,solution:"O'g'il x yoshda, ota x+24 yoshda. 5 yildan keyin: x+24+5 = 3(x+5) → x+29 = 3x+15 → 14 = 2x → x = 7.",topic:"m13"},
{q:"(2x-5)/3 + 1 = x tenglamani yeching.",options:["-3","-2","-1","2"],correct:1,solution:"Har ikki tomonni 3 ga ko'paytiramiz: 2x-5+3=3x → 2x-2=3x → -2=x.",topic:"m13"},
{q:"0,5x + 1,5 = 0,2x + 6 tenglamani yeching.",options:["10","12","15","18"],correct:2,solution:"0,5x - 0,2x = 6 - 1,5 → 0,3x = 4,5 → x = 15.",topic:"m13"},
{q:"x/3 + x/4 = 7 tenglamani yeching.",options:["10","12","14","21"],correct:1,solution:"Umumiy maxraj 12: 4x/12 + 3x/12 = 7 → 7x/12 = 7 → x = 12.",topic:"m13"},
{q:"Ikkita sonning yig'indisi 45. Ulardan biri ikkinchisidan 9 ta katta. Kichik sonni toping.",options:["16","17","18","19"],correct:2,solution:"Kichik son x, katta son x+9. x + (x+9) = 45 → 2x+9=45 → 2x=36 → x=18.",topic:"m13"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + 2y = 11</span><span>x − y = 2</span></span></span>",options:["x=5, y=3","x=3, y=5","x=7, y=2","x=4, y=3,5"],correct:0,solution:"Ikkinchi tenglamadan x = y+2. Birinchiga qo'yamiz: (y+2)+2y=11 → 3y+2=11 → 3y=9 → y=3. U holda x=5.\nTekshirish: 5+2×3=11 ✓, 5−3=2 ✓.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x − 2y = 4</span><span>x + y = 8</span></span></span>",options:["x=4, y=4","x=3, y=5","x=5, y=3","x=2, y=6"],correct:0,solution:"Ikkinchi tenglamadan x=8−y. Birinchiga qo'yamiz: 3(8−y)−2y=4 → 24−3y−2y=4 → 24−5y=4 → 5y=20 → y=4. U holda x=4.\nTekshirish: 3×4−2×4=4 ✓, 4+4=8 ✓.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + y = 11</span><span>x − 2y = −2</span></span></span>",options:["x=4, y=3","x=3, y=4","x=5, y=1","x=6, y=-1"],correct:0,solution:"Birinchi tenglamani 2 ga ko'paytiramiz: 4x+2y=22. Ikkinchi tenglama bilan qo'shamiz: 5x=20 → x=4. U holda y=11−2×4=3.\nTekshirish: 2×4+3=11 ✓, 4−2×3=−2 ✓.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x = 3y</span><span>2x + y = 21</span></span></span>",options:["x=9, y=3","x=6, y=2","x=12, y=4","x=3, y=9"],correct:0,solution:"x=3y ni ikkinchi tenglamaga qo'yamiz: 2×3y+y=21 → 7y=21 → y=3. U holda x=3×3=9.\nTekshirish: x=3y → 9=3×3 ✓, 2×9+3=21 ✓.",topic:"m14"},
{q:"Ikkita sonning yig'indisi 50 ga, ayirmasi 12 ga teng. Katta sonni toping.",options:["28","29","31","33"],correct:2,solution:"Katta son x, kichik son y bo'lsin. x+y=50 va x−y=12. Tenglamalarni qo'shsak: 2x=62 → x=31.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + 2y = 19</span><span>x − y = 3</span></span></span>",options:["x=5, y=2","x=4, y=1","x=6, y=3","x=7, y=4"],correct:0,solution:"Ikkinchi tenglamadan x=y+3. Birinchiga qo'yamiz: 3(y+3)+2y=19 → 5y+9=19 → 5y=10 → y=2. U holda x=5.\nTekshirish: 3×5+2×2=19 ✓, 5−2=3 ✓.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x + 5y = 7</span><span>x + 3y = 3</span></span></span>",options:["x=6, y=-1","x=-1, y=6","x=3, y=0","x=8, y=-2"],correct:0,solution:"Ikkinchi tenglamadan x=3−3y. Birinchiga qo'yamiz: 2(3−3y)+5y=7 → 6−y=7 → y=−1. U holda x=3−3×(−1)=6.\nTekshirish: 2×6+5×(−1)=7 ✓, 6+3×(−1)=3 ✓.",topic:"m14"},
{q:"Bir qalam 1500 so'm, bir daftar 2500 so'm turadi. Ikkisidan jami 10 ta sotib olinib, 19000 so'm to'landi. Nechta daftar sotib olingan?",options:["3","4","5","6"],correct:1,solution:"Qalamlar soni p, daftarlar soni d bo'lsin. p+d=10 va 1500p+2500d=19000. p=10−d ni qo'yamiz: 1500(10−d)+2500d=19000 → 15000+1000d=19000 → 1000d=4000 → d=4.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 2x + 1</span><span>3x + y = 11</span></span></span>",options:["x=2, y=5","x=5, y=2","x=3, y=7","x=1, y=3"],correct:0,solution:"y=2x+1 ni ikkinchiga qo'yamiz: 3x+2x+1=11 → 5x=10 → x=2. U holda y=2×2+1=5.\nTekshirish: 5=2×2+1 ✓, 3×2+5=11 ✓.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x − 2y = −1</span><span>x + y = 11</span></span></span>",options:["x=7, y=4","x=4, y=7","x=9, y=2","x=5, y=6"],correct:0,solution:"Ikkinchi tenglamadan x=11−y. Birinchiga qo'yamiz: (11−y)−2y=−1 → 11−3y=−1 → 3y=12 → y=4. U holda x=7.\nTekshirish: 7−2×4=−1 ✓, 7+4=11 ✓.",topic:"m14"},
{q:"Mashina 3 soatda 240 km yo'l bosdi. Qaytishda u 20 km/soat tezroq yurdi. Qaytish uchun necha soat ketdi?",options:["2 soat","2,2 soat","2,4 soat","2,5 soat"],correct:2,solution:"Borishdagi tezlik: 240:3=80 km/soat. Qaytishdagi tezlik: 80+20=100 km/soat. Qaytish vaqti: 240:100=2,4 soat.",topic:"m15"},
{q:"Bir ishchi ishni 12 kunda, ikkinchisi 8 kunda bajaradi. Ikkisi birgalikda ishlasa, ish necha kunda bajariladi?",options:["4 kun","4,5 kun","4,8 kun","5 kun"],correct:2,solution:"1-ishchining bir kunlik ulushi 1/12, 2-ishchiniki 1/8. Birgalikda: 1/12+1/8=5/24. Vaqt = 24/5 = 4,8 kun.",topic:"m15"},
{q:"Onaning yoshi qizining yoshidan 28 yosh katta. 4 yildan keyin onaning yoshi qizining yoshidan 3 marta katta bo'ladi. Hozir qizining yoshi nechada?",options:["8","9","10","12"],correct:2,solution:"Qiz x yoshda, ona x+28 yoshda. 4 yildan keyin: x+28+4=3(x+4) → x+32=3x+12 → 20=2x → x=10.",topic:"m15"},
{q:"120 kg aralashmada un va guruchning nisbati 3:5. Aralashmada nechta kg guruch bor?",options:["45 kg","60 kg","72 kg","75 kg"],correct:3,solution:"Jami ulush: 3+5=8. Guruch: 120:8×5=75 kg.",topic:"m15"},
{q:"Ikki shahar orasidagi masofa 360 km. Ikki avtomobil bir vaqtda bir-biriga qarab yo'lga chiqdi, tezliklari 70 km/soat va 50 km/soat. Necha soatdan keyin uchrashadilar?",options:["2 soat","2,5 soat","3 soat","3,5 soat"],correct:2,solution:"Yaqinlashish tezligi: 70+50=120 km/soat. Vaqt = 360:120 = 3 soat.",topic:"m15"},
{q:"Bir ishni 3 ishchi 10 kunda bajaradi. Shu ishni 5 ishchi necha kunda bajaradi (ishchilar bir xil unumdorlikda ishlaydi)?",options:["5 kun","6 kun","7 kun","8 kun"],correct:1,solution:"Jami ish hajmi: 3×10=30 ishchi-kun. 5 ishchi uchun: 30:5=6 kun.",topic:"m15"},
{q:"Hovuzni birinchi quvur 6 soatda, ikkinchi quvur 9 soatda to'ldiradi. Ikki quvur birga ochilsa, hovuz necha soatda to'ladi?",options:["3 soat","3,6 soat","4 soat","4,5 soat"],correct:1,solution:"1-quvurning bir soatlik ulushi 1/6, 2-quvurniki 1/9. Birgalikda: 1/6+1/9=5/18. Vaqt = 18/5 = 3,6 soat.",topic:"m15"},
{q:"Alisherda Botirdan 2 marta ko'p pul bor. Ikkisida jami 90000 so'm bor. Alisherda qancha pul bor?",options:["30000 so'm","45000 so'm","60000 so'm","70000 so'm"],correct:2,solution:"Botirda x, Alisherda 2x. x+2x=90000 → 3x=90000 → x=30000. Alisherda 2×30000=60000 so'm.",topic:"m15"},
{q:"Ikkita sonning nisbati 4:7, ayirmasi 27. Katta sonni toping.",options:["49","56","63","70"],correct:2,solution:"Ayirma 3 ulushga to'g'ri keladi (7−4=3): 1 ulush = 27:3=9. Katta son = 7×9=63.",topic:"m15"},
{q:"Piyoda 2 km masofani 24 daqiqada bosib o'tadi. Shu tezlik bilan 5 km masofani necha daqiqada bosib o'tadi?",options:["48 daqiqa","54 daqiqa","60 daqiqa","75 daqiqa"],correct:2,solution:"1 km uchun 24:2=12 daqiqa kerak. 5 km uchun: 12×5=60 daqiqa.",topic:"m15"},
{q:"Bir haftada do'konga kelgan xaridorlar soni: Dushanba — 45, Seshanba — 38, Chorshanba — 52, Payshanba — 41, Juma — 60, Shanba — 70, Yakshanba — 44. Hafta davomida kuniga o'rtacha nechta xaridor kelgan?",options:["45","48","50","52"],correct:2,solution:"Jami: 45+38+52+41+60+70+44=350. O'rtacha: 350:7=50.",topic:"m16"},
{q:"5 ta o'quvchining test natijalari (ball): 78, 85, 92, 67, 88. Eng yuqori va eng past natijalar orasidagi farqni toping.",options:["20","22","25","30"],correct:2,solution:"Eng yuqori — 92, eng past — 67. Farq: 92−67=25.",topic:"m16"},
{q:"Sinfdagi 40 nafar o'quvchidan o'tkazilgan so'rovda 15 nafari futbolni yoqtirishini bildirdi. Futbolni yoqtiruvchilar nechta foizni tashkil etadi?",options:["30%","35%","37,5%","40%"],correct:2,solution:"15:40×100% = 37,5%.",topic:"m16"},
{q:"4 oyda do'konning daromadi (mln so'm): Yanvar — 12, Fevral — 15, Mart — 9, Aprel — 18. Eng ko'p va eng kam daromadli oylar orasidagi farqni toping.",options:["3 mln so'm","6 mln so'm","9 mln so'm","12 mln so'm"],correct:2,solution:"Eng ko'p — Aprel (18), eng kam — Mart (9). Farq: 18−9=9 mln so'm.",topic:"m16"},
{q:"360 nafar talaba fakultetlar bo'yicha taqsimlangan: Matematika — 90, Fizika — 72, Kimyo — 108, Biologiya — 90. Matematika fakulteti talabalari jami talabalarning necha foizini tashkil etadi?",options:["20%","22,5%","25%","30%"],correct:2,solution:"90:360×100% = 25%.",topic:"m16"},
{q:"Ikki haftalik yomg'ir miqdori: 1-hafta — 23 mm, 2-hafta — 17 mm. Ikki haftalik o'rtacha yomg'ir miqdorini toping.",options:["18 mm","19 mm","20 mm","21 mm"],correct:2,solution:"Jami: 23+17=40 mm. O'rtacha: 40:2=20 mm.",topic:"m16"},
{q:"5 kunlik harorat (°C): 18, 21, 19, 24, 23. O'rtacha haroratni toping.",options:["19°C","20°C","21°C","22°C"],correct:2,solution:"Jami: 18+21+19+24+23=105. O'rtacha: 105:5=21°C.",topic:"m16"},
{q:"Bir do'konda olma narxi 12000 so'm/kg, nok narxi 15000 so'm/kg. 2 kg olma va 1 kg nokning umumiy narxini toping.",options:["27000 so'm","36000 so'm","39000 so'm","42000 so'm"],correct:2,solution:"2×12000+1×15000 = 24000+15000 = 39000 so'm.",topic:"m16"},
{q:"6 oylik sotuv hajmi (dona): 120, 135, 110, 145, 130, 140. Eng yuqori sotuvli oy o'rtacha sotuvdan necha dona ko'p bo'lgan?",options:["10","12","15","18"],correct:2,solution:"Jami: 120+135+110+145+130+140=780. O'rtacha: 780:6=130. Eng yuqori sotuv: 145. Farq: 145−130=15 dona.",topic:"m16"},
{q:"200 nafar o'quvchining maktabga borish usuli: Piyoda — 80, Avtobus — 60, Velosiped — 40, Mashina — 20. Piyoda boruvchilar avtobusda boruvchilardan necha foiz punkt ko'p?",options:["5","8","10","15"],correct:2,solution:"Piyoda: 80:200×100%=40%. Avtobus: 60:200×100%=30%. Farq: 40%−30%=10 foiz punkt.",topic:"m16"},
{q:"Ikkita to'g'ri chiziq kesishganda hosil bo'lgan burchaklardan biri 72°. Shu burchakka qo'shni burchakni toping.",options:["18°","72°","98°","108°"],correct:3,solution:"Qo'shni burchaklar yig'indisi 180° ga teng: 180°−72°=108°.",topic:"m17"},
{q:"Uchburchak ichki burchaklari nisbati 2:3:4 ga teng. Eng katta burchakni toping.",options:["60°","70°","80°","90°"],correct:2,solution:"Jami ulush: 2+3+4=9. Bir ulush: 180°:9=20°. Eng katta burchak: 4×20°=80°.",topic:"m17"},
{q:"Parallel chiziqlarni kesib o'tuvchi to'g'ri chiziq hosil qilgan bir tomonlama ichki burchaklardan biri 110°. Ikkinchisini toping.",options:["60°","70°","80°","110°"],correct:1,solution:"Bir tomonlama ichki burchaklar yig'indisi 180° ga teng: 180°−110°=70°.",topic:"m17"},
{q:"Ikkita burchakning yig'indisi 90° ga teng. Birinchi burchak ikkinchisidan 2 marta katta bo'lsa, kichik burchakni toping.",options:["20°","30°","40°","45°"],correct:1,solution:"Kichik burchak x, katta burchak 2x. x+2x=90° → 3x=90° → x=30°.",topic:"m17"},
{q:"Ikki qo'shni burchaklar yig'indisi 180°. Ulardan biri ikkinchisidan 40° katta. Kichik burchakni toping.",options:["60°","65°","70°","75°"],correct:2,solution:"Kichik burchak x, katta burchak x+40°. x+(x+40°)=180° → 2x=140° → x=70°.",topic:"m17"},
{q:"A(2; 3) va B(2; 9) nuqtalar orasidagi masofani toping.",options:["4","6","8","12"],correct:1,solution:"Nuqtalarning x-koordinatalari teng bo'lgani uchun masofa = |9−3| = 6.",topic:"m17"},
{q:"Sonlar o'qida M(−5) va N(7) nuqtalari berilgan. MN masofani toping.",options:["2","7","12","35"],correct:2,solution:"MN = |7−(−5)| = |12| = 12.",topic:"m17"},
{q:"Uchburchakning ikki ichki burchagi 50° va 65°. Uchinchi burchakka qo'shni tashqi burchakni toping.",options:["65°","105°","115°","125°"],correct:2,solution:"Uchinchi ichki burchak: 180°−50°−65°=65°. Unga qo'shni tashqi burchak: 180°−65°=115° (tashqi burchak teoremasi bo'yicha 50°+65°=115° ham bo'ladi).",topic:"m17"},
{q:"40° li burchak bissektrisa yordamida ikkiga bo'lindi. Hosil bo'lgan har bir burchakni toping.",options:["10°","15°","20°","25°"],correct:2,solution:"Bissektrisa burchakni teng ikkiga bo'ladi: 40°:2=20°.",topic:"m17"},
{q:"Soat 3:00 da soat minut va soat ko'rsatkichlari orasidagi burchakni toping.",options:["60°","75°","90°","120°"],correct:2,solution:"Soat 3:00 da minut ko'rsatkichi 12 ga, soat ko'rsatkichi 3 ga to'g'ri keladi. Ular orasidagi burchak 90°.",topic:"m17"},
{q:"6 nafar o'quvchidan birinchi, ikkinchi va uchinchi o'rinlarni necha xil usulda taqsimlash mumkin?",options:["60","90","120","216"],correct:2,solution:"O'rinlashtirish: 6×5×4=120.",topic:"m18"},
{q:"10 nafar o'quvchidan 3 nafarini sayohatga tanlash necha xil usulda mumkin (tartib muhim emas)?",options:["30","60","120","720"],correct:2,solution:"Kombinatsiya: C(10,3) = (10×9×8):(1×2×3) = 720:6 = 120.",topic:"m18"},
{q:"Restoranda 4 xil taom va 3 xil ichimlik bor. Bittadan taom va ichimlik tanlansa, nechta xil tanlov hosil bo'ladi?",options:["7","12","16","24"],correct:1,solution:"Ko'paytirish qoidasi: 4×3=12.",topic:"m18"},
{q:"5! (5 faktorial) ifodaning qiymatini toping.",options:["20","60","120","720"],correct:2,solution:"5! = 5×4×3×2×1 = 120.",topic:"m18"},
{q:"0 dan 9 gacha raqamlardan foydalanib, raqamlar takrorlanishi mumkin bo'lgan holda 3 xonali parol tuzilsa, nechta xil parol hosil bo'ladi?",options:["100","720","900","1000"],correct:3,solution:"Har bir xona uchun 10 xil tanlov mavjud: 10×10×10=1000.",topic:"m18"},
{q:"8 nafar do'stdan 2 tasini sovg'a olib kelishga tanlash necha xil usulda mumkin?",options:["16","28","56","64"],correct:1,solution:"Kombinatsiya: C(8,2) = (8×7):(1×2) = 56:2 = 28.",topic:"m18"},
{q:"\"OLIM\" so'zidagi 4 ta harfni qayta tartiblab, nechta xil 4 harfli ketma-ketlik hosil qilish mumkin (harflar takrorlanmaydi)?",options:["4","12","16","24"],correct:3,solution:"4 ta turli harfning o'rin almashtirishlari soni: 4! = 24.",topic:"m18"},
{q:"Mehmondorchilikda 7 kishi bor. Har bir kishi boshqa har bir kishi bilan bir marta qo'l qisishsa, jami nechta qo'l qisish bo'ladi?",options:["14","21","42","49"],correct:1,solution:"Kombinatsiya: C(7,2) = (7×6):(1×2) = 42:2 = 21.",topic:"m18"},
{q:"Shkafda 5 xil ko'ylak va 4 xil shim bor. Bittadan ko'ylak va shim kiyilsa, nechta xil kiyinish kombinatsiyasi hosil bo'ladi?",options:["9","18","20","24"],correct:2,solution:"Ko'paytirish qoidasi: 5×4=20.",topic:"m18"},
{q:"1, 2, 3, 4, 5 raqamlaridan foydalanib (raqamlar takrorlanmasin) nechta uch xonali son tuzish mumkin?",options:["10","20","60","125"],correct:2,solution:"O'rinlashtirish: 5×4×3=60.",topic:"m18"},
{q:"Eng katta ikki xonali natural son va eng kichik to'rt xonali natural sonning yig'indisini toping.",options:["1099", "1100", "1098", "999"],correct:0,solution:"Eng katta ikki xonali son = 99.\nEng kichik to'rt xonali son = 1000.\nYig'indi = 99 + 1000 = 1099.",topic:"m1"},
{q:"Hisoblang: 1 − 2 + 3 − 4 + 5 − 6 + ... + 99 − 100",options:["−50", "50", "−100", "0"],correct:0,solution:"Sonlarni juftlab guruhlaymiz: (1−2)+(3−4)+...+(99−100).\nHar bir juftlik = −1.\nJuftliklar soni = 100:2 = 50.\nYig'indi = 50·(−1) = −50.",topic:"m1"},
{q:"Qulay usul bilan hisoblang: 23 · 18 + 23 · 12 − 23 · 10",options:["460", "450", "480", "506"],correct:0,solution:"Umumiy ko'paytuvchini qavsdan tashqariga chiqaramiz:\n23·(18+12−10) = 23·20 = 460.",topic:"m1"},
{q:"11, 21, 23, 27, 29, 33, 37, 41 sonlaridan nechtasi tub son?",options:["5", "4", "6", "3"],correct:0,solution:"Har bir sonni tekshiramiz:\n11 — tub, 21=3·7 — emas, 23 — tub, 27=3³ — emas, 29 — tub, 33=3·11 — emas, 37 — tub, 41 — tub.\nTub sonlar: 11,23,29,37,41 — jami 5 ta.",topic:"m1"},
{q:"A mulohaza: '12 soni 3 ga bo'linadi'. B mulohaza: '15 soni juft son'. Mulohazalar haqida to'g'ri xulosani toping.",options:["A — rost, B — yolg'on", "A — yolg'on, B — rost", "A va B — rost", "A va B — yolg'on"],correct:0,solution:"A: 12:3=4, butun son, demak A — rost.\nB: 15 — toq son (2 ga bo'linmaydi), demak B — yolg'on.\nXulosa: A — rost, B — yolg'on.",topic:"m1"},
{q:"Yig'indisi 60 ga teng bo'lgan 5 ta ketma-ket juft sonning eng kichigini toping.",options:["8", "6", "10", "12"],correct:0,solution:"5 ta ketma-ket juft son: x, x+2, x+4, x+6, x+8.\nYig'indi = 5x+20 = 60 → 5x=40 → x=8.\nEng kichigi = 8.\nTekshirish: 8+10+12+14+16=60 ✓",topic:"m1"},
{q:"564 va 456 sonlarining ayirmasini 4 ga bo'lib, natijani toping.",options:["27", "26", "28", "25"],correct:0,solution:"564 − 456 = 108.\n108 : 4 = 27.",topic:"m1"},
{q:"Bir sondan 125 ni ayirib, natijani 7 ga ko'paytirsak, 350 hosil bo'ladi. Shu sonni toping.",options:["175", "165", "185", "150"],correct:0,solution:"(x − 125) · 7 = 350.\nx − 125 = 350:7 = 50.\nx = 50 + 125 = 175.\nTekshirish: (175−125)·7 = 50·7 = 350 ✓",topic:"m1"},
{q:"100 dan 200 gacha (chegaralar bilan) nechta juft son bor?",options:["51", "50", "49", "52"],correct:0,solution:"Juft sonlar: 100, 102, 104, ..., 200.\nSonlar soni = (200−100):2 + 1 = 50+1 = 51.",topic:"m1"},
{q:"A mulohaza: '36 sonining barcha natural bo'luvchilari yig'indisi 91 ga teng'. B mulohaza: '17 soni juft son'. To'g'ri xulosani toping.",options:["A — rost, B — yolg'on", "A — yolg'on, B — rost", "A va B — rost", "A va B — yolg'on"],correct:0,solution:"36 ning bo'luvchilari: 1,2,3,4,6,9,12,18,36.\nYig'indisi = 1+2+3+4+6+9+12+18+36 = 91. A — rost.\n17 — toq son, B — yolg'on.\nXulosa: A — rost, B — yolg'on.",topic:"m1"},
{q:"213, 514, 6213, 729, 1001 sonlaridan nechtasi 3 ga bo'linadi?",options:["3", "2", "4", "5"],correct:0,solution:"Raqamlar yig'indisi 3 ga bo'linsa, son ham 3 ga bo'linadi:\n213→2+1+3=6 ✓\n514→5+1+4=10 ✗\n6213→6+2+1+3=12 ✓\n729→7+2+9=18 ✓\n1001→1+0+0+1=2 ✗\nJami: 3 ta.",topic:"m2"},
{q:"84 sonini tub ko'paytuvchilarga ajratib, har xil tub ko'paytuvchilar yig'indisini toping.",options:["12", "14", "9", "19"],correct:0,solution:"84 = 2²·3·7.\nHar xil tub ko'paytuvchilar: 2, 3, 7.\nYig'indi = 2+3+7 = 12.",topic:"m2"},
{q:"EKUK(36,60) va EKUB(36,60) ayirmasini toping.",options:["168", "172", "160", "180"],correct:0,solution:"36=2²·3², 60=2²·3·5.\nEKUB = 2²·3 = 12.\nEKUK = 2²·3²·5 = 180.\nAyirma = 180−12 = 168.",topic:"m2"},
{q:"Ikki sonning nisbati 2:3, EKUKi 60 ga teng. Kichik sonni toping.",options:["20", "24", "12", "30"],correct:0,solution:"Sonlarni 2k va 3k deb olamiz, EKUB(2,3)=1 bo'lgani uchun EKUK(2k,3k)=6k.\n6k=60 → k=10.\nKichik son = 2k = 20.",topic:"m2"},
{q:"100 dan 150 gacha (chegaralar bilan) nechta son 6 ga bo'linadi?",options:["9", "8", "10", "7"],correct:0,solution:"6 ga bo'linadigan sonlar: 102,108,114,120,126,132,138,144,150.\nSoni = (150−102):6 + 1 = 8+1 = 9.",topic:"m2"},
{q:"240 sonini eng kichik tub ko'paytuvchisiga bo'lganda hosil bo'lgan natijani toping.",options:["120", "80", "60", "48"],correct:0,solution:"240 = 2⁴·3·5.\nEng kichik tub ko'paytuvchi = 2.\n240:2 = 120.",topic:"m2"},
{q:"Ikki sonning ko'paytmasi 360, EKUBi 6 ga teng. Ularning EKUKini toping.",options:["60", "54", "66", "72"],correct:0,solution:"Qoida: EKUB · EKUK = sonlar ko'paytmasi.\nEKUK = 360 : 6 = 60.",topic:"m2"},
{q:"63 va 81 sonlarining EKUBini topib, 63 ni shu songa bo'ling.",options:["7", "9", "6", "8"],correct:0,solution:"63=3²·7, 81=3⁴.\nEKUB(63,81) = 3² = 9.\n63 : 9 = 7.",topic:"m2"},
{q:"A mulohaza: 'Har qanday juft sonning kvadrati 4 ga bo'linadi'. B mulohaza: '15 soni tub son'. To'g'ri xulosani toping.",options:["A — rost, B — yolg'on", "A — yolg'on, B — rost", "A va B — rost", "A va B — yolg'on"],correct:0,solution:"Juft son 2n ko'rinishida bo'ladi, (2n)²=4n² — har doim 4 ga bo'linadi. A — rost.\n15=3·5, tub son emas. B — yolg'on.\nXulosa: A — rost, B — yolg'on.",topic:"m2"},
{q:"1 dan 50 gacha nechta son ham 4 ga, ham 6 ga bo'linadi?",options:["4", "3", "5", "6"],correct:0,solution:"Ham 4 ga, ham 6 ga bo'linadigan sonlar EKUK(4,6)=12 ga bo'linadi.\n12 ga bo'linadigan sonlar 1-50 orasida: 12,24,36,48 — jami 4 ta.",topic:"m2"},
{q:"3/8 + 5/12 ifodaning qiymatini eng qisqartirilgan ko'rinishda toping.",options:["19/24", "8/20", "18/24", "2/3"],correct:0,solution:"Maxrajlarni umumiy maxrajga keltiramiz: EKUK(8,12)=24.\n3/8=9/24, 5/12=10/24.\n9/24+10/24=19/24 — qisqarmaydi.",topic:"m3"},
{q:"2 3/5 · 1 1/4 ifodaning qiymatini aralash son ko'rinishida toping.",options:["3 1/4", "3 1/2", "2 3/4", "3 3/4"],correct:0,solution:"2 3/5 = 13/5, 1 1/4 = 5/4.\n13/5 · 5/4 = 65/20 = 13/4 = 3 1/4.",topic:"m3"},
{q:"4/9 : 2/3 ifodaning qiymatini toping.",options:["2/3", "8/27", "3/2", "6/9"],correct:0,solution:"Bo'lishni ko'paytirishga almashtiramiz: 4/9 · 3/2 = 12/18 = 2/3.",topic:"m3"},
{q:"5/6 − 1/4 + 1/3 ifodaning qiymatini toping.",options:["11/12", "3/4", "5/12", "13/12"],correct:0,solution:"Umumiy maxraj 12: 10/12 − 3/12 + 4/12 = 11/12.",topic:"m3"},
{q:"Sinfdagi o'quvchilarning 3/8 qismi qizlar bo'lib, ular 12 nafarni tashkil qiladi. Sinfda jami nechta o'quvchi bor?",options:["32", "30", "36", "24"],correct:0,solution:"x · 3/8 = 12 → x = 12 · 8/3 = 32.",topic:"m3"},
{q:"2/5 va 5/8 kasrlaridan qaysi biri katta va ayirmasi nechaga teng?",options:["5/8 katta, ayirma 9/40", "2/5 katta, ayirma 9/40", "5/8 katta, ayirma 1/3", "2/5 katta, ayirma 1/3"],correct:0,solution:"Umumiy maxraj 40: 2/5=16/40, 5/8=25/40.\n25/40 > 16/40, demak 5/8 katta.\nAyirma = 25/40 − 16/40 = 9/40.",topic:"m3"},
{q:"x − 2/3 = 1/6 tenglamadan x ni toping.",options:["5/6", "1/2", "1/6", "7/6"],correct:0,solution:"x = 1/6 + 2/3 = 1/6 + 4/6 = 5/6.",topic:"m3"},
{q:"Bir sonning 5/6 qismi 40 ga teng. Shu sonning 1/3 qismini toping.",options:["16", "12", "20", "24"],correct:0,solution:"x · 5/6 = 40 → x = 40 · 6/5 = 48.\n48 ning 1/3 qismi = 16.",topic:"m3"},
{q:"0,7 va 3/4 sonlaridan qaysi biri katta va ayirmasi qancha (o'nli kasrda)?",options:["3/4 katta, ayirma 0,05", "0,7 katta, ayirma 0,05", "3/4 katta, ayirma 0,5", "teng"],correct:0,solution:"3/4 = 0,75. 0,75 > 0,7, demak 3/4 katta.\nAyirma = 0,75 − 0,7 = 0,05.",topic:"m3"},
{q:"2 1/2 + 3 1/3 − 1 1/6 ifodaning qiymatini aralash son ko'rinishida toping.",options:["4 2/3", "4 1/3", "5 1/6", "4 1/6"],correct:0,solution:"Kasrlarni 6 maxrajga keltiramiz: 2 1/2=15/6, 3 1/3=20/6, 1 1/6=7/6.\n15/6+20/6−7/6 = 28/6 = 14/3 = 4 2/3.",topic:"m3"},
{q:"0,7 va 0,68 sonlaridan qaysi biri katta va ayirmasi qancha?",options:["0,7 katta, ayirma 0,02", "0,68 katta, ayirma 0,02", "0,7 katta, ayirma 0,2", "teng"],correct:0,solution:"0,7 = 0,70. 0,70 > 0,68.\nAyirma = 0,70 − 0,68 = 0,02.",topic:"m4"},
{q:"3,2 · 0,05 ni hisoblang.",options:["0,16", "1,6", "0,016", "16"],correct:0,solution:"3,2 · 0,05 = 32 · 5 : 1000 = 160:1000 = 0,16.",topic:"m4"},
{q:"12,48 : 0,4 ni hisoblang.",options:["31,2", "3,12", "312", "30,2"],correct:0,solution:"12,48 : 0,4 = 124,8 : 4 = 31,2.",topic:"m4"},
{q:"0,9 − 0,375 ni hisoblang.",options:["0,525", "0,625", "0,475", "0,5"],correct:0,solution:"0,900 − 0,375 = 0,525.",topic:"m4"},
{q:"2,5² ni hisoblang.",options:["6,25", "5", "12,5", "25"],correct:0,solution:"2,5² = 2,5 · 2,5 = 6,25.",topic:"m4"},
{q:"5,2 + 3,75 − 1,45 ni hisoblang.",options:["7,5", "7,4", "8,5", "6,5"],correct:0,solution:"5,2 + 3,75 = 8,95.\n8,95 − 1,45 = 7,5.",topic:"m4"},
{q:"0,004 sonini foizga aylantiring.",options:["0,4%", "4%", "40%", "0,04%"],correct:0,solution:"Foizga aylantirish uchun 100 ga ko'paytiramiz: 0,004 · 100% = 0,4%.",topic:"m4"},
{q:"1,84 sonini eng yaqin o'ndan birgacha (bir xona o'nli kasrgacha) yaxlitlang.",options:["1,8", "1,9", "1,84", "2,0"],correct:0,solution:"Yuzdan biri xonasidagi raqam 4 < 5, shuning uchun pastga yaxlitlanadi: 1,84 ≈ 1,8.",topic:"m4"},
{q:"0,25 + 0,5 yig'indisini eng qisqartirilgan oddiy kasr ko'rinishida yozing.",options:["3/4", "5/4", "1/2", "7/10"],correct:0,solution:"0,25 + 0,5 = 0,75 = 75/100 = 3/4.",topic:"m4"},
{q:"670 sm va 6 m 7 sm kattaliklarini taqqoslang.",options:["670 sm > 6 m 7 sm", "670 sm < 6 m 7 sm", "670 sm = 6 m 7 sm", "taqqoslab bo'lmaydi"],correct:0,solution:"6 m 7 sm = 600 sm + 7 sm = 607 sm.\n670 sm > 607 sm, demak 670 sm > 6 m 7 sm.",topic:"m4"},
{q:"−3/4, 5/(−7), −1/3, 0, 8/(−9), 2/5 sonlaridan nechtasi manfiy?",options:["4", "3", "5", "2"],correct:0,solution:"Belgilarni aniqlaymiz:\n−3/4 — manfiy, 5/(−7) — manfiy, −1/3 — manfiy, 0 — nol, 8/(−9) — manfiy, 2/5 — musbat.\nManfiylar: 4 ta.",topic:"m5"},
{q:"(−2,5) + 1,75 − (−0,5) ni hisoblang.",options:["−0,25", "−4,75", "0,25", "−0,75"],correct:0,solution:"(−2,5) + 1,75 + 0,5 = −2,5 + 2,25 = −0,25.",topic:"m5"},
{q:"(−3)² − (−2)³ + (−1)⁵ ni hisoblang.",options:["16", "0", "18", "−2"],correct:0,solution:"(−3)²=9, (−2)³=−8, (−1)⁵=−1.\n9 − (−8) + (−1) = 9+8−1 = 16.",topic:"m5"},
{q:"−24 : (−6) · (−3) ni hisoblang.",options:["−12", "12", "−2", "2"],correct:0,solution:"Chapdan o'ngga: −24:(−6) = 4.\n4 · (−3) = −12.",topic:"m5"},
{q:"|x| = 7 tenglamaning barcha yechimlari yig'indisini toping.",options:["0", "7", "14", "−7"],correct:0,solution:"|x|=7 → x=7 yoki x=−7.\nYig'indi = 7+(−7) = 0.",topic:"m5"},
{q:"−5/6 va −7/8 sonlaridan qaysi biri katta?",options:["−5/6", "−7/8", "teng", "aniqlab bo'lmaydi"],correct:0,solution:"O'nli kasrlarga aylantiramiz: −5/6 ≈ −0,833, −7/8 = −0,875.\n−0,833 > −0,875 (nolga yaqinroq), demak −5/6 katta.",topic:"m5"},
{q:"(−1)²⁰²⁴ + (−1)²⁰²⁵ ni hisoblang.",options:["0", "2", "−2", "1"],correct:0,solution:"(−1)²⁰²⁴ = 1 (juft daraja), (−1)²⁰²⁵ = −1 (toq daraja).\n1 + (−1) = 0.",topic:"m5"},
{q:"a=−4, b=3 bo'lsa, a² − 2ab + b² ifodaning qiymatini toping.",options:["49", "1", "−1", "−49"],correct:0,solution:"a²−2ab+b² = (a−b)².\na−b = −4−3 = −7.\n(−7)² = 49.",topic:"m5"},
{q:"Qulay usul bilan hisoblang: (−25) · 17 + (−25) · 3",options:["−500", "500", "−440", "−110"],correct:0,solution:"Umumiy ko'paytuvchini ajratamiz: (−25)·(17+3) = (−25)·20 = −500.",topic:"m5"},
{q:"x + 5 = −3 va y − 2 = −7 tengliklardan x + y ni toping.",options:["−13", "−10", "−5", "13"],correct:0,solution:"x = −3−5 = −8.\ny = −7+2 = −5.\nx+y = −8+(−5) = −13.",topic:"m5"},
{q:"3² · 3³ : 3⁴ ifodaning qiymatini hisoblang.",options:["3", "9", "1", "27"],correct:0,solution:"Daraja xossalari: aᵘ·aᵛ=aᵘ⁺ᵛ, aᵘ:aᵛ=aᵘ⁻ᵛ.\n3²·3³:3⁴ = 3^(2+3−4) = 3¹ = 3.",topic:"m6"},
{q:"(2³)² : 2⁴ ifodaning qiymatini hisoblang.",options:["4", "2", "8", "16"],correct:0,solution:"(2³)² = 2⁶.\n2⁶ : 2⁴ = 2² = 4.",topic:"m6"},
{q:"x⁵ : x² · x ifodani soddalashtiring.",options:["x⁴", "x⁶", "x³", "x⁸"],correct:0,solution:"x⁵:x²·x = x^(5−2+1) = x⁴.",topic:"m6"},
{q:"(−3)² · (−3)³ ifodaning qiymatini hisoblang.",options:["−243", "243", "−729", "729"],correct:0,solution:"(−3)²·(−3)³ = (−3)^(2+3) = (−3)⁵ = −243.",topic:"m6"},
{q:"2¹⁰ sonini 2² asosli darajaning darajasi ko'rinishida ifodalang.",options:["(2²)⁵", "(2²)⁴", "(2⁵)²", "(2¹⁰)¹"],correct:0,solution:"(aᵘ)ᵛ = aᵘᵛ qoidasiga ko'ra: 2¹⁰ = 2^(2·5) = (2²)⁵.",topic:"m6"},
{q:"(0,1)² + (0,1)³ ni hisoblang.",options:["0,011", "0,11", "0,0011", "0,02"],correct:0,solution:"(0,1)² = 0,01.\n(0,1)³ = 0,001.\n0,01 + 0,001 = 0,011.",topic:"m6"},
{q:"a³ · a² : a⁴ ifodani soddalashtiring.",options:["a", "a²", "a⁵", "a⁹"],correct:0,solution:"a³·a²:a⁴ = a^(3+2−4) = a¹ = a.",topic:"m6"},
{q:"5² + 5³ ifodaning qiymatini hisoblab, 6 ga bo'ling.",options:["25", "20", "30", "15"],correct:0,solution:"5²=25, 5³=125.\n25+125=150.\n150:6=25.",topic:"m6"},
{q:"(2/3)² ifodaning qiymatini toping.",options:["4/9", "2/9", "4/3", "2/3"],correct:0,solution:"(2/3)² = 2²/3² = 4/9.",topic:"m6"},
{q:"n⁴ = 81 tenglikni qanoatlantiruvchi musbat n sonini toping.",options:["3", "9", "27", "4"],correct:0,solution:"3⁴ = 3·3·3·3 = 81.\nDemak n = 3.",topic:"m6"},
{q:"G'ishtlarni tashishda ularning 4% i sindi, bu esa 60 tani tashkil etdi. Jami nechta g'isht tashilgan?",options:["1500", "1400", "1600", "2400"],correct:0,solution:"x · 0,04 = 60 → x = 60 : 0,04 = 1500.",topic:"m7"},
{q:"Bir sonning 15% i 45 ga teng. Shu sonning 60% ini toping.",options:["180", "150", "200", "270"],correct:0,solution:"x · 0,15 = 45 → x = 300.\n300 ning 60% i = 300·0,6 = 180.",topic:"m7"},
{q:"640 nafar o'quvchidan 30% i sport to'garagiga, qolganlarining yarmi rasm to'garagiga qatnaydi. Rasm to'garagiga nechta o'quvchi qatnaydi?",options:["224", "192", "256", "320"],correct:0,solution:"Sport to'garagi: 640·0,3 = 192.\nQolgan: 640−192 = 448.\nRasm to'garagi: 448:2 = 224.",topic:"m7"},
{q:"Narxi 25% ga oshirilgandan keyin tovarning narxi 50000 so'm bo'ldi. Dastlabki narxini toping.",options:["40000", "37500", "45000", "42000"],correct:0,solution:"x · 1,25 = 50000 → x = 50000:1,25 = 40000.",topic:"m7"},
{q:"120 ning necha foizi 30 ga teng?",options:["25%", "30%", "20%", "40%"],correct:0,solution:"30:120 · 100% = 25%.",topic:"m7"},
{q:"Ishchi kunlik rejasining 120% ini bajarib, 60 dona mahsulot ishlab chiqardi. Kunlik reja necha dona edi?",options:["50", "48", "55", "45"],correct:0,solution:"x · 1,2 = 60 → x = 60:1,2 = 50.",topic:"m7"},
{q:"2 sonidan necha foiz katta bo'lgan son 2,5 ga teng?",options:["25%", "20%", "50%", "12,5%"],correct:0,solution:"Farq = 2,5−2 = 0,5.\n0,5:2 · 100% = 25%.",topic:"m7"},
{q:"Bankka 500000 so'm qo'yilgan. Har yili oddiy foiz hisobida 6% qo'shib boriladi. 2 yildan keyin hisobdagi summani toping.",options:["560000", "530000", "561800", "580000"],correct:0,solution:"Oddiy foiz: yillik foiz = 500000·0,06 = 30000.\n2 yil uchun: 30000·2 = 60000.\nUmumiy summa = 500000+60000 = 560000.",topic:"m7"},
{q:"Bir sonning 3/4 qismi uning 60% idan 18 ga ortiq. Shu sonni toping.",options:["120", "100", "150", "90"],correct:0,solution:"3/4 x − 0,6x = 18.\n0,75x − 0,6x = 0,15x = 18.\nx = 18:0,15 = 120.",topic:"m7"},
{q:"45 ta yong'oqning 9 tasi chirigan ekan. Chirigan yong'oqlar nechi foizni tashkil etadi?",options:["20%", "18%", "25%", "15%"],correct:0,solution:"9:45 · 100% = 20%.",topic:"m7"},
{q:"Kvadratning tomoni 2 marta oshirilsa, uning yuzasi necha marta ortadi?",options:["4 marta", "2 marta", "8 marta", "16 marta"],correct:0,solution:"Yuza = tomon².\nTomon 2 marta oshsa, yuza 2² = 4 marta ortadi.",topic:"m8"},
{q:"To'g'ri to'rtburchakning bir tomoni 3 marta, ikkinchi tomoni 2 marta kamaytirilsa, yuzasi necha marta kamayadi?",options:["6 marta", "5 marta", "8 marta", "3 marta"],correct:0,solution:"Yuza = uzunlik · kenglik.\nYangi yuza = (uzunlik:3)·(kenglik:2) = eski yuza : 6.\nDemak 6 marta kamayadi.",topic:"m8"},
{q:"To'g'ri to'rtburchakning perimetri 24 sm, tomonlari nisbati 1:2. Yuzasini toping.",options:["32 sm²", "24 sm²", "48 sm²", "16 sm²"],correct:0,solution:"Tomonlar a va 2a. Perimetr = 2(a+2a)=6a=24 → a=4.\nTomonlar: 4 sm va 8 sm.\nYuza = 4·8 = 32 sm².",topic:"m8"},
{q:"Ikki kvadratning tomonlari nisbati 3:4. Ularning yuzalari nisbatini toping.",options:["9:16", "3:4", "6:8", "9:12"],correct:0,solution:"Yuzalar nisbati = tomonlar nisbatining kvadrati = 3²:4² = 9:16.",topic:"m8"},
{q:"Tomoni 10 sm bo'lgan kvadratdan radiusi 3 sm bo'lgan doira kesib olindi (π≈3,14). Qolgan yuzani taqribiy toping.",options:["71,74 sm²", "78,5 sm²", "65 sm²", "90 sm²"],correct:0,solution:"Kvadrat yuzasi = 10² = 100 sm².\nDoira yuzasi = π·r² = 3,14·9 = 28,26 sm².\nQolgan yuza = 100−28,26 = 71,74 sm².",topic:"m8"},
{q:"To'g'ri burchakli uchburchakning gipotenuzasi 13 sm, bir kateti 5 sm. Yuzasini toping.",options:["30 sm²", "60 sm²", "32,5 sm²", "65 sm²"],correct:0,solution:"Ikkinchi katet = √(13²−5²) = √(169−25) = √144 = 12 sm.\nYuza = (5·12):2 = 30 sm².",topic:"m8"},
{q:"Aylananing uzunligi 31,4 sm (π≈3,14). Radiusini toping.",options:["5 sm", "10 sm", "6,28 sm", "3,14 sm"],correct:0,solution:"Aylana uzunligi C=2πr.\nr = C:(2π) = 31,4:(2·3,14) = 31,4:6,28 = 5 sm.",topic:"m8"},
{q:"Tomonlari 6 sm va 8 sm bo'lgan to'g'ri to'rtburchakning diagonalini toping.",options:["10 sm", "14 sm", "12 sm", "9 sm"],correct:0,solution:"Diagonal = √(6²+8²) = √(36+64) = √100 = 10 sm.",topic:"m8"},
{q:"Yuzasi 60 sm² va balandligi 12 sm bo'lgan uchburchakning asosini toping.",options:["10 sm", "5 sm", "12 sm", "6 sm"],correct:0,solution:"Yuza = (asos·balandlik):2.\n60 = (a·12):2 → a = (60·2):12 = 10 sm.",topic:"m8"},
{q:"Tomoni 5 sm bo'lgan kvadratning perimetri va yuzasi (sonli jihatdan) bir-biridan farqini toping.",options:["5", "10", "15", "0"],correct:0,solution:"Perimetr = 4·5=20.\nYuza = 5²=25.\nFarq = 25−20 = 5.",topic:"m8"},
{q:"Kubning qirrasi 3 marta oshirilsa, uning hajmi necha marta ortadi?",options:["27 marta", "3 marta", "9 marta", "6 marta"],correct:0,solution:"Hajm = qirra³.\nQirra 3 marta oshsa, hajm 3³=27 marta ortadi.",topic:"m9"},
{q:"Kubning qirrasi 2 marta oshirilsa, uning sirt yuzasi necha marta ortadi?",options:["4 marta", "2 marta", "8 marta", "6 marta"],correct:0,solution:"Sirt yuzasi = 6·qirra².\nQirra 2 marta oshsa, sirt yuzasi 2²=4 marta ortadi.",topic:"m9"},
{q:"To'g'ri burchakli parallelepipedning barcha o'lchamlari 2 marta kattalashtirilsa, hajmi necha marta ortadi?",options:["8 marta", "2 marta", "4 marta", "6 marta"],correct:0,solution:"Hajm = a·b·c.\nHar bir o'lcham 2 marta oshsa, hajm 2³=8 marta ortadi.",topic:"m9"},
{q:"Hajmi 64 sm³ bo'lgan kubning sirt yuzasini toping.",options:["96 sm²", "64 sm²", "48 sm²", "144 sm²"],correct:0,solution:"Qirra³=64 → qirra=4 sm.\nSirt yuzasi = 6·4² = 6·16 = 96 sm².",topic:"m9"},
{q:"Sharning radiusi 2 marta kichraytirilsa, uning hajmi necha marta kamayadi?",options:["8 marta", "2 marta", "4 marta", "6 marta"],correct:0,solution:"Hajm = (4/3)πr³.\nRadius 2 marta kamaysa, hajm 2³=8 marta kamayadi.",topic:"m9"},
{q:"Asos radiusi 5 sm, balandligi 12 sm bo'lgan konusning hajmini toping (V=(1/3)πr²h).",options:["100π sm³", "60π sm³", "300π sm³", "20π sm³"],correct:0,solution:"V = (1/3)·π·5²·12 = (1/3)·π·25·12 = (1/3)·300π = 100π sm³.",topic:"m9"},
{q:"Qirrasi 6 sm bo'lgan kub shaklidagi idishga to'la suv quyildi. Idishdagi suv necha litr (1 litr=1000 sm³)?",options:["0,216 l", "2,16 l", "21,6 l", "0,36 l"],correct:0,solution:"Kub hajmi = 6³ = 216 sm³.\n216 sm³ = 216:1000 = 0,216 litr.",topic:"m9"},
{q:"Asosi tomoni 4 sm bo'lgan kvadrat bo'lgan, balandligi 9 sm bo'lgan to'g'ri parallelepipedning hajmini toping.",options:["144 sm³", "36 sm³", "52 sm³", "128 sm³"],correct:0,solution:"Asos yuzasi = 4²=16 sm².\nHajm = 16·9 = 144 sm³.",topic:"m9"},
{q:"Radiusi 4 sm bo'lgan sharning sirt yuzasini toping (S=4πr²).",options:["64π sm²", "16π sm²", "32π sm²", "8π sm²"],correct:0,solution:"S = 4·π·4² = 4·π·16 = 64π sm².",topic:"m9"},
{q:"Asosi sakkizburchak bo'lgan to'g'ri prizmaning uchlari sonini toping.",options:["16", "8", "24", "10"],correct:0,solution:"To'g'ri prizmada uchlar soni = 2·asos tomonlari soni.\nAsos 8 burchakli, uchlar = 2·8 = 16.",topic:"m9"},
{q:"54 m 89 mm ni millimetrlarda ifodalang.",options:["54089 mm", "5489 mm", "540089 mm", "54890 mm"],correct:0,solution:"54 m = 54000 mm.\n54000 + 89 = 54089 mm.",topic:"m10"},
{q:"3,2 t va 3200 kg larni taqqoslang.",options:["3,2 t = 3200 kg", "3,2 t > 3200 kg", "3,2 t < 3200 kg", "taqqoslab bo'lmaydi"],correct:0,solution:"1 t = 1000 kg.\n3,2 t = 3,2·1000 = 3200 kg.\nDemak 3,2 t = 3200 kg.",topic:"m10"},
{q:"0,5 soat va 35 daqiqani taqqoslang.",options:["0,5 soat < 35 daqiqa", "0,5 soat > 35 daqiqa", "0,5 soat = 35 daqiqa", "taqqoslab bo'lmaydi"],correct:0,solution:"0,5 soat = 30 daqiqa.\n30 < 35, demak 0,5 soat < 35 daqiqa.",topic:"m10"},
{q:"2,4 l ni millilitrlarda ifodalang.",options:["2400 ml", "240 ml", "24000 ml", "2,4 ml"],correct:0,solution:"1 l = 1000 ml.\n2,4 · 1000 = 2400 ml.",topic:"m10"},
{q:"Bir sutkada nechta daqiqa bor?",options:["1440", "1000", "1200", "2400"],correct:0,solution:"1 sutka = 24 soat.\n24 · 60 = 1440 daqiqa.",topic:"m10"},
{q:"4 km 50 m va 4050 m larni taqqoslang.",options:["4 km 50 m = 4050 m", "4 km 50 m > 4050 m", "4 km 50 m < 4050 m", "taqqoslab bo'lmaydi"],correct:0,solution:"4 km = 4000 m.\n4 km 50 m = 4000+50 = 4050 m.\nDemak 4 km 50 m = 4050 m.",topic:"m10"},
{q:"0,003 t ni grammlarda ifodalang.",options:["3000 g", "300 g", "30000 g", "3 g"],correct:0,solution:"0,003 t = 0,003·1000 kg = 3 kg.\n3 kg = 3·1000 = 3000 g.",topic:"m10"},
{q:"Mashina 1,5 soatda 90 km yursa, 20 daqiqada necha km yo'l bosadi?",options:["20 km", "18 km", "25 km", "30 km"],correct:0,solution:"Tezlik = 90:1,5 = 60 km/soat.\n20 daqiqa = 1/3 soat.\nYo'l = 60·(1/3) = 20 km.",topic:"m10"},
{q:"2 m² 35 sm² ni kvadrat santimetrlarda ifodalang.",options:["20035 sm²", "2035 sm²", "200035 sm²", "20350 sm²"],correct:0,solution:"1 m² = 10000 sm².\n2 m² = 20000 sm².\n20000 + 35 = 20035 sm².",topic:"m10"},
{q:"0,75 t va 750 kg larni taqqoslang.",options:["0,75 t = 750 kg", "0,75 t > 750 kg", "0,75 t < 750 kg", "taqqoslab bo'lmaydi"],correct:0,solution:"0,75 t = 0,75·1000 = 750 kg.\nDemak 0,75 t = 750 kg.",topic:"m10"},
{q:"(2x³y)² · 3xy ifodani soddalashtiring.",options:["12x⁷y³", "6x⁷y³", "12x⁶y³", "4x⁷y³"],correct:0,solution:"(2x³y)² = 4x⁶y².\n4x⁶y² · 3xy = 12x⁷y³.",topic:"m11"},
{q:"15a⁵b⁴ : (3a²b) ifodani soddalashtiring.",options:["5a³b³", "5a³b⁴", "45a³b³", "5a⁷b⁵"],correct:0,solution:"Koeffitsiyentlar: 15:3=5.\na⁵:a²=a³, b⁴:b=b³.\nNatija: 5a³b³.",topic:"m11"},
{q:"(−x²y)³ · (−2xy²) ifodani soddalashtiring.",options:["2x⁷y⁵", "−2x⁷y⁵", "2x⁵y⁵", "−2x⁶y⁵"],correct:0,solution:"(−x²y)³ = −x⁶y³.\n(−x⁶y³)·(−2xy²) = 2x⁷y⁵.",topic:"m11"},
{q:"4m²n³ birhadini kvadratga ko'tarib soddalashtiring.",options:["16m⁴n⁶", "16m²n³", "8m⁴n⁶", "4m⁴n⁶"],correct:0,solution:"(4m²n³)² = 4²·(m²)²·(n³)² = 16m⁴n⁶.",topic:"m11"},
{q:"8x⁶y⁴ : 2x²y² ifodani soddalashtirib, x=1, y=1 dagi qiymatini toping.",options:["4", "8", "2", "16"],correct:0,solution:"8x⁶y⁴:2x²y² = 4x⁴y².\nx=1,y=1 da: 4·1·1=4.",topic:"m11"},
{q:"3a²b · (−4ab³) · (−a) ifodani soddalashtiring.",options:["12a⁴b⁴", "−12a⁴b⁴", "12a³b⁴", "12a⁴b³"],correct:0,solution:"Koeffitsiyentlar: 3·(−4)·(−1)=12.\na²·a·a=a⁴, b·b³=b⁴.\nNatija: 12a⁴b⁴.",topic:"m11"},
{q:"(2x²)³ : (4x³) ifodani soddalashtiring.",options:["2x³", "4x³", "2x⁹", "8x³"],correct:0,solution:"(2x²)³ = 8x⁶.\n8x⁶ : 4x³ = 2x³.",topic:"m11"},
{q:"Koeffitsiyenti 5, darajasi 4 bo'lgan birhad va koeffitsiyenti −3, darajasi 4 bo'lgan birhad qo'shilsa, hosil bo'lgan birhadning koeffitsiyentini toping.",options:["2", "8", "−8", "−2"],correct:0,solution:"Bir xil darajali birhadlar qo'shilganda koeffitsiyentlar qo'shiladi: 5+(−3)=2.",topic:"m11"},
{q:"x³y² ifodani x²y ga bo'lib, natijaning x=2, y=3 dagi qiymatini toping.",options:["6", "5", "12", "18"],correct:0,solution:"x³y² : x²y = xy.\nx=2,y=3 da: 2·3=6.",topic:"m11"},
{q:"(−2a)⁴ ifodani soddalashtiring.",options:["16a⁴", "−16a⁴", "8a⁴", "−8a⁴"],correct:0,solution:"(−2a)⁴ = (−2)⁴·a⁴ = 16a⁴ (juft daraja, manfiy ishora yo'qoladi).",topic:"m11"},
{q:"(x+3)(x−3)+9 ifodani soddalashtiring.",options:["x²", "x²+9", "x²−9", "x²+18"],correct:0,solution:"(x+3)(x−3) = x²−9.\nx²−9+9 = x².",topic:"m12"},
{q:"(2x+3)² ifodani ochib yozing.",options:["4x²+12x+9", "4x²+9", "4x²+6x+9", "2x²+12x+9"],correct:0,solution:"(2x+3)² = (2x)²+2·2x·3+3² = 4x²+12x+9.",topic:"m12"},
{q:"(a−b)² + 4ab ifodani soddalashtiring.",options:["(a+b)²", "(a−b)²", "a²+b²", "2ab"],correct:0,solution:"(a−b)² + 4ab = a²−2ab+b²+4ab = a²+2ab+b² = (a+b)².",topic:"m12"},
{q:"x²+6x+9 ko'phadini ko'paytuvchilarga ajratib yozing.",options:["(x+3)²", "(x−3)²", "(x+9)(x+1)", "(x+3)(x−3)"],correct:0,solution:"x²+6x+9 = x²+2·x·3+3² = (x+3)².",topic:"m12"},
{q:"(3x−2)(2x+1) ko'paytmani ochib yozing.",options:["6x²−x−2", "6x²+x−2", "6x²−x+2", "6x²−7x−2"],correct:0,solution:"(3x−2)(2x+1) = 3x·2x+3x·1−2·2x−2·1 = 6x²+3x−4x−2 = 6x²−x−2.",topic:"m12"},
{q:"P(x) = x³−3x²+2 bo'lsa, P(−1) qiymatini toping.",options:["−2", "2", "−4", "0"],correct:0,solution:"P(−1) = (−1)³−3·(−1)²+2 = −1−3+2 = −2.",topic:"m12"},
{q:"(x+2)(x−2)(x²+4) ko'paytmani soddalashtiring.",options:["x⁴−16", "x⁴+16", "x⁴−4", "x²−16"],correct:0,solution:"(x+2)(x−2) = x²−4.\n(x²−4)(x²+4) = x⁴−16.",topic:"m12"},
{q:"2x²−8 ko'phadini ko'paytuvchilarga ajratib yozing.",options:["2(x−2)(x+2)", "2(x−4)(x+4)", "(2x−4)(x+2)", "2(x²−4)²"],correct:0,solution:"2x²−8 = 2(x²−4) = 2(x−2)(x+2).",topic:"m12"},
{q:"(x+y)² − (x−y)² ifodani soddalashtiring.",options:["4xy", "2xy", "2(x²+y²)", "4x²"],correct:0,solution:"(x+y)²−(x−y)² = [(x+y)−(x−y)]·[(x+y)+(x−y)] = (2y)(2x) = 4xy.",topic:"m12"},
{q:"x²−5x+6 ko'phadini ko'paytuvchilarga ajratib yozing.",options:["(x−2)(x−3)", "(x+2)(x+3)", "(x−1)(x−6)", "(x−2)(x+3)"],correct:0,solution:"Ko'paytmasi 6, yig'indisi −5 bo'lgan sonlar: −2 va −3.\nx²−5x+6 = (x−2)(x−3).",topic:"m12"},
{q:"(3,8 − y) : (−1,2) = (−16) : 8 tenglamani yeching.",options:["1,4", "2,4", "−1,4", "3,8"],correct:0,solution:"O'ng tomon: (−16):8 = −2.\n(3,8−y):(−1,2) = −2.\n3,8−y = −2·(−1,2) = 2,4.\ny = 3,8−2,4 = 1,4.",topic:"m13"},
{q:"12500 : 25 − x = 25 · 20 tenglamani yeching.",options:["0", "25", "500", "−500"],correct:0,solution:"12500:25 = 500.\n25·20 = 500.\n500 − x = 500 → x = 0.",topic:"m13"},
{q:"3x + 7 = 5x − 9 tenglamani yeching.",options:["8", "7", "9", "6"],correct:0,solution:"7+9 = 5x−3x.\n16 = 2x.\nx = 8.",topic:"m13"},
{q:"(2/3)x − 4 = 6 tenglamani yeching.",options:["15", "12", "10", "18"],correct:0,solution:"(2/3)x = 10.\nx = 10·(3/2) = 15.",topic:"m13"},
{q:"5(x+2) = 3(x+2) + 8 tenglamani yeching.",options:["2", "4", "−2", "6"],correct:0,solution:"Belgilash: u=x+2. 5u=3u+8 → 2u=8 → u=4.\nx+2=4 → x=2.",topic:"m13"},
{q:"−2x + 9 = 3x − 16 tenglamani yeching.",options:["5", "4", "6", "−5"],correct:0,solution:"9+16 = 3x+2x.\n25 = 5x.\nx = 5.",topic:"m13"},
{q:"x:4 − x:6 = 1 tenglamani yeching.",options:["12", "10", "24", "6"],correct:0,solution:"Umumiy maxraj 12: 3x/12 − 2x/12 = 1.\nx/12 = 1.\nx = 12.",topic:"m13"},
{q:"Ikki sonning ayirmasi 14, yig'indisi 50. Kichik sonni toping.",options:["18", "16", "20", "22"],correct:0,solution:"x+y=50, x−y=14.\nIkkinchisini birinchisiga qo'shamiz: 2x=64 → x=32.\ny=50−32=18.",topic:"m13"},
{q:"0,3(x−5) = 0,2x tenglamani yeching.",options:["15", "10", "20", "12"],correct:0,solution:"0,3x − 1,5 = 0,2x.\n0,1x = 1,5.\nx = 15.",topic:"m13"},
{q:"(2x−1)/5 = (x+2)/3 tenglamani yeching.",options:["13", "11", "15", "9"],correct:0,solution:"Ayqashlab ko'paytiramiz: 3(2x−1) = 5(x+2).\n6x−3 = 5x+10.\n6x−5x = 10+3.\nx = 13.",topic:"m13"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 20</span><span>2x − y = 10</span></span></span>",options:["x=10, y=10", "x=8, y=12", "x=12, y=8", "x=15, y=5"],correct:0,solution:"Ikkinchi tenglamadan: 2x−y=10 → y=2x−10.\nBirinchi tenglamaga qo'yamiz: x+(2x−10)=20 → 3x=30 → x=10.\ny=2·10−10=10.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x − 3y = 1</span><span>2x + y = 9</span></span></span>",options:["x=4, y=1", "x=1, y=4", "x=5, y=1", "x=4, y=2"],correct:0,solution:"Ikkinchi tenglamadan: y=9−2x.\nBirinchiga qo'yamiz: x−3(9−2x)=1 → x−27+6x=1 → 7x=28 → x=4.\ny=9−2·4=1.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>4x + y = 18</span><span>x + y = 6</span></span></span>",options:["x=4, y=2", "x=2, y=4", "x=3, y=3", "x=5, y=1"],correct:0,solution:"Birinchidan ikkinchini ayiramiz: (4x+y)−(x+y)=18−6 → 3x=12 → x=4.\ny=6−4=2.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>2x − 3y = 12</span><span>x + 3y = 15</span></span></span>",options:["x=9, y=2", "x=6, y=3", "x=9, y=3", "x=12, y=1"],correct:0,solution:"Tenglamalarni qo'shamiz: (2x−3y)+(x+3y)=12+15 → 3x=27 → x=9.\ny=(15−9):3=2.",topic:"m14"},
{q:"Ikkita sonning yig'indisi 38. Ulardan birining ikkilanganidan 1 kam soni ikkinchi songa teng. Kichik sonni toping.",options:["13", "25", "19", "12"],correct:0,solution:"x+y=38, 2x−1=y.\nx+(2x−1)=38 → 3x=39 → x=13.\ny=2·13−1=25.\nKichik son = 13.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>5x − 2y = 12</span><span>3x + 2y = 20</span></span></span>",options:["x=4, y=4", "x=2, y=7", "x=4, y=2", "x=6, y=1"],correct:0,solution:"Tenglamalarni qo'shamiz: (5x−2y)+(3x+2y)=12+20 → 8x=32 → x=4.\ny=(20−3·4):2=4.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>y = 3x − 2</span><span>x + y = 10</span></span></span>",options:["x=3, y=7", "x=4, y=6", "x=2, y=8", "x=3, y=4"],correct:0,solution:"x+(3x−2)=10 → 4x=12 → x=3.\ny=3·3−2=7.",topic:"m14"},
{q:"Bir to'garakka kattalar uchun 30000 so'm, bolalar uchun 15000 so'm narxda jami 8 ta bilet sotilib, 195000 so'm tushgan. Nechta kattalar bileti sotilgan?",options:["5", "4", "6", "3"],correct:0,solution:"a+b=8, 30000a+15000b=195000.\nb=8−a ni ikkinchiga qo'yamiz: 30000a+15000(8−a)=195000 → 15000a+120000=195000 → 15000a=75000 → a=5.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>x + y = 15</span><span>x − y = 3</span></span></span>",options:["x=9, y=6", "x=6, y=9", "x=10, y=5", "x=8, y=7"],correct:0,solution:"Tenglamalarni qo'shamiz: 2x=18 → x=9.\ny=15−9=6.",topic:"m14"},
{q:"Tenglamalar sistemasini yeching:<br><span style='display:inline-flex;align-items:center;gap:6px;vertical-align:middle'><span style='font-size:42px;font-weight:300;line-height:1'>{</span><span style='display:inline-flex;flex-direction:column;text-align:left;font-weight:600;line-height:1.5'><span>3x + y = 10</span><span>x − 2y = −13</span></span></span>",options:["x=1, y=7", "x=3, y=1", "x=−1, y=13", "x=2, y=4"],correct:0,solution:"Birinchidan y=10−3x.\nIkkinchiga qo'yamiz: x−2(10−3x)=−13 → x−20+6x=−13 → 7x=7 → x=1.\ny=10−3·1=7.",topic:"m14"},
{q:"Bitta baqlajon va ikkita pomidorning narxi jamisi 18000 so'm, ikkita baqlajon va bitta pomidorning narxi jamisi 21000 so'm. Bitta pomidorning narxini toping.",options:["5000 so'm", "6000 so'm", "4000 so'm", "7000 so'm"],correct:0,solution:"b+2p=18000, 2b+p=21000.\nBirinchidan b=18000−2p.\nIkkinchiga qo'yamiz: 2(18000−2p)+p=21000 → 36000−4p+p=21000 → −3p=−15000 → p=5000.",topic:"m15"},
{q:"Avtobus 2,5 soat davomida 80 km/soat tezlikda, so'ng 1,5 soat davomida 60 km/soat tezlikda yurdi. Avtobus jami necha km yo'l bosib o'tdi?",options:["290 km", "280 km", "300 km", "270 km"],correct:0,solution:"Birinchi qism: 80·2,5=200 km.\nIkkinchi qism: 60·1,5=90 km.\nJami: 200+90=290 km.",topic:"m15"},
{q:"Sigir sutining 20% i yog' tarkibiga to'g'ri keladi. 15 litr sutda necha kg yog' bor (1 litr sut ≈ 1 kg)?",options:["3 kg", "2 kg", "4 kg", "3,5 kg"],correct:0,solution:"15·0,2 = 3 kg.",topic:"m15"},
{q:"Ikki ishchi birgalikda 1 kunda 24 dona mahsulot tayyorlaydi. Birinchisi yolg'iz 1 kunda 14 dona tayyorlaydi. Ikkinchisi yolg'iz 1 kunda nechta tayyorlaydi?",options:["10", "12", "8", "16"],correct:0,solution:"24−14=10 dona.",topic:"m15"},
{q:"Poyezd 540 km masofani 6 soatda bosib o'tdi. Agar tezligini 10 km/soatga oshirsa, shu masofani necha soatda bosib o'tadi?",options:["5,4 soat", "5 soat", "6,5 soat", "4,5 soat"],correct:0,solution:"Boshlang'ich tezlik = 540:6 = 90 km/soat.\nYangi tezlik = 90+10 = 100 km/soat.\nYangi vaqt = 540:100 = 5,4 soat.",topic:"m15"},
{q:"16 nafar xodimning oylik ish haqi yig'indisi 9 600 000 so'm. O'rtacha ish haqini toping.",options:["600000 so'm", "580000 so'm", "620000 so'm", "550000 so'm"],correct:0,solution:"9600000:16 = 600000 so'm.",topic:"m15"},
{q:"Bir sondan uning 1/4 qismini ayirib, qolganini 2 ga ko'paytirsak, 90 hosil bo'ladi. Shu sonni toping.",options:["60", "80", "45", "75"],correct:0,solution:"(x − x/4)·2 = 90.\n(3x/4)·2 = 90.\n(3x/2) = 90.\nx = 60.",topic:"m15"},
{q:"Onaning yoshi bolasining yoshidan 3 marta katta. 6 yil oldin onaning yoshi bolasining yoshidan 5 marta katta edi. Bolaning hozirgi yoshini toping.",options:["12", "10", "15", "9"],correct:0,solution:"Ona=3x, bola=x.\n6 yil oldin: 3x−6=5(x−6).\n3x−6=5x−30.\n24=2x.\nx=12.",topic:"m15"},
{q:"Ikki sonning nisbati 5:3, yig'indisi 96. Ularning ayirmasini toping.",options:["24", "30", "18", "36"],correct:0,solution:"5+3=8 ulush. 1 ulush=96:8=12.\nSonlar: 60 va 36.\nAyirma=60−36=24.",topic:"m15"},
{q:"Sayyohlar guruhi 3 ta avtobusga teng bo'lib o'tirsa, har birida 42 kishi bo'ladi. Agar ular 6 ta avtobusga teng bo'lib o'tirsa, har birida nechta kishi bo'ladi?",options:["21", "24", "20", "18"],correct:0,solution:"Jami sayohchilar = 3·42=126.\n126:6=21.",topic:"m15"},
{q:"Jadvalda 5 kunlik haroratlar ko'rsatilgan: Du=18°, Se=20°, Ch=17°, Pa=19°, Ju=21°. Haftaning shu 5 kunidagi o'rtacha haroratni toping.",options:["19°", "18°", "20°", "18,5°"],correct:0,solution:"Yig'indi: 18+20+17+19+21=95.\nO'rtacha: 95:5=19°.",topic:"m16"},
{q:"Diagrammada 4 ta sinfning o'quvchilar soni ko'rsatilgan: 5-A — 28, 5-B — 30, 5-V — 26, 5-G — 32. Eng ko'p o'quvchi qaysi sinfda va nechta?",options:["5-G, 32 ta", "5-B, 30 ta", "5-A, 28 ta", "5-V, 26 ta"],correct:0,solution:"Berilgan sonlardan eng kattasi 32, u 5-G sinfga tegishli.",topic:"m16"},
{q:"Jadvalda do'kondagi haftalik sotuvlar (mln so'm): Dush-4, Sesh-5, Chor-3, Pay-6, Jum-7, Shan-8, Yak-5. Hafta davomida jami sotuv qancha bo'ldi?",options:["38 mln so'm", "36 mln so'm", "40 mln so'm", "42 mln so'm"],correct:0,solution:"4+5+3+6+7+8+5=38 mln so'm.",topic:"m16"},
{q:"Grafikda korxonaning 4 oylik foydasi: Yanvar-12 mln, Fevral-15 mln, Mart-10 mln, Aprel-19 mln so'm. Qaysi oyda eng katta o'sish (oldingi oyga nisbatan) bo'lgan?",options:["Aprel", "Fevral", "Mart", "Yanvar"],correct:0,solution:"O'sishlar: Fev−Yan=3, Mart−Fev=−5, Aprel−Mart=9.\nEng katta o'sish Aprelda: +9 mln so'm.",topic:"m16"},
{q:"Doiraviy diagrammada sinfdagi 40 o'quvchining sevimli fani ko'rsatilgan: matematika 40%, ona tili 25%, tarix 20%, boshqa 15%. Tarixni sevimli fan deb tanlagan o'quvchilar nechta?",options:["8", "10", "6", "12"],correct:0,solution:"40 ning 20% i: 40·0,2=8 ta.",topic:"m16"},
{q:"Jadvalda 6 oy davomida yomg'ir kunlari soni: Yan-8, Fev-6, Mar-10, Apr-12, May-9, Iyun-5. Ushbu 6 oyda jami nechta yomg'irli kun bo'lgan?",options:["50", "48", "52", "45"],correct:0,solution:"8+6+10+12+9+5=50.",topic:"m16"},
{q:"Diagrammada 5 ta o'yinchining yig'gan ochkolari ko'rsatilgan: A-15, B-22, V-18, G-9, D-26. Eng ko'p va eng kam ochko orasidagi farqni toping.",options:["17", "18", "16", "20"],correct:0,solution:"Eng ko'p: D=26, eng kam: G=9.\nFarq: 26−9=17.",topic:"m16"},
{q:"Jadvalda mahsulot narxining oylar bo'yicha o'zgarishi: Yanvar-25000, Fevral-28000, Mart-24000 so'm. Mart narxi yanvar narxiga nisbatan necha foizga kamaydi?",options:["4%", "5%", "3%", "8%"],correct:0,solution:"Kamayish: 25000−24000=1000.\nFoizi: 1000:25000·100%=4%.",topic:"m16"},
{q:"Ustunli diagrammada 4 ta mahsulot turining sotuv soni: A-120, B-90, V-150, G-140. Jami sotuv qancha va A turi jamining necha foizini tashkil qiladi?",options:["500 ta, 24%", "500 ta, 20%", "500 ta, 30%", "510 ta, 24%"],correct:0,solution:"Jami: 120+90+150+140=500.\nA ulushi: 120:500·100%=24%.",topic:"m16"},
{q:"Jadvalda 5 ta o'quvchining matematika va fizika baholari berilgan. Ulardan matematikadan o'rtacha bali 8,4 ga teng, jami ball esa 42. To'g'ri yozilganini aniqlang.",options:["8,4·5=42 — to'g'ri", "8,4·5=40 — to'g'ri", "42:8,4=4 — to'g'ri", "8,4+5=42 — to'g'ri"],correct:0,solution:"O'rtacha = jami:soni.\nTekshirish: 8,4·5=42, demak jami 42 to'g'ri.",topic:"m16"},
{q:"To'g'ri burchakning ikkiga bo'lingan qismlaridan biri 35°. Ikkinchi qismni toping.",options:["55°", "45°", "50°", "60°"],correct:0,solution:"To'g'ri burchak=90°.\n90°−35°=55°.",topic:"m17"},
{q:"Burchaklari 40° va 65° bo'lgan uchburchakning uchinchi burchagini toping.",options:["75°", "70°", "80°", "65°"],correct:0,solution:"Uchburchak burchaklari yig'indisi 180°.\n180°−40°−65°=75°.",topic:"m17"},
{q:"To'g'ri chiziqda yotgan ikki burchakdan biri ikkinchisidan 3 marta katta. Kichik burchakni toping.",options:["45°", "50°", "30°", "60°"],correct:0,solution:"x+3x=180° → 4x=180° → x=45°.",topic:"m17"},
{q:"Ikki parallel yo'l orasidagi masofa 800 m. Bu masofani 1:20000 masshtabdagi xaritada necha sm bilan ifodalanadi?",options:["4 sm", "8 sm", "2 sm", "5 sm"],correct:0,solution:"800 m=80000 sm.\n80000:20000=4 sm.",topic:"m17"},
{q:"Bir burchakning qo'shma burchagi (yig'indisi 180° bo'lgan) undan 2 marta kichik. Bu burchakni toping.",options:["120°", "100°", "110°", "130°"],correct:0,solution:"x+x/2=180° → (3x/2)=180° → x=120°.",topic:"m17"},
{q:"To'g'ri burchakli uchburchakda o'tkir burchaklardan biri 28° bo'lsa, ikkinchisini toping.",options:["62°", "72°", "52°", "58°"],correct:0,solution:"To'g'ri burchak=90°, ikkinchi o'tkir burchak=90°−28°=62°.",topic:"m17"},
{q:"Ikki shahar orasidagi masofa xaritada 1:500000 masshtabda 6 sm. Haqiqiy masofani km da toping.",options:["30 km", "25 km", "35 km", "20 km"],correct:0,solution:"6 sm·500000=3000000 sm=30000 m=30 km.",topic:"m17"},
{q:"Vertikal burchaklar (qarama-qarshi burchaklar) haqida quyidagi fikrlardan qaysi biri to'g'ri: A) Vertikal burchaklar teng. B) Vertikal burchaklar yig'indisi 180°.",options:["faqat A", "faqat B", "ikkisi ham", "ikkisi ham emas"],correct:0,solution:"Vertikal burchaklar har doim teng (A to'g'ri).\nUlarning yig'indisi 180° emas, balki qo'shni burchaklar yig'indisi 180° (B noto'g'ri).",topic:"m17"},
{q:"Burchaklari nisbati 2:3:4 bo'lgan uchburchakning eng katta burchagini toping.",options:["80°", "90°", "70°", "75°"],correct:0,solution:"2+3+4=9 ulush. 180°:9=20°.\nEng katta burchak=4·20°=80°.",topic:"m17"},
{q:"To'g'ri yo'lda turgan ikkita kuzatuvchi orasidagi masofa 1:10000 masshtabdagi rejada 3,5 sm bilan ko'rsatilgan. Haqiqiy masofani metrda toping.",options:["350 m", "300 m", "400 m", "250 m"],correct:0,solution:"3,5 sm·10000=35000 sm=350 m.",topic:"m17"},
{q:"4 xil rangli bayroqdan 2 tasini tanlab, ularni ketma-ket joylashtirish mumkin bo'lgan usullar sonini toping.",options:["12", "8", "6", "16"],correct:0,solution:"Tartibli tanlash (o'rin almashtirish): A(4,2)=4·3=12.",topic:"m18"},
{q:"5 nafar o'quvchidan 3 nafarini sport musobaqasiga (o'rinlarsiz, faqat tarkib) tanlash necha xil usulda mumkin?",options:["10", "15", "20", "60"],correct:0,solution:"C(5,3)=5!/(3!·2!)=10.",topic:"m18"},
{q:"3 xil shapka va 4 xil sharf bor. Ulardan bittadan tanlab kiyish necha xil usulda mumkin?",options:["12", "7", "9", "10"],correct:0,solution:"Ko'paytirish qoidasi: 3·4=12.",topic:"m18"},
{q:"0,1,2,3 raqamlaridan takrorlanmaydigan 2 xonali sonlar nechta tuzish mumkin (birinchi raqam 0 bo'lmasin)?",options:["9", "12", "6", "16"],correct:0,solution:"Birinchi raqam: 1,2,3 dan biri (3 xil).\nIkkinchi raqam: qolgan 3 ta raqamdan biri (3 xil).\nJami: 3·3=9.",topic:"m18"},
{q:"6 nafar do'stdan 2 nafarini navbatchilikka (kun va tartib farqsiz) tanlash necha xil usulda mumkin?",options:["15", "30", "12", "20"],correct:0,solution:"C(6,2)=6!/(2!·4!)=15.",topic:"m18"},
{q:"4 xil rangli sharlardan 3 tasini tanlab, ularni qutiga ketma-ket (rang tartibi muhim) joylashtirish necha xil usulda mumkin?",options:["24", "12", "6", "8"],correct:0,solution:"A(4,3)=4·3·2=24.",topic:"m18"},
{q:"Tanga 3 marta tashlanadi. Kamida bir marta 'gerb' tushishi mumkin bo'lgan natijalar sonini toping (jami natijalar 8 ta).",options:["7", "6", "8", "5"],correct:0,solution:"Hech qachon gerb tushmasligi 1 ta natija (RRR).\n8−1=7.",topic:"m18"},
{q:"7 kishi orasidan 1 ta rais va 1 ta o'rinbosar (turli kishilar) tanlash necha xil usulda mumkin?",options:["42", "49", "21", "14"],correct:0,solution:"Rais uchun 7 tanlov, o'rinbosar uchun qolgan 6 tanlov.\n7·6=42.",topic:"m18"},
{q:"5 xil kitobni tokchaga ketma-ket terib qo'yish necha xil usulda mumkin?",options:["120", "60", "24", "20"],correct:0,solution:"5!=5·4·3·2·1=120.",topic:"m18"},
{q:"Bir sirli kodda 2 ta harf (A,B,V dan, takrorlanishi mumkin) va so'ngida 1 ta raqam (1-5 dan) ishlatiladi. Jami nechta turli kod tuzish mumkin?",options:["45", "30", "15", "60"],correct:0,solution:"Har bir harf uchun 3 tanlov: 3·3=9.\nRaqam uchun 5 tanlov.\nJami: 9·5=45.",topic:"m18"}

число делилось на 9, сумма его цифр должна делиться на 9. 6+8+3+1=18, 18:9=2 — делится. Остальные: 2345→14, 3344→14, 5104→10 — на 9 не делятся."},387:{q:"Найдите количество всех натуральных делителей числа 120.",o:["12","14","16","18"],s:"120 = 2³×3×5. Количество делителей = (3+1)(1+1)(1+1) = 4×2×2 = 16."},388:{q:"НОД чисел 48 и 60 равен 12. Используя это, найдите их НОК (НОД×НОК равно произведению чисел).",o:["180","240","288","360"],s:"48 × 60 = 2880. НОД × НОК = 2880, так как НОД=12, то НОК = 2880 : 12 = 240."},389:{q:"Найдите НОД чисел 45 и 75, затем разделите оба числа на него и найдите сумму полученных чисел.",o:["6","7","8","9"],s:"НОД(45,75)=15. 45:15=3, 75:15=5. 3+5=8."},390:{q:"НОД двух чисел равен 6, НОК равен 72. Если одно из чисел равно 18, найдите второе.",o:["20","24","28","36"],s:"Произведение двух чисел равно НОД×НОК: 6×72=432. Второе число = 432:18 = 24."},391:{q:"Найдите наибольшее число, меньшее 100, которое делится и на 6, и на 8.",o:["72","84","96","100"],s:"НОК(6,8)=24. Наибольшее кратное числа 24, меньшее 100: 24×4=96."},392:{q:"При разложении числа 252 на простые множители, сколько различных (неповторяющихся) простых множителей участвует?",o:["2","3","4","5"],s:"252 = 2²×3²×7. Различные простые множители: 2, 3, 7 — всего 3."},393:{q:"Найдите значение выражения 2/3 + 3/4 − 1/6.",o:["3/4","1","5/4","7/4"],s:"Общий знаменатель 12: 8/12 + 9/12 − 2/12 = 15/12 = 5/4."},394:{q:"Запишите произведение 3/5 × 2/9 в виде несократимой дроби.",o:["6/45","2/15","5/14","1/3"],s:"3/5 × 2/9 = 6/45. НОД чисел 6 и 45 равен 3: 6/45 = 2/15."},395:{q:"Найдите значение выражения 7/8 : 14/16.",o:["1/2","1","2","7/4"],s:"14/16 = 7/8. 7/8 : 7/8 = 1."},396:{q:"Запишите значение выражения 5 1/3 − 2 5/6 в виде смешанного числа.",o:["2 1/2","2 1/3","3 1/6","2 2/3"],s:"5 1/3 = 16/3 = 32/6. 2 5/6 = 17/6. 32/6 − 17/6 = 15/6 = 2 1/2."},397:{q:"Какая из следующих дробей наибольшая: 5/6, 7/9, 11/12, 13/18?",o:["5/6","7/9","11/12","13/18"],s:"Общий знаменатель 36: 5/6=30/36, 7/9=28/36, 11/12=33/36, 13/18=26/36. Наибольшая — 11/12."},398:{q:"Из уравнения x/4 + 1/4 = 3/2 найдите x.",o:["3","4","5","6"],s:"x/4 = 3/2 − 1/4 = 6/4 − 1/4 = 5/4. x = 5."},399:{q:"2/7 часть некоторого числа равна 28. Найдите это число.",o:["56","84","98","112"],s:"x × 2/7 = 28. x = 28 × 7 : 2 = 98."},400:{q:"Чему равна 2/5 часть от 3/4?",o:["3/10","2/9","5/9","6/20"],s:"3/4 × 2/5 = 6/20 = 3/10."},401:{q:"Найдите значение выражения 1/2 + 1/4 + 1/8 + 1/16.",o:["7/8","15/16","1","31/32"],s:"Общий знаменатель 16: 8/16+4/16+2/16+1/16 = 15/16."},402:{q:"Если из некоторого числа вычесть его 1/3 часть, получится 18. Найдите это число.",o:["24","27","30","36"],s:"x − x/3 = 2x/3 = 18. x = 18 × 3 : 2 = 27."},403:{q:"Вычислите: 3,45 + 2,786.",o:["6,136","6,236","6,336","5,236"],s:"3,450 + 2,786 = 6,236."},404:{q:"Вычислите: 12,5 − 7,38.",o:["4,88","5,12","5,22","5,38"],s:"12,50 − 7,38 = 5,12."},405:{q:"Вычислите: 0,25 × 4,8.",o:["1,2","2,4","12","0,12"],s:"0,25 × 4,8 = 1/4 × 4,8 = 1,2."},406:{q:"Вычислите: 15,6 : 0,3.",o:["5,2","52","520","0,52"],s:"15,6 : 0,3 = 156 : 3 = 52."},407:{q:"Вычислите: 2,4 × 1,5 − 0,6.",o:["2,4","3","3,6","4,2"],s:"2,4 × 1,5 = 3,6. 3,6 − 0,6 = 3."},408:{q:"Запишите 0,125 в виде несократимой обычной дроби.",o:["1/8","1/5","1/4","1/16"],s:"0,125 = 125/1000. Разделим оба числа на 125: 1/8."},409:{q:"Округлите 5,678 до сотых.",o:["5,67","5,68","5,7","5,60"],s:"Цифра тысячных 8 ≥ 5, поэтому цифра сотых увеличивается с 7 до 8: 5,68."},410:{q:"Вычислите: 4,2 + 0,38 × 5.",o:["5,9","6,1","6,3","23"],s:"0,38 × 5 = 1,9. 4,2 + 1,9 = 6,1."},411:{q:"Вычислите: (7,5 − 2,5) : 0,5.",o:["5","10","12,5","25"],s:"7,5 − 2,5 = 5. 5 : 0,5 = 10."},412:{q:"Найдите 0,4 часть от 0,6.",o:["0,024","0,24","2,4","0,1"],s:"0,6 × 0,4 = 0,24."},413:{q:"Вычислите: (−12) + 5 − (−8).",o:["−15","−1","1","15"],s:"(−12) + 5 − (−8) = −12 + 5 + 8 = 1."},414:{q:"Вычислите: (−7) × (−3) + (−15).",o:["−36","−6","6","36"],s:"(−7) × (−3) = 21. 21 + (−15) = 6."},415:{q:"Вычислите: (−48) : 6 − (−2).",o:["−10","−6","−2","6"],s:"(−48) : 6 = −8. −8 − (−2) = −8 + 2 = −6."},416:{q:"Вычислите: |−15| + |−9| − |4|.",o:["−20","−2","2","20"],s:"|−15|=15, |−9|=9, |4|=4. 15 + 9 − 4 = 20."},417:{q:"Вычислите: −3/4 + 1/2.",o:["−1/4","1/4","−5/4","−1/2"],s:"−3/4 + 2/4 = −1/4."},418:{q:"Вычислите: (−2)³ + (−3)².",o:["−17","−1","1","17"],s:"(−2)³ = −8. (−3)² = 9. −8 + 9 = 1."},419:{q:"Найдите расстояние между точками −5 и 3 на числовой прямой.",o:["−8","−2","2","8"],s:"Расстояние = |3 − (−5)| = |8| = 8."},420:{q:"Вычислите: (−18) : (−3) × (−2).",o:["−12","−3","3","12"],s:"(−18) : (−3) = 6. 6 × (−2) = −12."},421:{q:"Из уравнения x + (−7) = −2 найдите x.",o:["−9","−5","5","9"],s:"x = −2 − (−7) = −2 + 7 = 5."},422:{q:"Числа −5, 3, −8, 0 расположены в порядке возрастания. Найдите число, стоящее на втором месте.",o:["−8","−5","0","3"],s:"В порядке возрастания: −8, −5, 0, 3. На втором месте стоит −5."},423:{q:"Вычислите значение выражения 2⁵ × 2³.",o:["64","128","256","512"],s:"2⁵ × 2³ = 2⁸ = 256."},424:{q:"Вычислите значение выражения 3⁶ : 3².",o:["9","27","81","243"],s:"3⁶ : 3² = 3⁴ = 81."},425:{q:"Представьте выражение (5²)³ в виде степени.",o:["5⁵","5⁶","5⁸","25⁶"],s:"При возведении степени в степень показатели умножаются: (5²)³ = 5^(2×3) = 5⁶."},426:{q:"Вычислите значение выражения 2³ × (2²)².",o:["32","64","128","256"],s:"(2²)² = 2⁴. 2³ × 2⁴ = 2⁷ = 128."},427:{q:"Вычислите значение выражения 5⁰ + 3¹ + 2⁴.",o:["18","19","20","21"],s:"5⁰=1, 3¹=3, 2⁴=16. 1+3+16=20."},428:{q:"Вычислите значение выражения (−2)⁴ − (−2)³.",o:["0","8","16","24"],s:"(−2)⁴=16, (−2)³=−8. 16 − (−8) = 24."},429:{q:"Вычислите значение выражения 10³ − 10².",o:["100","800","900","990"],s:"10³=1000, 10²=100. 1000−100=900."},430:{q:"Упростите выражение (a³)⁴.",o:["a⁷","a¹²","a⁶⁴","4a³"],s:"При возведении степени в степень показатели умножаются: (a³)⁴ = a^(3×4) = a¹²."},431:{q:"Вычислите значение выражения 2⁴ × 5⁴.",o:["1000","2000","9000","10000"],s:"2⁴ × 5⁴ = (2×5)⁴ = 10⁴ = 10000."},432:{q:"Представьте выражен
